          '
    - action: script.log_push
      data:
        wpis: '{"ts":"{{ now().strftime(''%Y-%m-%dT%H:%M'') }}","typ":"kwiaty", "akcja":"CLOSE","info":"pochmurnie
          {{ states(''sensor.stacja_pogodowa_solar_radiation'') | round(0) }}W/m²
          · zachód −90min · rolety 1,2,9"}

          '
  mode: single
- alias: "Biuro prąd: ostrzeżenie (21:00)"
  description: >
    O 21:00 każdego dnia: jeśli switch.biuro jest włączony, wyślij powiadomienie
    do iphone_tk — dynamicznie czy pracuje czy nie.
  trigger:
  - platform: time
    at: '21:00:00'
  condition:
  - condition: state
    entity_id: switch.biuro
    state: 'on'
  action:
  - service: notify.iphone_tk
    data:
      title: ⚡ Biuro – prąd włączony
      message: >
        {% if is_state('input_boolean.tk_is_working', 'on') %}
        Pracujesz — prąd w biurze pozostanie włączony. Wyłącz tryb pracy, aby wyłączyć prąd po 22:00.
        {% else %}
        Prąd w biurze jest włączony. Za godzinę (22:00) zostanie automatycznie wyłączony.
        {% endif %}
      data:
        push:
          sound: default
  - action: logbook.log
    data:
      name: Biuro prąd
      entity_id: switch.biuro
      message: >
        OSTRZEŻENIE | prąd włączony —
        {% if is_state('input_boolean.tk_is_working', 'on') %}
        tryb pracy aktywny · wyłączenie wstrzymane
        {% else %}
        wyłączenie zaplanowane na 22:00
        {% endif %}
  - action: script.log_push
    data:
      wpis: >
        {"ts":"{{ now().strftime('%Y-%m-%dT%H:%M') }}","typ":"biuro_prad",
        "akcja":"WARN","info":"prąd włączony · {% if is_state('input_boolean.tk_is_working', 'on') %}tryb pracy aktywny{% else %}wyłączenie za 1h o 22:00{% endif %}"}
  mode: single
  id: biuro_prad_ostrzezenie
- alias: "Biuro prąd: wyłącz (22:00)"
  description: >
    O 22:00 każdego dnia: wyłącz switch.biuro jeśli włączony i nie pracuje.
  trigger:
  - platform: time
    at: '22:00:00'
  condition:
  - condition: state
    entity_id: switch.biuro
    state: 'on'
  - condition: state
    entity_id: input_boolean.tk_is_working
    state: 'off'
  action:
  - service: switch.turn_off
    target:
      entity_id: switch.biuro
  - action: logbook.log
    data:
      name: Biuro prąd
      entity_id: switch.biuro
      message: 'WYŁĄCZONO | automatycznie o 22:00 (dzień roboczy)

        '
  - action: script.log_push
    data:
      wpis: '{"ts":"{{ now().strftime(''%Y-%m-%dT%H:%M'') }}","typ":"biuro_prad",
        "akcja":"OFF","info":"22:00 automatyczne"}

        '
  mode: single
  id: biuro_prad_wylacz
- id: biuro_prad_wylacz_po_pracy
  alias: "Biuro prąd: wyłącz po pracy (po 22:00)"
  description: >
    Gdy tk_is_working zmieni się na off po 22:00 i prąd w biurze jest włączony,
    wyłącz go — prąd był wstrzymany z powodu trybu pracy.
  trigger:
  - platform: state
    entity_id: input_boolean.tk_is_working
    to: 'off'
  condition:
  - condition: time
    after: '22:00:00'
  - condition: state
    entity_id: switch.biuro
    state: 'on'
  action:
  - service: switch.turn_off
    target:
      entity_id: switch.biuro
  - action: logbook.log
    data:
      name: Biuro prąd
      entity_id: switch.biuro
      message: 'WYŁĄCZONO | koniec pracy po 22:00'
  - action: script.log_push
    data:
      wpis: '{"ts":"{{ now().strftime(''%Y-%m-%dT%H:%M'') }}","typ":"biuro_prad","akcja":"OFF","info":"koniec pracy po 22:00"}'
  mode: single
- id: ogrod2_snapshot_nawodnienie
  alias: "Nawodnienie ogród 2: snapshot (03:00)"
  description: >
    Zapisuje stan sensor.water_2_total o 3:00 rano
    jako punkt odniesienia do pomiaru zużycia nawodnienia.
  triggers:
    - trigger: time
      at: "03:00:00"
  actions:
    - action: input_number.set_value
      target:
        entity_id: input_number.water_2_snapshot
      data:
        value: "{{ states('sensor.water_2_total') | float(0) }}"
    - action: logbook.log
      data:
        name: "Ogród 2 nawodnienie"
        entity_id: input_number.water_2_snapshot
        message: >
          Snapshot licznika przed nawodnieniem: {{ states('sensor.water_2_total') }} m³
  mode: single


- id: ogrod2_aktualizacja_nawodnienie
  alias: "Nawodnienie ogród 2: aktualizacja (06:40)"
  description: >
    Oblicza różnicę water_2_total między 03:00 a 06:40
    i dodaje ją do input_number.ogrod_2.
    Ignoruje dzień jeśli delta < 100 litrów (nawodnienie nie zadziałało).
  triggers:
    - trigger: time
      at: "06:40:00"
  actions:
    - variables:
        przed: "{{ states('input_number.water_2_snapshot') | float(0) }}"
        po: "{{ states('sensor.water_2_total') | float(0) }}"
        delta: "{{ [po - przed, 0] | max | round(3) }}"
        ogrod2_nowe: "{{ (states('input_number.ogrod_2') | float(0) + [po - przed, 0] | max) | round(3) }}"
    - condition: template
      value_template: "{{ delta > 0.1 }}"
    - action: input_number.set_value
      target:
        entity_id: input_number.ogrod_2
      data:
        value: "{{ ogrod2_nowe }}"
    - action: input_datetime.set_datetime
      target:
        entity_id: input_datetime.ogrod_2_ostatnia_aktualizacja
      data:
        datetime: "{{ now().strftime('%Y-%m-%d %H:%M:%S') }}"
    - action: logbook.log
      data:
        name: "Ogród 2 nawodnienie"
        entity_id: input_number.ogrod_2
        message: >
          Automatyczna aktualizacja: +{{ delta }} m³
          (licznik: {{ przed }} → {{ po }} m³ | ogród_2 łącznie: {{ ogrod2_nowe }} m³)
    - action: script.log_push
      data:
        wpis: >
          {"ts":"{{ now().strftime('%Y-%m-%dT%H:%M') }}","typ":"nawodnienie_ogrod2",
          "akcja":"update","delta":{{ delta }},"ogrod2":{{ ogrod2_nowe }}}
  mode: single
- id: strychowy_roleta_zamknij_upal
  alias: "Roleta strychowy: zamknij przy upale (≥25°C, 5 min)"
  trigger:
  - platform: numeric_state
    entity_id: sensor.termometr_strychowy_temperature
    above: 25
    for:
      minutes: 5
  condition:
  - condition: sun
    after: sunrise
    before: sunset
  action:
  - service: cover.close_cover
    target:
      entity_id: cover.rollershutter_0009
  - action: logbook.log
    data:
      name: Strychowy — roleta
      message: 'ZAMKNIĘTO | {{ states(''sensor.termometr_strychowy_temperature'')
        | round(1) }}°C · {{ states(''sensor.termometr_strychowy_humidity'') | round(0)
        }}% wilg.

        '
  - action: script.log_push
    data:
      wpis: '{"ts":"{{ now().strftime(''%Y-%m-%dT%H:%M'') }}","typ":"strychowy_roleta",
        "akcja":"CLOSE","temp":{{ states(''sensor.termometr_strychowy_temperature'')
        | round(1) }}, "hum":{{ states(''sensor.termometr_strychowy_humidity'') |
        round(0) }}, "info":"{{ states(''sensor.termometr_strychowy_temperature'')
        | round(1) }}°C · {{ states(''sensor.termometr_strychowy_humidity'') | round(0)
        }}% · zamknięto roletę 9"}

        '
  mode: single
# ============================================================
# AUTOMATYZACJA: Pergola — lamele teleco
#
# LOGIKA:
#   Trigger otwarcia: temp > 26°C LUB wilgotność > 75%
#                     (stabilne przez 2 min, by unikać skoków)
#   Warunki otwarcia: 08:00–22:00, miesiące 4–9, nie pada,
#                     lamela jeszcze nie otwarta
#
#   Ktoś w domu → otwórz na stałe, zamknij gdy:
#     - zacznie padać (binary_sensor piezo → ON)
#     - temp < 23°C I wilg < 70% (przez 5 min)
#
#   Nikogo w domu → otwórz na 30 min, potem zamknij
#                   (deszcz przerwie wcześniej)
#
#   Zawsze o 22:00 → zamknij niezależnie od stanu
#
#   Godziny: 08:00–22:00
#   Sezon:   kwiecień–wrzesień (miesiące 4–9)
# ============================================================


# ── 1. OTWÓRZ — ktoś w domu ──────────────────────────────────────────────────

- id: teleco_pergola_otworz_dom
  alias: "Pergola lamele: otwórz — ktoś w domu"
  trigger:
    - platform: numeric_state
      entity_id: sensor.pergola_new_temperature
      above: 26
      for:
        minutes: 2
    - platform: numeric_state
      entity_id: sensor.pergola_new_humidity
      above: 75
      for:
        minutes: 2
  condition:
    - condition: state
      entity_id: input_boolean.pergola_auto
      state: "on"
    - condition: time
      after: "08:00:00"
      before: "22:00:00"
    - condition: template
      value_template: "{{ now().month in range(4, 10) }}"
    - condition: state
      entity_id: binary_sensor.stacja_pogodowa_rain_state_piezo
      state: "off"
    - condition: or
      conditions:
        - condition: state
          entity_id: device_tracker.iphone_tk
          state: home
        - condition: state
          entity_id: device_tracker.iphone_monika
          state: home
    - condition: not
      conditions:
        - condition: state
          entity_id: cover.teleco_leds2
          state: "open"
  action:
    - service: cover.open_cover
      target:
        entity_id: cover.teleco_leds2
    - action: logbook.log
      data:
        name: "Pergola — lamele"
        message: >
          OTWARTO | temp {{ states('sensor.pergola_new_temperature') | round(1) }}°C
          · wilg {{ states('sensor.pergola_new_humidity') | round(0) }}%
    - action: script.log_push
      data:
        wpis: >
          {"ts":"{{ now().strftime('%Y-%m-%dT%H:%M') }}","typ":"teleco_pergola",
          "akcja":"OPEN_DOM","temp":{{ states('sensor.pergola_new_temperature') | round(1) }},
          "hum":{{ states('sensor.pergola_new_humidity') | round(0) }},
          "info":"temp {{ states('sensor.pergola_new_temperature') | round(1) }}°C · wilg {{ states('sensor.pergola_new_humidity') | round(0) }}%"}
  mode: single


# ── 2. OTWÓRZ — nikogo w domu (30 min przewietrzenie) ────────────────────────

- id: teleco_pergola_otworz_poza
  alias: "Pergola lamele: otwórz 30 min (poza domem)"
  trigger:
    - platform: numeric_state
      entity_id: sensor.pergola_new_temperature
      above: 26
      for:
        minutes: 2
    - platform: numeric_state
      entity_id: sensor.pergola_new_humidity
      above: 75
      for:
        minutes: 2
  condition:
    - condition: state
      entity_id: input_boolean.pergola_auto
      state: "on"
    - condition: time
      after: "08:00:00"
      before: "22:00:00"
    - condition: template
      value_template: "{{ now().month in range(4, 10) }}"
    - condition: state
      entity_id: binary_sensor.stacja_pogodowa_rain_state_piezo
      state: "off"
    - condition: state
      entity_id: device_tracker.iphone_tk
      state: not_home
    - condition: state
      entity_id: device_tracker.iphone_monika
      state: not_home
    - condition: not
      conditions:
        - condition: state
          entity_id: cover.teleco_leds2
          state: "open"
    - condition: template
      value_template: >
        {{ (now().timestamp() - as_timestamp(states('input_datetime.pergola_poza_ostatnie_otwarcie'), 0)) > 14400 }}
  action:
    - action: input_datetime.set_datetime
      target:
        entity_id: input_datetime.pergola_poza_ostatnie_otwarcie
      data:
        datetime: "{{ now().strftime('%Y-%m-%d %H:%M:%S') }}"
    - service: cover.open_cover
      target:
        entity_id: cover.teleco_leds2
    - action: logbook.log
      data:
        name: "Pergola — lamele"
        message: >
          OTWARTO na 30 min | nikt w domu |
          temp {{ states('sensor.pergola_new_temperature') | round(1) }}°C
          · wilg {{ states('sensor.pergola_new_humidity') | round(0) }}%
    - action: script.log_push
      data:
        wpis: >
          {"ts":"{{ now().strftime('%Y-%m-%dT%H:%M') }}","typ":"teleco_pergola",
          "akcja":"OPEN_POZA","temp":{{ states('sensor.pergola_new_temperature') | round(1) }},
          "hum":{{ states('sensor.pergola_new_humidity') | round(0) }},
          "info":"przewietrzenie 30 min · temp {{ states('sensor.pergola_new_temperature') | round(1) }}°C · wilg {{ states('sensor.pergola_new_humidity') | round(0) }}%"}
    - service: notify.iphone_tk
      data:
        title: "🌿 Pergola — otwarto"
        message: >
          Lamele otwarte (poza domem) ·
          {{ states('sensor.pergola_new_temperature') | round(1) }}°C ·
          wilg. {{ states('sensor.pergola_new_humidity') | round(0) }}% ·
          zamknięcie za 30 min
    - service: notify.iphone_monika
      data:
        title: "🌿 Pergola — otwarto"
        message: >
          Lamele otwarte (poza domem) ·
          {{ states('sensor.pergola_new_temperature') | round(1) }}°C ·
          wilg. {{ states('sensor.pergola_new_humidity') | round(0) }}% ·
          zamknięcie za 30 min
    - delay:
        minutes: 30
    - service: cover.close_cover
      target:
        entity_id: cover.teleco_leds2
    - action: logbook.log
      data:
        name: "Pergola — lamele"
        message: "ZAMKNIĘTO | po 30 min przewietrzeniu | nikt w domu"
    - action: script.log_push
      data:
        wpis: >
          {"ts":"{{ now().strftime('%Y-%m-%dT%H:%M') }}","typ":"teleco_pergola",
          "akcja":"CLOSE_30MIN","temp":{{ states('sensor.pergola_new_temperature') | round(1) }},
          "hum":{{ states('sensor.pergola_new_humidity') | round(0) }},
          "info":"po 30 min · temp {{ states('sensor.pergola_new_temperature') | round(1) }}°C · wilg {{ states('sensor.pergola_new_humidity') | round(0) }}%"}
    - service: notify.iphone_tk
      data:
        title: "🌿 Pergola — zamknięto"
        message: "Lamele zamknięte po 30 min przewietrzeniu"
    - service: notify.iphone_monika
      data:
        title: "🌿 Pergola — zamknięto"
        message: "Lamele zamknięte po 30 min przewietrzeniu"
  mode: single


# ── 3. ZAMKNIJ — zaczął padać ────────────────────────────────────────────────

- id: teleco_pergola_zamknij_deszcz
  alias: "Pergola lamele: zamknij — deszcz"
  trigger:
    - platform: state
      entity_id: binary_sensor.stacja_pogodowa_rain_state_piezo
      to: "on"
  condition:
    - condition: state
      entity_id: input_boolean.pergola_auto
      state: "on"
    - condition: state
      entity_id: cover.teleco_leds2
      state: "open"
  action:
    - service: cover.close_cover
      target:
        entity_id: cover.teleco_leds2
    - action: logbook.log
      data:
        name: "Pergola — lamele"
        message: >
          ZAMKNIĘTO | deszcz |
          temp {{ states('sensor.pergola_new_temperature') | round(1) }}°C
          · wilg {{ states('sensor.pergola_new_humidity') | round(0) }}%
    - action: script.log_push
      data:
        wpis: >
          {"ts":"{{ now().strftime('%Y-%m-%dT%H:%M') }}","typ":"teleco_pergola",
          "akcja":"CLOSE_DESZCZ","temp":{{ states('sensor.pergola_new_temperature') | round(1) }},
          "hum":{{ states('sensor.pergola_new_humidity') | round(0) }},
          "info":"deszcz · temp {{ states('sensor.pergola_new_temperature') | round(1) }}°C · wilg {{ states('sensor.pergola_new_humidity') | round(0) }}%"}
    - choose:
        - conditions:
            - condition: template
              value_template: >
                {{ not is_state('device_tracker.iphone_tk', 'home') and
                   not is_state('device_tracker.iphone_monika', 'home') }}
          sequence:
            - service: notify.iphone_tk
              data:
                title: "🌿 Pergola — zamknięto"
                message: >
                  Lamele zamknięte — zaczął padać deszcz ·
                  {{ states('sensor.pergola_new_temperature') | round(1) }}°C ·
                  wilg. {{ states('sensor.pergola_new_humidity') | round(0) }}%
            - service: notify.iphone_monika
              data:
                title: "🌿 Pergola — zamknięto"
                message: >
                  Lamele zamknięte — zaczął padać deszcz ·
                  {{ states('sensor.pergola_new_temperature') | round(1) }}°C ·
                  wilg. {{ states('sensor.pergola_new_humidity') | round(0) }}%
  mode: single


