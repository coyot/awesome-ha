      zone: zone.home
    - condition: zone
      entity_id: person.monika
      zone: zone.home
  - condition: state
    entity_id: climate.pokoj_leona
    state: 'off'
  action:
  - service: climate.set_hvac_mode
    target:
      entity_id: climate.pokoj_leona
    data:
      hvac_mode: cool
  - service: climate.set_temperature
    target:
      entity_id: climate.pokoj_leona
    data:
      temperature: 21
  - service: climate.set_fan_mode
    target:
      entity_id: climate.pokoj_leona
    data:
      fan_mode: high
  - service: cover.close_cover
    target:
      entity_id: cover.rollershutter_0008
  - action: logbook.log
    data:
      name: Pokój dzieci – klimatyzacja
      entity_id: climate.pokoj_leona
      message: 'WŁĄCZONO chłodzenie | temp {{ states(''sensor.nenek_temperature'')
