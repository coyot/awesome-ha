- id: '1775157994830'
  alias: 'Powiadomienie o wywozie śmieci (Logic: Monika & Tomek)'
  description: Wysyła powiadomienia o 17:30 na dzień przed wywozem do osób w domu.
  triggers:
  - at: '17:30:00'
    trigger: time
  actions:
  - variables:
      sensors:
      - entity: sensor.harmonogram_bio
        name: "🌿 Bio"
      - entity: sensor.harmonogram_segregowane
        name: "♻️ Segregowane (Papier/Plastik/Szkło)"
      - entity: sensor.harmonogram_zmieszane
        name: "🗑️ Zmieszane"
      - entity: sensor.harmonogram_gabaryty
        name: "🛋️ Gabaryty"
      items_tomorrow: >
        {% set found = ns(types=[]) %}
        {% for s in sensors if states(s.entity) == '1' %}
          {% set found.types = found.types + [s.name] %}
        {% endfor %}
        {{ found.types | join(', ') }}
      monika_home: '{{ is_state(''device_tracker.iphone_monika'', ''home'') }}'
      tomek_home: '{{ is_state(''device_tracker.iphone_tk'', ''home'') }}'
  - condition: template
    value_template: '{{ items_tomorrow != "" }}'
  - if:
    - condition: template
      value_template: '{{ monika_home }}'
    then:
    - data:
        title: "🚛 Jutro wywóz śmieci!"
        message: >
          Witaj Monika, jutro wywozimy: {{ items_tomorrow }}.
          {% if tomek_home %} 📢 Powiedz Tomkowi, żeby wystawił kubły przed dom!
          {% else %} ⚠️ Pamiętaj o wystawieniu kubłów przed dom. {% endif %}
      action: notify.mobile_app_iphone_monika
  - if:
    - condition: template
      value_template: '{{ tomek_home }}'
    then:
    - data:
        title: "🚛 Jutro wywóz śmieci!"
        message: >
          Witaj Tomek, jutro wywozimy: {{ items_tomorrow }}. ⚠️ Nie zapomnij wystawić kubłów przed dom!
      action: notify.mobile_app_iphone_tk
  mode: restart


# ============================================================
# AUTOMATYZACJA: Poręcz klatka schodowa — oświetlenie
# switch.porecz_klatka_schodowa_socket_1
#
# LOGIKA:
#   WŁĄCZENIE wieczorem:
#     - pogodnie  (solar_radiation >= 50 W/m²) → 20 min przed zachodem słońca
#     - pochmurno (solar_radiation <  50 W/m²) → 90 min przed zachodem słońca
#
#   WYŁĄCZENIE rano:
#     - pogodnie  (weather in sunny/partlycloudy) → 10 min po wschodzie słońca
#     - pochmurno (pozostałe stany weather)       → 90 min po wschodzie słońca
#
#   WARUNEK WIECZÓR: iphone_tk LUB iphone_monika musi być w zone.home
# ============================================================

- id: porecz_wlacz_wieczor
  alias: "Poręcz klatka — włącz wieczorem"
  trigger:
    - platform: sun
      event: sunset
      offset: "-01:30:00"
  condition:
    - condition: or
      conditions:
        - condition: state
          entity_id: device_tracker.iphone_tk
          state: home
        - condition: state
          entity_id: device_tracker.iphone_monika
          state: home
  action:
    - choose:
        - conditions:
            - condition: template
              value_template: >
                {{ states('sensor.stacja_pogodowa_solar_radiation') | float(-1) >= 50 }}
          sequence:
            - delay:
                minutes: 70
            - service: switch.turn_on
              target:
                entity_id: switch.porecz_klatka_schodowa_socket_1
            - action: logbook.log
              data:
                name: "Poręcz klatka"
                entity_id: switch.porecz_klatka_schodowa_socket_1
                message: >
                  WŁĄCZONO | zachód −20 min | pogodnie |
                  radiation: {{ states('sensor.stacja_pogodowa_solar_radiation') | round(0) }} W/m²
            - action: script.log_push
              data:
                wpis: >
                  {"ts":"{{ now().strftime('%Y-%m-%dT%H:%M') }}","typ":"porecz",
                  "akcja":"ON","info":"pogodnie {{ states('sensor.stacja_pogodowa_solar_radiation') | round(0) }}W/m² · zachód −20min"}
      default:
        - service: switch.turn_on
          target:
            entity_id: switch.porecz_klatka_schodowa_socket_1
        - action: logbook.log
          data:
            name: "Poręcz klatka"
            entity_id: switch.porecz_klatka_schodowa_socket_1
            message: >
              WŁĄCZONO | zachód −90 min | pochmurnie |
              radiation: {{ states('sensor.stacja_pogodowa_solar_radiation') | round(0) }} W/m²
        - action: script.log_push
          data:
            wpis: >
              {"ts":"{{ now().strftime('%Y-%m-%dT%H:%M') }}","typ":"porecz",
              "akcja":"ON","info":"pochmurnie {{ states('sensor.stacja_pogodowa_solar_radiation') | round(0) }}W/m² · zachód −90min"}
  mode: single


- id: porecz_wylacz_rano
  alias: "Poręcz klatka — wyłącz rano"
  trigger:
    - platform: sun
      event: sunrise
      offset: "00:10:00"
  action:
    - choose:
        - conditions:
            - condition: template
              value_template: >
                {{ states('weather.forecast_home') in ['sunny','partlycloudy','clear-night'] }}
          sequence:
            - service: switch.turn_off
              target:
                entity_id: switch.porecz_klatka_schodowa_socket_1
            - action: logbook.log
              data:
                name: "Poręcz klatka"
                entity_id: switch.porecz_klatka_schodowa_socket_1
                message: >
                  WYŁĄCZONO | wschód +10 min | pogodnie |
                  weather: {{ states('weather.forecast_home') }}
            - action: script.log_push
              data:
                wpis: >
                  {"ts":"{{ now().strftime('%Y-%m-%dT%H:%M') }}","typ":"porecz",
                  "akcja":"OFF","info":"pogodnie · {{ states('weather.forecast_home') }} · wschód +10min"}
      default:
        - delay:
            minutes: 80
        - service: switch.turn_off
          target:
            entity_id: switch.porecz_klatka_schodowa_socket_1
        - action: logbook.log
          data:
            name: "Poręcz klatka"
            entity_id: switch.porecz_klatka_schodowa_socket_1
            message: >
              WYŁĄCZONO | wschód +90 min | pochmurnie |
              weather: {{ states('weather.forecast_home') }}
        - action: script.log_push
          data:
            wpis: >
              {"ts":"{{ now().strftime('%Y-%m-%dT%H:%M') }}","typ":"porecz",
              "akcja":"OFF","info":"pochmurnie · {{ states('weather.forecast_home') }} · wschód +90min"}
  mode: single


- id: porecz_wlacz_powrot_po_zmroku
  alias: "Poręcz klatka — włącz przy powrocie po zmroku"
  description: >
    Gdy ktoś wraca do domu po zachodzie słońca,
    a oświetlenie jest wyłączone — włącz je.
  trigger:
    - platform: state
      entity_id:
        - device_tracker.iphone_tk
        - device_tracker.iphone_monika
      to: home
  condition:
    - condition: state
      entity_id: sun.sun
      state: below_horizon
    - condition: state
      entity_id: switch.porecz_klatka_schodowa_socket_1
      state: "off"
  action:
    - service: switch.turn_on
      target:
        entity_id: switch.porecz_klatka_schodowa_socket_1
    - action: logbook.log
      data:
        name: "Poręcz klatka"
        entity_id: switch.porecz_klatka_schodowa_socket_1
        message: >
          WŁĄCZONO | powrót do domu po zmroku |
          kto: {% if trigger.entity_id == 'device_tracker.iphone_tk' %}Tomek{% elif trigger.entity_id == 'device_tracker.iphone_monika' %}Monika{% else %}nieznany{% endif %} |
          radiation: {{ states('sensor.stacja_pogodowa_solar_radiation') | round(0) }} W/m²
    - action: script.log_push
      data:
        wpis: >
          {"ts":"{{ now().strftime('%Y-%m-%dT%H:%M') }}","typ":"porecz",
          "akcja":"ON","info":"powrót po zmroku · {% if trigger.entity_id == 'device_tracker.iphone_tk' %}Tomek{% else %}Monika{% endif %}"}
  mode: single


- id: porecz_wylacz_failsafe
  alias: "Poręcz klatka — wyłącz failsafe w południe"
  description: >
    Awaryjnie wyłącza oświetlenie o 12:00 jeśli nadal świeci.
  trigger:
    - platform: time
      at: "12:00:00"
  condition:
    - condition: state
      entity_id: switch.porecz_klatka_schodowa_socket_1
      state: "on"
  action:
    - service: switch.turn_off
      target:
        entity_id: switch.porecz_klatka_schodowa_socket_1
    - action: logbook.log
      data:
        name: "Poręcz klatka"
        entity_id: switch.porecz_klatka_schodowa_socket_1
        message: >
          WYŁĄCZONO | failsafe 12:00 | switch był nadal włączony |
          radiation: {{ states('sensor.stacja_pogodowa_solar_radiation') | round(0) }} W/m²
    - action: script.log_push
      data:
        wpis: >
          {"ts":"{{ now().strftime('%Y-%m-%dT%H:%M') }}","typ":"porecz",
          "akcja":"OFF","info":"⚠️ failsafe 12:00 · switch był nadal włączony"}
  mode: single