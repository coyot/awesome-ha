      message: 'WYŁĄCZONO | {% if trigger.platform == ''time'' %}22:00{% else %}temp
        {{ states(''sensor.biuro_temperature'') | round(1) }}°C ≤ 22°C{% endif %}

        '
  - action: script.log_push
    data:
      wpis: '{"ts":"{{ now().strftime(''%Y-%m-%dT%H:%M'') }}","typ":"wiatrak_biuro",
        "akcja":"OFF","info":"{% if trigger.platform == ''time'' %}22:00{% else %}temp
        {{ states(''sensor.biuro_temperature'') | float(0) | round(1) }}°C{% endif
        %}"}

        '
  mode: single
  id: wiatrak_biuro_wylacz
- alias: "AC dzieci: włącz chłodzenie przy upale"
  description: 'Gdy temperatura w pokoju dzieci przekroczy 26°C w godzinach 10:00–18:30
    i ktoś z rodziców jest w domu — włącz klimatyzację na cooling 21°C (max fan) i
    zamknij roletę nr 8.

    '
  trigger:
  - platform: numeric_state
    entity_id: sensor.nenek_temperature
    above: 26
  condition:
  - condition: time
    after: '10:00:00'
    before: '18:30:00'
  - condition: or
    conditions:
    - condition: zone
