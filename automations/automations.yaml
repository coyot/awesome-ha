        {"d":"{{ now().strftime('%Y-%m-%d') }}",
        "d1m":{{ states('sensor.szambo_dom_1_zuzycie') | float(0) | round(2) }},
        "d1z":{{ states('sensor.szambo_dom_1_do_zaplaty') | float(0) | round(0) | int }},
        "d2m":{{ states('sensor.szambo_dom_2_zuzycie') | float(0) | round(2) }},
        "d2z":{{ states('sensor.szambo_dom_2_do_zaplaty') | float(0) | round(0) | int }},
        "lm":{{ states('sensor.szambo_zuzycie') | float(0) | round(2) }}}
