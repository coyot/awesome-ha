- id: '1773672846823'
  alias: Szambo - dzienny alert poziomu o 7:00
  description: Sprawdza poziom szamba i wysyła powiadomienie raz dziennie
  triggers:
  - at: 07:00:00
    trigger: time
  actions:
  - choose:
    - conditions:
      - condition: numeric_state
        entity_id: sensor.szambo_zuzycie
        above: 9
      sequence:
      - data:
          title: "🚨🚨🚨 Szambo na granicy! 🚨🚨🚨"
          message: >
            Poziom szamba przekroczył 9 m³! Aktualnie: {{ states('sensor.szambo_zuzycie') }} m³. Pilnie zamów wywóz.
        action: notify.mobile_app_iphone_tk
      - data:
          title: "🚨🚨🚨 Szambo na granicy! 🚨🚨🚨"
          message: >
            Poziom szamba przekroczył 9 m³! Aktualnie: {{ states('sensor.szambo_zuzycie') }} m³. Pilnie zamów wywóz.
        action: notify.mobile_app_iphone_monika
    - conditions:
      - condition: numeric_state
        entity_id: sensor.szambo_zuzycie
        above: 8
      sequence:
      - data:
          title: ⚠️ Szambo blisko pełnego
          message: >
            Szambo przekroczyło 8 m³. Aktualnie: {{ states('sensor.szambo_zuzycie') }} m³. Warto zamówić wywóz.
        action: notify.mobile_app_iphone_tk
      - data:
          title: ⚠️ Szambo blisko pełnego
          message: >
            Szambo przekroczyło 8 m³. Aktualnie: {{ states('sensor.szambo_zuzycie') }} m³. Warto zamówić wywóz.
        action: notify.mobile_app_iphone_monika
    - conditions:
      - condition: numeric_state
        entity_id: sensor.szambo_zuzycie
        above: 7
      sequence:
      - data:
          title: ℹ️ Szambo zaczyna się zapełniać
          message: >
            Szambo przekroczyło 7 m³. Aktualnie: {{ states('sensor.szambo_zuzycie') }} m³. Kontroluj.
        action: notify.mobile_app_iphone_tk
      - data:
          title: ℹ️ Szambo zaczyna się zapełniać
          message: >
            Szambo przekroczyło 7 m³. Aktualnie: {{ states('sensor.szambo_zuzycie') }} m³. Kontroluj.
        action: notify.mobile_app_iphone_monika
  mode: single


- id: '1773775004210'
  alias: Otwórz bramę gdy ktoś wraca do domu
  triggers:
  - trigger: zone
    entity_id: device_tracker.iphone_tk
    zone: zone.home
    event: enter
  - trigger: zone
    entity_id: device_tracker.iphone_monika
    zone: zone.home
    event: enter
  actions:
  - action: rest_command.blynk_open_gate
  - variables:
      kto: >
        {% if trigger.entity_id == 'device_tracker.iphone_tk' %}
          tk
        {% elif trigger.entity_id == 'device_tracker.iphone_monika' %}
          mk
        {% else %}
          unknown
        {% endif %}
      czas: '{{ now().strftime(''%Y-%m-%d %H:%M:%S'') }}'
      wpis: '{{ kto }}|{{ czas }}'
  - target:
      entity_id: input_text.wjazd_3
    data:
      value: '{{ states(''input_text.wjazd_2'') }}'
    action: input_text.set_value
  - target:
      entity_id: input_text.wjazd_2
    data:
      value: '{{ states(''input_text.wjazd_1'') }}'
    action: input_text.set_value
  - target:
      entity_id: input_text.wjazd_1
    data:
      value: '{{ wpis }}'
    action: input_text.set_value
  - action: script.log_push
    data:
      wpis: >
        {"ts":"{{ now().strftime('%Y-%m-%dT%H:%M') }}","typ":"wjazd",
        "kto":"{% if trigger.entity_id == 'device_tracker.iphone_tk' %}tk{% else %}mk{% endif %}"}
  - action: >
      {% if trigger.entity_id == 'device_tracker.iphone_tk' %}
        notify.mobile_app_iphone_tk
      {% elif trigger.entity_id == 'device_tracker.iphone_monika' %}
        notify.mobile_app_iphone_monika
      {% endif %}
    data:
      title: "🏠 Witaj w domu!"
      message: >
        {% if trigger.entity_id == 'device_tracker.iphone_tk' %}
          🙋 Cześć Tomek, brama otwarta!
        {% elif trigger.entity_id == 'device_tracker.iphone_monika' %}
          🙋 Cześć Monika, brama otwarta!
        {% endif %}
  mode: queued
  max: 2


