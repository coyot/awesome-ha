  mode: single
- id: kwiaty_otworz_rano
  alias: "Kwiaty: otwórz rolety rano (poza domem)"
  trigger:
  - platform: sun
    event: sunrise
    offset: 00:10:00
  condition:
  - condition: state
    entity_id: device_tracker.iphone_tk
    state: not_home
  - condition: state
    entity_id: device_tracker.iphone_monika
    state: not_home
  action:
  - choose:
    - conditions:
      - condition: template
        value_template: '{{ states(''weather.forecast_home'') in [''sunny'',''partlycloudy'',''clear-night'']
          }}

          '
      sequence:
      - service: cover.open_cover
        target:
          entity_id:
          - cover.rollershutter_0001
          - cover.rollershutter_0002
          - cover.rollershutter_0009
      - action: logbook.log
        data:
          name: Kwiaty — rolety
          message: 'OTWARTO | wschód +10 min | pogodnie | weather: {{ states(''weather.forecast_home'')
            }}

            '
      - action: script.log_push
        data:
          wpis: '{"ts":"{{ now().strftime(''%Y-%m-%dT%H:%M'') }}","typ":"kwiaty",
            "akcja":"OPEN","info":"pogodnie · {{ states(''weather.forecast_home'')
            }} · wschód +10min · rolety 1,2,9"}

            '
    default:
    - delay:
        minutes: 80
    - service: cover.open_cover
      target:
        entity_id:
        - cover.rollershutter_0001
        - cover.rollershutter_0002
        - cover.rollershutter_0009
    - action: logbook.log
      data:
        name: Kwiaty — rolety
        message: 'OTWARTO | wschód +90 min | pochmurnie | weather: {{ states(''weather.forecast_home'')
          }}

          '
    - action: script.log_push
      data:
        wpis: '{"ts":"{{ now().strftime(''%Y-%m-%dT%H:%M'') }}","typ":"kwiaty", "akcja":"OPEN","info":"pochmurnie
          · {{ states(''weather.forecast_home'') }} · wschód +90min · rolety 1,2,9"}

          '
  mode: single
- id: kwiaty_zamknij_wieczor
