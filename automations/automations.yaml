- id: szambo_wywoz_akcja
  alias: "Szambo: wywóz — loguj i resetuj"
  description: ''
  triggers:
  - trigger: state
    entity_id:
    - input_button.wywoz_szamba
  conditions: []
  actions:
  - action: logbook.log
    data:
      name: "Wywóz szamba \U0001F69B"
      message: 'Dom 1: {{ states(''sensor.szambo_dom_1_zuzycie'') }} m³ = {{ states(''sensor.szambo_dom_1_do_zaplaty'')
        }} zł | Dom 2: {{ states(''sensor.szambo_dom_2_zuzycie'') }} m³ = {{ states(''sensor.szambo_dom_2_do_zaplaty'')
        }} zł | Łącznie: {{ states(''sensor.szambo_zuzycie'') }} m³ = 320 zł

        '
  - action: rest_command.szambo_google_sheets
    data:
      dom1_m3: '{{ states(''sensor.szambo_dom_1_zuzycie'') | replace(".", ",") }}'
      dom1_zl: '{{ states(''sensor.szambo_dom_1_do_zaplaty'') | replace(".", ",")
        }}'
      dom2_m3: '{{ states(''sensor.szambo_dom_2_zuzycie'') | replace(".", ",") }}'
      dom2_zl: '{{ states(''sensor.szambo_dom_2_do_zaplaty'') | replace(".", ",")
        }}'
      lacznie_m3: '{{ states(''sensor.szambo_zuzycie'') | replace(".", ",") }}'
  - action: script.log_push
    data:
      wpis: '{"ts":"{{ now().strftime(''%Y-%m-%dT%H:%M'') }}","typ":"szambo", "d1m":{{
        states(''sensor.szambo_dom_1_zuzycie'') | float(0) | round(2) }}, "d1z":{{
        states(''sensor.szambo_dom_1_do_zaplaty'') | float(0) | round(0) | int }},
        "d2m":{{ states(''sensor.szambo_dom_2_zuzycie'') | float(0) | round(2) }},
        "d2z":{{ states(''sensor.szambo_dom_2_do_zaplaty'') | float(0) | round(0)
        | int }}, "lm":{{ states(''sensor.szambo_zuzycie'') | float(0) | round(2)
        }}}

        '
  - delay:
      hours: 0
      minutes: 0
      seconds: 3
      milliseconds: 0
  - action: input_number.set_value
    target:
      entity_id: input_number.szambo_wywoz
    data:
      value: '{{ states(''sensor.water_1_total_2'') | float(0) + states(''sensor.water_2_total'')
        | float(0) }}'
  - action: input_number.set_value
    target:
      entity_id: input_number.szambo_wywoz_dom_1
    data:
      value: '{{ states(''sensor.water_1_total_2'') | float(0) }}'
  - action: input_number.set_value
    target:
      entity_id: input_number.szambo_wywoz_dom_2
    data:
      value: '{{ states(''sensor.water_2_total'') | float(0) }}'
  - action: input_number.set_value
    target:
      entity_id: input_number.szambo_wywoz_ogrod_1
    data:
      value: '{{ states(''input_number.ogrod_1'') | float(0) }}'
  - action: input_number.set_value
    target:
      entity_id: input_number.szambo_wywoz_ogrod_2
    data:
      value: '{{ states(''input_number.ogrod_2'') | float(0) }}'
  - action: input_text.set_value
    data:
      entity_id: input_text.szambo_h10
      value: '{{ states(''input_text.szambo_h9'') }}'
  - action: input_text.set_value
    data:
      entity_id: input_text.szambo_h9
      value: '{{ states(''input_text.szambo_h8'') }}'
  - action: input_text.set_value
    data:
      entity_id: input_text.szambo_h8
      value: '{{ states(''input_text.szambo_h7'') }}'
  - action: input_text.set_value
    data:
      entity_id: input_text.szambo_h7
      value: '{{ states(''input_text.szambo_h6'') }}'
  - action: input_text.set_value
    data:
      entity_id: input_text.szambo_h6
      value: '{{ states(''input_text.szambo_h5'') }}'
  - action: input_text.set_value
    data:
      entity_id: input_text.szambo_h5
      value: '{{ states(''input_text.szambo_h4'') }}'
  - action: input_text.set_value
    data:
      entity_id: input_text.szambo_h4
      value: '{{ states(''input_text.szambo_h3'') }}'
  - action: input_text.set_value
    data:
      entity_id: input_text.szambo_h3
      value: '{{ states(''input_text.szambo_h2'') }}'
  - action: input_text.set_value
    data:
      entity_id: input_text.szambo_h2
      value: '{{ states(''input_text.szambo_h1'') }}'
  - action: input_text.set_value
    data:
      entity_id: input_text.szambo_h1
      value: '{"d":"{{ now().strftime(''%Y-%m-%d'') }}", "d1m":{{ states(''sensor.szambo_dom_1_zuzycie'')
        | float(0) | round(2) }}, "d1z":{{ states(''sensor.szambo_dom_1_do_zaplaty'')
        | float(0) | round(0) | int }}, "d2m":{{ states(''sensor.szambo_dom_2_zuzycie'')
        | float(0) | round(2) }}, "d2z":{{ states(''sensor.szambo_dom_2_do_zaplaty'')
        | float(0) | round(0) | int }}, "lm":{{ states(''sensor.szambo_zuzycie'')
        | float(0) | round(2) }}}

        '
  - target:
      entity_id: input_datetime.ostatni_wywoz_szamba
    data:
      datetime: '{{ now().strftime(''%Y-%m-%d %H:%M:%S'') }}'
    action: input_datetime.set_datetime
  mode: single
- id: ogrod_potwierdz_dane
  alias: "Ogród: potwierdź dane"
  description: ''
  triggers:
  - trigger: state
    entity_id: input_button.ogrod_potwierdz
  actions:
  - action: input_datetime.set_datetime
    target:
      entity_id: input_datetime.ogrod_ostatnia_aktualizacja
    data:
      datetime: '{{ now().strftime(''%Y-%m-%d %H:%M:%S'') }}'
- id: szambo_alert_poranny
  alias: "Szambo: alert poranny (07:00)"
  description: Sprawdza poziom szamba i wysyła powiadomienie raz dziennie
  triggers:
  - at: 07:00:00
    trigger: time
  actions:
  - choose:
      - conditions:
          - condition: numeric_state
            entity_id: sensor.szambo_zuzycie
            above: 9
        sequence:
          - action: notify.iphone_tk
            data:
              title: "🚨🚨🚨 Szambo na granicy! 🚨🚨🚨"
              message: "Poziom szamba przekroczył 9 m³! Aktualnie: {{ states('sensor.szambo_zuzycie') }} m³. Pilnie zamów wywóz."
          - action: notify.iphone_monika
            data:
              title: "🚨🚨🚨 Szambo na granicy! 🚨🚨🚨"
              message: "Poziom szamba przekroczył 9 m³! Aktualnie: {{ states('sensor.szambo_zuzycie') }} m³. Pilnie zamów wywóz."
      - conditions:
          - condition: numeric_state
            entity_id: sensor.szambo_zuzycie
            above: 8
        sequence:
          - action: notify.iphone_tk
            data:
              title: "⚠️ Szambo blisko pełnego"
              message: "Szambo przekroczyło 8 m³. Aktualnie: {{ states('sensor.szambo_zuzycie') }} m³. Warto zamówić wywóz."
          - action: notify.iphone_monika
            data:
              title: "⚠️ Szambo blisko pełnego"
              message: "Szambo przekroczyło 8 m³. Aktualnie: {{ states('sensor.szambo_zuzycie') }} m³. Warto zamówić wywóz."
      - conditions:
          - condition: numeric_state
            entity_id: sensor.szambo_zuzycie
            above: 7
        sequence:
          - action: notify.iphone_tk
            data:
              title: "ℹ️ Szambo zaczyna się zapełniać"
              message: "Szambo przekroczyło 7 m³. Aktualnie: {{ states('sensor.szambo_zuzycie') }} m³. Kontroluj."
          - action: notify.iphone_monika
            data:
              title: "ℹ️ Szambo zaczyna się zapełniać"
              message: "Szambo przekroczyło 7 m³. Aktualnie: {{ states('sensor.szambo_zuzycie') }} m³. Kontroluj."
  mode: single
- id: szambo_alert_krytyczny
  alias: "Szambo: alert real-time (>9 m³)"
  description: >
    Natychmiastowy alert gdy szambo przekroczy 9 m³ — nie czeka do 7:00 rano.
    Debounce 5 min by uniknąć skoków sensora.
  triggers:
  - trigger: numeric_state
    entity_id: sensor.szambo_zuzycie
    above: 9
    for:
      minutes: 5
  actions:
  - action: notify.iphone_tk
    data:
      title: "\U0001F6A8 Szambo na granicy!"
      message: >
        Szambo przekroczyło 9 m³! Aktualnie: {{ states('sensor.szambo_zuzycie') }} m³.
        Pilnie zamów wywóz.
  - action: notify.iphone_monika
    data:
      title: "\U0001F6A8 Szambo na granicy!"
      message: >
        Szambo przekroczyło 9 m³! Aktualnie: {{ states('sensor.szambo_zuzycie') }} m³.
        Pilnie zamów wywóz.
  - action: logbook.log
    data:
      name: "Szambo"
      message: >
        ALERT KRYTYCZNY | {{ states('sensor.szambo_zuzycie') }} m³ > 9 m³
  - action: script.log_push
    data:
      wpis: >
        {"ts":"{{ now().strftime('%Y-%m-%dT%H:%M') }}","typ":"szambo",
        "akcja":"ALERT_KRYTYCZNY","lm":{{ states('sensor.szambo_zuzycie') | float(0) | round(2) }}}
  mode: single
- id: brama_otworz_powrot
  alias: "Brama: otwórz przy powrocie"
  triggers:
  - trigger: zone
    entity_id: device_tracker.iphone_tk
    zone: zone.home
    event: enter
  - trigger: zone
    entity_id: device_tracker.iphone_monika
    zone: zone.home
    event: enter
  actions:
  - action: rest_command.blynk_open_gate
  - variables:
      kto: "{% if trigger.entity_id == 'device_tracker.iphone_tk' %}\n  tk\n{% elif
        trigger.entity_id == 'device_tracker.iphone_monika' %}\n  mk\n{% else %}\n
        \ unknown\n{% endif %}\n"
      czas: '{{ now().strftime(''%Y-%m-%d %H:%M:%S'') }}'
      wpis: '{{ kto }}|{{ czas }}'
  - target:
      entity_id: input_text.wjazd_3
    data:
      value: '{{ states(''input_text.wjazd_2'') }}'
    action: input_text.set_value
  - target:
      entity_id: input_text.wjazd_2
    data:
      value: '{{ states(''input_text.wjazd_1'') }}'
    action: input_text.set_value
  - target:
      entity_id: input_text.wjazd_1
    data:
      value: '{{ wpis }}'
    action: input_text.set_value
  - action: script.log_push
    data:
      wpis: '{"ts":"{{ now().strftime(''%Y-%m-%dT%H:%M'') }}","typ":"wjazd", "kto":"{%
        if trigger.entity_id == ''device_tracker.iphone_tk'' %}tk{% else %}mk{% endif
        %}"}

        '
  - choose:
      - conditions:
          - condition: template
            value_template: "{{ trigger.entity_id == 'device_tracker.iphone_tk' }}"
        sequence:
          - action: notify.iphone_tk
            data:
              title: "🏠 Witaj w domu!"
              message: "👋 Cześć Tomek, brama otwarta!"
      - conditions:
          - condition: template
            value_template: "{{ trigger.entity_id == 'device_tracker.iphone_monika' }}"
        sequence:
          - action: notify.iphone_monika
            data:
              title: "🏠 Witaj w domu!"
              message: "👋 Cześć Monika, brama otwarta!"
  mode: queued
  max: 2
- alias: "Ogród 1: potwierdź"
  id: ogrod_1_potwierdz
  trigger:
  - platform: state
    entity_id: input_button.ogrod_1_potwierdz
  action:
  - service: input_datetime.set_datetime
    target:
      entity_id: input_datetime.ogrod_1_ostatnia_aktualizacja
    data:
      datetime: '{{ now().strftime(''%Y-%m-%d %H:%M:%S'') }}'
- alias: "Ogród 2: potwierdź"
  id: ogrod_2_potwierdz
  trigger:
  - platform: state
    entity_id: input_button.ogrod_2_potwierdz
  action:
  - service: input_datetime.set_datetime
    target:
      entity_id: input_datetime.ogrod_2_ostatnia_aktualizacja
    data:
      datetime: '{{ now().strftime(''%Y-%m-%d %H:%M:%S'') }}'
- id: smieciarnia_alert_wieczor
  alias: "Śmieciarnia: alert wieczorny (17:30)"
  description: Wysyła powiadomienia o 17:30 na dzień przed wywozem — zawsze do obojga, niezależnie od obecności.
  triggers:
  - at: '17:30:00'
    trigger: time
  actions:
  - variables:
      sensors:
      - entity: sensor.harmonogram_bio
        name: "\U0001F33F Bio"
      - entity: sensor.harmonogram_segregowane
        name: ♻️ Segregowane (Papier/Plastik/Szkło)
      - entity: sensor.harmonogram_zmieszane
        name: "\U0001F5D1️ Zmieszane"
      - entity: sensor.harmonogram_gabaryty
        name: "\U0001F6CB️ Gabaryty"
      items_tomorrow: "{% set found = ns(types=[]) %} {% for s in sensors if states(s.entity)
        == '1' %}\n  {% set found.types = found.types + [s.name] %}\n{% endfor %}
        {{ found.types | join(', ') }}\n"
      oboje_poza: '{{ not is_state(''device_tracker.iphone_tk'', ''home'') and not is_state(''device_tracker.iphone_monika'', ''home'') }}'
  - condition: template
    value_template: '{{ items_tomorrow != "" }}'
  - action: notify.iphone_monika
    data:
      title: "\U0001F69B Jutro wywóz śmieci!"
      message: >
        Jutro wywozimy: {{ items_tomorrow }}.
        {% if oboje_poza %}
        ⚠️ Jesteście poza domem — zadbajcie o wystawienie kubłów!
        {% else %}
        ⚠️ Pamiętaj o wystawieniu kubłów przed dom.
        {% endif %}
  - action: notify.iphone_tk
    data:
      title: "\U0001F69B Jutro wywóz śmieci!"
      message: >
        Jutro wywozimy: {{ items_tomorrow }}.
        {% if oboje_poza %}
        ⚠️ Jesteście poza domem — zadbajcie o wystawienie kubłów!
        {% else %}
        ⚠️ Nie zapomnij wystawić kubłów przed dom.
        {% endif %}
  mode: restart
- id: porecz_wlacz_wieczor
  alias: "Poręcz: włącz wieczorem"
  trigger:
  - platform: sun
    event: sunset
    offset: -01:30:00
  condition:
  - condition: or
    conditions:
    - condition: state
      entity_id: device_tracker.iphone_tk
      state: home
    - condition: state
      entity_id: device_tracker.iphone_monika
      state: home
  action:
  - choose:
    - conditions:
      - condition: template
        value_template: '{{ states(''sensor.stacja_pogodowa_solar_radiation'') | float(-1)
          >= 50 }}

          '
      sequence:
      - delay:
          minutes: 70
      - service: switch.turn_on
        target:
          entity_id: switch.porecz_klatka_schodowa_socket_1
      - action: logbook.log
        data:
          name: Poręcz klatka
          entity_id: switch.porecz_klatka_schodowa_socket_1
          message: 'WŁĄCZONO | zachód −20 min | pogodnie | radiation: {{ states(''sensor.stacja_pogodowa_solar_radiation'')
            | round(0) }} W/m²

            '
      - action: script.log_push
        data:
          wpis: '{"ts":"{{ now().strftime(''%Y-%m-%dT%H:%M'') }}","typ":"porecz",
            "akcja":"ON","info":"pogodnie {{ states(''sensor.stacja_pogodowa_solar_radiation'')
            | round(0) }}W/m² · zachód −20min"}

            '
    default:
    - service: switch.turn_on
      target:
        entity_id: switch.porecz_klatka_schodowa_socket_1
    - action: logbook.log
      data:
        name: Poręcz klatka
        entity_id: switch.porecz_klatka_schodowa_socket_1
        message: 'WŁĄCZONO | zachód −90 min | pochmurnie | radiation: {{ states(''sensor.stacja_pogodowa_solar_radiation'')
          | round(0) }} W/m²

          '
    - action: script.log_push
      data:
        wpis: '{"ts":"{{ now().strftime(''%Y-%m-%dT%H:%M'') }}","typ":"porecz", "akcja":"ON","info":"pochmurnie
          {{ states(''sensor.stacja_pogodowa_solar_radiation'') | round(0) }}W/m²
          · zachód −90min"}

          '
  mode: single
- id: porecz_wylacz_rano
  alias: "Poręcz: wyłącz rano"
  triggers:
  - event: sunrise
    offset: 00:10:00
    trigger: sun
  conditions:
  - condition: or
    conditions:
    - condition: state
      entity_id: device_tracker.iphone_tk
      state: home
    - condition: state
      entity_id: device_tracker.iphone_monika
      state: home
  actions:
  - choose:
    - conditions:
      - condition: template
        value_template: '{{ states(''weather.forecast_home'') in [''sunny'',''partlycloudy'',''clear-night'']
          }}

          '
      sequence:
      - target:
          entity_id: switch.porecz_klatka_schodowa_socket_1
        action: switch.turn_off
      - action: logbook.log
        data:
          name: Poręcz klatka
          entity_id: switch.porecz_klatka_schodowa_socket_1
          message: 'WYŁĄCZONO | wschód +10 min | pogodnie | weather: {{ states(''weather.forecast_home'')
            }}

            '
      - action: script.log_push
        data:
          wpis: '{"ts":"{{ now().strftime(''%Y-%m-%dT%H:%M'') }}","typ":"porecz",
            "akcja":"OFF","info":"pogodnie · {{ states(''weather.forecast_home'')
            }} · wschód +10min"}

            '
    default:
    - delay:
        minutes: 80
    - target:
        entity_id: switch.porecz_klatka_schodowa_socket_1
      action: switch.turn_off
    - action: logbook.log
      data:
        name: Poręcz klatka
        entity_id: switch.porecz_klatka_schodowa_socket_1
        message: 'WYŁĄCZONO | wschód +90 min | pochmurnie | weather: {{ states(''weather.forecast_home'')
          }}

          '
    - action: script.log_push
      data:
        wpis: '{"ts":"{{ now().strftime(''%Y-%m-%dT%H:%M'') }}","typ":"porecz", "akcja":"OFF","info":"pochmurnie
          · {{ states(''weather.forecast_home'') }} · wschód +90min"}

          '
  mode: single
- id: porecz_wlacz_powrot
  alias: "Poręcz: włącz przy powrocie (po zmroku)"
  description: 'Gdy ktoś wraca do domu po zachodzie słońca, a oświetlenie jest wyłączone
    — włącz je.

    '
  trigger:
  - platform: state
    entity_id:
    - device_tracker.iphone_tk
    - device_tracker.iphone_monika
    to: home
  condition:
  - condition: state
    entity_id: sun.sun
    state: below_horizon
  - condition: state
    entity_id: switch.porecz_klatka_schodowa_socket_1
    state: 'off'
  action:
  - service: switch.turn_on
    target:
      entity_id: switch.porecz_klatka_schodowa_socket_1
  - action: logbook.log
    data:
      name: Poręcz klatka
      entity_id: switch.porecz_klatka_schodowa_socket_1
      message: 'WŁĄCZONO | powrót do domu po zmroku | kto: {% if trigger.entity_id
        == ''device_tracker.iphone_tk'' %}Tomek{% elif trigger.entity_id == ''device_tracker.iphone_monika''
        %}Monika{% else %}nieznany{% endif %} | radiation: {{ states(''sensor.stacja_pogodowa_solar_radiation'')
        | round(0) }} W/m²

        '
  - action: script.log_push
    data:
      wpis: '{"ts":"{{ now().strftime(''%Y-%m-%dT%H:%M'') }}","typ":"porecz", "akcja":"ON","info":"powrót
        po zmroku · {% if trigger.entity_id == ''device_tracker.iphone_tk'' %}Tomek{%
        else %}Monika{% endif %}"}

        '
  mode: single
- id: porecz_wylacz_failsafe
  alias: "Poręcz: wyłącz failsafe (12:00)"
  description: 'Awaryjnie wyłącza oświetlenie o 12:00 jeśli nadal świeci.

    '
  trigger:
  - platform: time
    at: '12:00:00'
  condition:
  - condition: state
    entity_id: switch.porecz_klatka_schodowa_socket_1
    state: 'on'
  action:
  - service: switch.turn_off
    target:
      entity_id: switch.porecz_klatka_schodowa_socket_1
  - action: logbook.log
    data:
      name: Poręcz klatka
      entity_id: switch.porecz_klatka_schodowa_socket_1
      message: 'WYŁĄCZONO | failsafe 12:00 | switch był nadal włączony | radiation:
        {{ states(''sensor.stacja_pogodowa_solar_radiation'') | round(0) }} W/m²

        '
  - action: script.log_push
    data:
      wpis: '{"ts":"{{ now().strftime(''%Y-%m-%dT%H:%M'') }}","typ":"porecz", "akcja":"OFF","info":"⚠️
        failsafe 12:00 · switch był nadal włączony"}

        '
  mode: single
- id: kontaktrony_alert_noc
  alias: "Kontaktrony: alert nocny (22:00)"
  description: >
    Codziennie o 22:00 sprawdza wszystkie czujniki otwarcia (binary_sensor
    z device_class door/window/opening) w domu. Jeśli któryś jest otwarty,
    wysyła powiadomienie do domowników przebywających w zone.home.
  triggers:
    - trigger: time
      at: "22:00:00"
  variables:
    otwarte: >
      {{ states.binary_sensor
         | selectattr('attributes.device_class', 'in',
             ['door', 'window', 'opening', 'garage_door'])
         | selectattr('state', 'eq', 'on')
         | map(attribute='entity_id')
         | list }}
  conditions:
    - condition: template
      value_template: "{{ otwarte | count > 0 }}"
  actions:
    - if:
        - condition: zone
          entity_id: person.tk
          zone: zone.home
      then:
        - action: notify.iphone_tk
          data:
            title: "🔓 Otwarte czujniki o 22:00 ({{ otwarte | count }})"
            message: >
              {% macro ikona(name) %}{%- set n = name | lower %}{%- if 'garaż' in n
              or 'garaz' in n or 'brama' in n %}🏠{%- elif 'drzwi' in n %}🚪{%- elif
              'okno' in n or 'okna' in n or 'okien' in n %}🪟{%- else %}🔓{% endif
              %}{%- endmacro %} {% for s in otwarte %}{{ ikona(states[s].attributes.friendly_name)
              }} {{ states[s].attributes.friendly_name }}{% if not loop.last %} {% endif
              %}{% endfor %}
            data:
              push:
                sound: default
    - if:
        - condition: zone
          entity_id: person.monika
          zone: zone.home
      then:
        - action: notify.iphone_monika
          data:
            title: "🔓 Otwarte czujniki o 22:00 ({{ otwarte | count }})"
            message: >
              {% macro ikona(name) %}{%- set n = name | lower %}{%- if 'garaż' in n
              or 'garaz' in n or 'brama' in n %}🏠{%- elif 'drzwi' in n %}🚪{%- elif
              'okno' in n or 'okna' in n or 'okien' in n %}🪟{%- else %}🔓{% endif
              %}{%- endmacro %} {% for s in otwarte %}{{ ikona(states[s].attributes.friendly_name)
              }} {{ states[s].attributes.friendly_name }}{% if not loop.last %} {% endif
              %}{% endfor %}
            data:
              push:
                sound: default
    - action: logbook.log
      data:
        name: Kontaktrony nocne
        message: >
          {% macro ikona(name) %}{%- set n = name | lower %}{%- if 'garaż' in n or
          'garaz' in n or 'brama' in n %}🏠{%- elif 'drzwi' in n %}🚪{%- elif 'okno'
          in n or 'okna' in n or 'okien' in n %}🪟{%- else %}🔓{% endif %}{%- endmacro
          %} {{ otwarte | count }} otwart{{ 'y' if otwarte | count == 1 else 'e' }}:
          {% for s in otwarte %}{{ ikona(states[s].attributes.friendly_name) }} {{
          states[s].attributes.friendly_name }}{% if not loop.last %}, {% endif %}{% endfor %}
    - action: script.log_push
      data:
        wpis: >
          {"ts":"{{ now().strftime('%Y-%m-%dT%H:%M') }}","typ":"kontaktrony_22",
          "otwarte":{{ otwarte | count }},"lista":"{% for s in otwarte %}{{
          states[s].attributes.friendly_name }}{% if not loop.last %} | {% endif %}{% endfor %}"}
  mode: single
- alias: "Biuro wiatrak: włącz przy upale"
  description: 'Gdy temperatura w biurze przekroczy 26°C w godzinach 7:00–22:00 i
    TK jest w domu — włącz wiatrak.

    '
  trigger:
  - platform: numeric_state
    entity_id: sensor.biuro_temperature
    above: 25
    for:
      minutes: 2
  condition:
  - condition: time
    after: 07:00:00
    before: '22:00:00'
  - condition: zone
    entity_id: person.tk
    zone: zone.home
  action:
  - service: switch.turn_on
    target:
      entity_id: switch.biuro_wiatrak
  - action: logbook.log
    data:
      name: Wiatrak biuro
      entity_id: switch.biuro_wiatrak
      message: 'WŁĄCZONO | temp {{ states(''sensor.biuro_temperature'') | round(1)
        }}°C > 25°C

        '
  - action: script.log_push
    data:
      wpis: '{"ts":"{{ now().strftime(''%Y-%m-%dT%H:%M'') }}","typ":"wiatrak_biuro",
        "akcja":"ON","info":"temp {{ states(''sensor.biuro_temperature'') | float(0)
        | round(1) }}°C"}

        '
  mode: single
  id: wiatrak_biuro_wlacz_upal
- alias: "Biuro wiatrak: wyłącz (temp OK lub 22:00)"
  description: 'Wyłącz wiatrak gdy temperatura w biurze spadnie do 22°C lub poniżej,
    albo gdy wybije 22:00.

    '
  trigger:
  - platform: numeric_state
    entity_id: sensor.biuro_temperature
    below: 22.1
  - platform: time
    at: '22:00:00'
  condition:
  - condition: state
    entity_id: switch.biuro_wiatrak
    state: 'on'
  action:
