- id: '1773306989018'
  alias: akcja wywoz szamba
  description: ''
  triggers:
  - trigger: state
    entity_id:
    - input_button.wywoz_szamba
  conditions: []
  actions:
  - action: logbook.log
    data:
      name: "Wywóz szamba 🚛"
      message: >
        Dom 1: {{ states('sensor.szambo_dom_1_zuzycie') }} m³ = {{ states('sensor.szambo_dom_1_do_zaplaty') }} zł |
        Dom 2: {{ states('sensor.szambo_dom_2_zuzycie') }} m³ = {{ states('sensor.szambo_dom_2_do_zaplaty') }} zł |
        Łącznie: {{ states('sensor.szambo_zuzycie') }} m³ = 320 zł
  - action: rest_command.szambo_google_sheets
    data:
      dom1_m3: '{{ states(''sensor.szambo_dom_1_zuzycie'') }}'
      dom1_zl: '{{ states(''sensor.szambo_dom_1_do_zaplaty'') }}'
      dom2_m3: '{{ states(''sensor.szambo_dom_2_zuzycie'') }}'
      dom2_zl: '{{ states(''sensor.szambo_dom_2_do_zaplaty'') }}'
      lacznie_m3: '{{ states(''sensor.szambo_zuzycie'') }}'
