- alias: "Biuro wiatrak: włącz przy upale"
  description: >
    Gdy temperatura w biurze przekroczy 26°C w godzinach 7:00–22:00
    i TK jest w domu — włącz wiatrak.

  trigger:
    - platform: numeric_state
      entity_id: sensor.biuro_temperature
      above: 25
      for:
        minutes: 2

  condition:
    - condition: time
      after: "07:00:00"
      before: "22:00:00"
    - condition: zone
      entity_id: person.tk
      zone: zone.home

  action:
    - service: switch.turn_on
      target:
        entity_id: switch.biuro_wiatrak

    - action: logbook.log
      data:
        name: "Wiatrak biuro"
        entity_id: switch.biuro_wiatrak
        message: >
          WŁĄCZONO | temp {{ states('sensor.biuro_temperature') | round(1) }}°C > 25°C

    - action: script.log_push
      data:
        wpis: >
          {"ts":"{{ now().strftime('%Y-%m-%dT%H:%M') }}","typ":"wiatrak_biuro",
          "akcja":"ON","info":"temp {{ states('sensor.biuro_temperature') | float(0) | round(1) }}°C"}

  mode: single

- alias: "Biuro wiatrak: wyłącz (temp OK lub godzina)"
  description: >
    Wyłącz wiatrak gdy temperatura w biurze spadnie do 22°C lub poniżej,
    albo gdy wybije 22:00 (pn–pt) lub 20:00 (sob–nd).

  trigger:
    - platform: numeric_state
      id: temp_ok
      entity_id: sensor.biuro_temperature
      below: 22.1
    - platform: time
      id: time_weekday
      at: "22:00:00"
    - platform: time
      id: time_weekend
      at: "20:00:00"

  condition:
    - condition: state
      entity_id: switch.biuro_wiatrak
      state: "on"
    - condition: or
      conditions:
        - condition: trigger
          id: temp_ok
        - condition: and
          conditions:
            - condition: trigger
              id: time_weekday
            - condition: time
              weekday: [mon, tue, wed, thu, fri]
        - condition: and
          conditions:
            - condition: trigger
              id: time_weekend
            - condition: time
              weekday: [sat, sun]

  action:
    - service: switch.turn_off
      target:
        entity_id: switch.biuro_wiatrak

    - action: logbook.log
      data:
        name: "Wiatrak biuro"
        entity_id: switch.biuro_wiatrak
        message: >
          WYŁĄCZONO | {% if trigger.id == 'time_weekday' %}22:00 (dzień roboczy)
          {% elif trigger.id == 'time_weekend' %}20:00 (weekend)
          {% else %}temp {{ states('sensor.biuro_temperature') | round(1) }}°C ≤ 22°C{% endif %}

    - action: script.log_push
      data:
        wpis: >
          {"ts":"{{ now().strftime('%Y-%m-%dT%H:%M') }}","typ":"wiatrak_biuro",
          "akcja":"OFF","info":"{% if trigger.id == 'time_weekday' %}22:00{% elif trigger.id == 'time_weekend' %}20:00{% else %}temp {{ states('sensor.biuro_temperature') | float(0) | round(1) }}°C{% endif %}"}

  mode: single
