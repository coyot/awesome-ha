- alias: "Wiatrak biuro – włącz przy upale"
  description: >
    Gdy temperatura w biurze przekroczy 26°C w godzinach 7:00–22:00
    i TK jest w domu — włącz wiatrak.

  trigger:
    - platform: numeric_state
      entity_id: sensor.biuro_temperature
      above: 26

  condition:
    - condition: time
      after: "07:00:00"
      before: "22:00:00"
    - condition: zone
      entity_id: person.tk
      zone: zone.home
    - condition: state
      entity_id: switch.biuro_wiatrak
      state: "off"

  action:
    - service: switch.turn_on
      target:
        entity_id: switch.biuro_wiatrak

    - action: logbook.log
      data:
        name: "Wiatrak biuro"
        entity_id: switch.biuro_wiatrak
        message: >
          WŁĄCZONO | temp {{ states('sensor.biuro_temperature') | round(1) }}°C > 26°C

    - action: script.log_push
      data:
        wpis: >
          {"ts":"{{ now().strftime('%Y-%m-%dT%H:%M') }}","typ":"wiatrak_biuro",
          "akcja":"ON","info":"temp {{ states('sensor.biuro_temperature') | float(0) | round(1) }}°C"}

  mode: single

- alias: "Wiatrak biuro – wyłącz (temperatura OK lub 22:00)"
  description: >
    Wyłącz wiatrak gdy temperatura w biurze spadnie do 22°C lub poniżej,
    albo gdy wybije 22:00.

  trigger:
    - platform: numeric_state
      entity_id: sensor.biuro_temperature
      below: 22.1
    - platform: time
      at: "22:00:00"

  condition:
    - condition: state
      entity_id: switch.biuro_wiatrak
      state: "on"

  action:
    - service: switch.turn_off
      target:
        entity_id: switch.biuro_wiatrak

    - action: logbook.log
      data:
        name: "Wiatrak biuro"
        entity_id: switch.biuro_wiatrak
        message: >
          WYŁĄCZONO | {% if trigger.platform == 'time' %}22:00{% else %}temp {{ states('sensor.biuro_temperature') | round(1) }}°C ≤ 22°C{% endif %}

    - action: script.log_push
      data:
        wpis: >
          {"ts":"{{ now().strftime('%Y-%m-%dT%H:%M') }}","typ":"wiatrak_biuro",
          "akcja":"OFF","info":"{% if trigger.platform == 'time' %}22:00{% else %}temp {{ states('sensor.biuro_temperature') | float(0) | round(1) }}°C{% endif %}"}

  mode: single
