- alias: "Biuro prąd: ostrzeżenie (21:00 pn–pt)"
  description: >
    O 21:00 w dni robocze: jeśli switch.biuro jest włączony, wyślij powiadomienie
    do iphone_tk że za godzinę prąd w biurze zostanie wyłączony.

  trigger:
    - platform: time
      at: "21:00:00"

  condition:
    - condition: time
      weekday: [mon, tue, wed, thu, fri]
    - condition: state
      entity_id: switch.biuro
      state: "on"

  action:
    - service: notify.mobile_app_iphone_tk
      data:
        title: "⚡ Biuro – prąd włączony"
        message: "Prąd w biurze jest włączony. Za godzinę (22:00) zostanie automatycznie wyłączony."
        data:
          push:
            sound: default

    - action: logbook.log
      data:
        name: "Biuro prąd"
        entity_id: switch.biuro
        message: >
          OSTRZEŻENIE | prąd włączony — wyłączenie zaplanowane na 22:00

    - action: script.log_push
      data:
        wpis: >
          {"ts":"{{ now().strftime('%Y-%m-%dT%H:%M') }}","typ":"biuro_prad",
          "akcja":"WARN","info":"prąd włączony · wyłączenie za 1h o 22:00"}

  mode: single


- alias: "Biuro prąd: wyłącz (22:00 pn–pt)"
  description: >
    O 22:00 w dni robocze wyłącz switch.biuro jeśli jest włączony.

  trigger:
    - platform: time
      at: "22:00:00"

  condition:
    - condition: time
      weekday: [mon, tue, wed, thu, fri]
    - condition: state
      entity_id: switch.biuro
      state: "on"

  action:
    - service: switch.turn_off
      target:
        entity_id: switch.biuro

    - action: logbook.log
      data:
        name: "Biuro prąd"
        entity_id: switch.biuro
        message: >
          WYŁĄCZONO | automatycznie o 22:00 (dzień roboczy)

    - action: script.log_push
      data:
        wpis: >
          {"ts":"{{ now().strftime('%Y-%m-%dT%H:%M') }}","typ":"biuro_prad",
          "akcja":"OFF","info":"22:00 automatyczne"}

  mode: single
