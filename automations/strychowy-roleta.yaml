# ============================================================
# AUTOMATYZACJA: Strychowy — zamknij roletę przy upale
#
# LOGIKA:
#   Trigger: temperatura strychowego (sensor.termometr_strychowy_temperature)
#            przekroczy 25°C w ciągu dnia (między wschodem a zachodem słońca)
#
#   Akcja: zamknij cover.rollershutter_0009
#
#   Mode: single — nie powtarza jeśli już wykonane
# ============================================================

- id: strychowy_roleta_zamknij_upal
  alias: "Roleta strychowy: zamknij przy upale (≥25°C, 5 min)"
  trigger:
    - platform: numeric_state
      entity_id: sensor.termometr_strychowy_temperature
      above: 25
      for:
        minutes: 5
  condition:
    - condition: sun
      after: sunrise
      before: sunset
  action:
    - service: cover.close_cover
      target:
        entity_id: cover.rollershutter_0009
    - action: logbook.log
      data:
        name: "Strychowy — roleta"
        message: >
          ZAMKNIĘTO | {{ states('sensor.termometr_strychowy_temperature') | round(1) }}°C
          · {{ states('sensor.termometr_strychowy_humidity') | round(0) }}% wilg.
    - action: script.log_push
      data:
        wpis: >
          {"ts":"{{ now().strftime('%Y-%m-%dT%H:%M') }}","typ":"strychowy_roleta",
          "akcja":"CLOSE","temp":{{ states('sensor.termometr_strychowy_temperature') | round(1) }},
          "hum":{{ states('sensor.termometr_strychowy_humidity') | round(0) }},
          "info":"{{ states('sensor.termometr_strychowy_temperature') | round(1) }}°C · {{ states('sensor.termometr_strychowy_humidity') | round(0) }}% · zamknięto roletę 9"}
  mode: single
