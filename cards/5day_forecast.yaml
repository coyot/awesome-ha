type: custom:button-card
entity: sensor.prognoza_pogody_5_dni
show_name: false
show_icon: false
show_state: false
show_label: true
tap_action:
  action: none
styles:
  card:
    - padding: "0"
    - background: transparent
    - box-shadow: none
    - border: none
    - border-radius: "0"
  label:
    - padding: "0"
    - width: 100%
    - white-space: normal
    - line-height: "1"
label: |
  [[[
    const forecast = states['sensor.prognoza_pogody_5_dni']?.attributes?.forecast ?? [];

    const DAYS_SHORT = ['Niedz','Pon','Wt','Śr','Czw','Pt','Sob'];
    const MONTHS_PL  = ['sty','lut','mar','kwi','maj','cze','lip','sie','wrz','paź','lis','gru'];

    // ── Helpers ───────────────────────────────────────────────
    const isNum = v => v != null && !isNaN(v);
    const fmt   = (v, digits=0) => isNum(v) ? Number(v).toFixed(digits) : null;

    // Wind unit from HA — fall back to km/h
    const windUnit = states['sensor.prognoza_pogody_5_dni']?.attributes?.wind_speed_unit ?? 'km/h';

    // ── Temp colour (direct rgba, no opacity hack) ────────────
    function tempColor(t, dim=false) {
      const colors = {
        hot:    dim ? '#C42A22' : '#FF3B30',
        warm2:  dim ? '#C45200' : '#FF6B00',
        warm1:  dim ? '#C47B00' : '#FF9F0A',
        mild:   dim ? '#BFA030' : '#F5C842',
        cool:   dim ? '#229040' : '#30D158',
        cold:   dim ? '#3C8FA8' : '#5AC8FA',
        frosty: dim ? '#3060C0' : '#4DA6FF',
        freeze: dim ? '#8040B8' : '#BF5AF2',
      };
      if (t >= 35) return colors.hot;
      if (t >= 28) return colors.warm2;
      if (t >= 22) return colors.warm1;
      if (t >= 15) return colors.mild;
      if (t >=  8) return colors.cool;
      if (t >=  0) return colors.cold;
      if (t >= -8) return colors.frosty;
      return colors.freeze;
    }

    // ── Weather icons ─────────────────────────────────────────
    function icon(c) {
      if (['sunny','clear-night'].includes(c))
        return `<svg viewBox="0 0 24 24" fill="none" width="22" height="22">
          <circle cx="12" cy="12" r="4.5" fill="#F5A623"/>
          <circle cx="12" cy="12" r="3"   fill="#FFD060"/>
          <line x1="12" y1="2"    x2="12" y2="5"        stroke="#F5A623" stroke-width="1.8" stroke-linecap="round"/>
          <line x1="12" y1="19"   x2="12" y2="22"       stroke="#F5A623" stroke-width="1.8" stroke-linecap="round"/>
          <line x1="2"  y1="12"   x2="5"  y2="12"       stroke="#F5A623" stroke-width="1.8" stroke-linecap="round"/>
          <line x1="19" y1="12"   x2="22" y2="12"       stroke="#F5A623" stroke-width="1.8" stroke-linecap="round"/>
          <line x1="5.2" y1="5.2" x2="7"   y2="7"       stroke="#F5A623" stroke-width="1.4" stroke-linecap="round"/>
          <line x1="17"  y1="17"  x2="18.8" y2="18.8"   stroke="#F5A623" stroke-width="1.4" stroke-linecap="round"/>
          <line x1="18.8" y1="5.2" x2="17" y2="7"       stroke="#F5A623" stroke-width="1.4" stroke-linecap="round"/>
          <line x1="7"  y1="17"   x2="5.2" y2="18.8"    stroke="#F5A623" stroke-width="1.4" stroke-linecap="round"/>
        </svg>`;
      if (c === 'partlycloudy')
        return `<svg viewBox="0 0 24 24" fill="none" width="22" height="22">
          <circle cx="16" cy="7" r="3.5" fill="#F5C842" opacity=".9"/>
          <line x1="16" y1="2"     x2="16" y2="3.8"    stroke="#F5C842" stroke-width="1.5" stroke-linecap="round"/>
          <line x1="20.5" y1="3.5" x2="19.2" y2="4.8"  stroke="#F5C842" stroke-width="1.5" stroke-linecap="round"/>
          <line x1="22" y1="7"     x2="20.2" y2="7"    stroke="#F5C842" stroke-width="1.5" stroke-linecap="round"/>
          <circle cx="7"  cy="14" r="4"   fill="#4A5068"/>
          <circle cx="12" cy="12" r="5"   fill="#4A5068"/>
          <circle cx="17" cy="14" r="3.5" fill="#4A5068"/>
          <rect x="3" y="14" width="17" height="5" rx="2.5" fill="#4A5068"/>
        </svg>`;
      if (c === 'cloudy')
        return `<svg viewBox="0 0 24 24" fill="none" width="22" height="22">
          <circle cx="7"  cy="13" r="4"   fill="#4A5068"/>
          <circle cx="12" cy="11" r="5"   fill="#4A5068"/>
          <circle cx="17" cy="13" r="3.5" fill="#4A5068"/>
          <rect x="3" y="13" width="17" height="5" rx="2.5" fill="#4A5068"/>
        </svg>`;
      if (c === 'fog')
        return `<svg viewBox="0 0 24 24" fill="none" width="22" height="22">
          <line x1="3" y1="8"  x2="21" y2="8"  stroke="#7090AA" stroke-width="2" stroke-linecap="round"/>
          <line x1="5" y1="12" x2="19" y2="12" stroke="#7090AA" stroke-width="2" stroke-linecap="round"/>
          <line x1="3" y1="16" x2="21" y2="16" stroke="#7090AA" stroke-width="2" stroke-linecap="round"/>
          <line x1="5" y1="20" x2="17" y2="20" stroke="#7090AA" stroke-width="2" stroke-linecap="round"/>
        </svg>`;
      if (c === 'windy')
        return `<svg viewBox="0 0 24 24" fill="none" width="22" height="22">
          <path d="M3 8 Q9 4 15 8 Q19 11 21 8"        stroke="#7BAED4" stroke-width="2"   stroke-linecap="round" fill="none"/>
          <path d="M3 13 Q10 9 16 13 Q19 15 21 13"   stroke="#7BAED4" stroke-width="2"   stroke-linecap="round" fill="none"/>
          <path d="M3 18 Q8 15 14 18"                stroke="#7BAED4" stroke-width="1.5" stroke-linecap="round" fill="none"/>
        </svg>`;
      if (c === 'rainy')
        return `<svg viewBox="0 0 24 24" fill="none" width="22" height="22">
          <circle cx="7"  cy="11" r="4" fill="#3A7EC4"/>
          <circle cx="12" cy="9"  r="5" fill="#3A7EC4"/>
          <circle cx="17" cy="11" r="3" fill="#3A7EC4"/>
          <rect x="3" y="11" width="17" height="4" rx="2" fill="#3A7EC4"/>
          <line x1="7"  y1="17" x2="6"  y2="21" stroke="#5AC8FA" stroke-width="1.8" stroke-linecap="round"/>
          <line x1="12" y1="17" x2="11" y2="21" stroke="#5AC8FA" stroke-width="1.8" stroke-linecap="round"/>
          <line x1="17" y1="17" x2="16" y2="21" stroke="#5AC8FA" stroke-width="1.8" stroke-linecap="round"/>
        </svg>`;
      if (c === 'pouring')
        return `<svg viewBox="0 0 24 24" fill="none" width="22" height="22">
          <circle cx="7"  cy="10" r="4" fill="#2A6EB4"/>
          <circle cx="12" cy="8"  r="5" fill="#2A6EB4"/>
          <circle cx="17" cy="10" r="3" fill="#2A6EB4"/>
          <rect x="3" y="10" width="17" height="4" rx="2" fill="#2A6EB4"/>
          <line x1="6"  y1="16" x2="5"  y2="20" stroke="#4ABCF8" stroke-width="2" stroke-linecap="round"/>
          <line x1="10" y1="16" x2="9"  y2="20" stroke="#4ABCF8" stroke-width="2" stroke-linecap="round"/>
          <line x1="14" y1="16" x2="13" y2="20" stroke="#4ABCF8" stroke-width="2" stroke-linecap="round"/>
          <line x1="18" y1="16" x2="17" y2="20" stroke="#4ABCF8" stroke-width="2" stroke-linecap="round"/>
        </svg>`;
      if (['snowy','snowy-rainy'].includes(c))
        return `<svg viewBox="0 0 24 24" fill="none" width="22" height="22">
          <line x1="12" y1="2"     x2="12" y2="22"     stroke="#55C0E8" stroke-width="2" stroke-linecap="round"/>
          <line x1="2"  y1="12"    x2="22" y2="12"     stroke="#55C0E8" stroke-width="2" stroke-linecap="round"/>
          <line x1="5.4" y1="5.4"  x2="18.6" y2="18.6" stroke="#55C0E8" stroke-width="2" stroke-linecap="round"/>
          <line x1="18.6" y1="5.4" x2="5.4" y2="18.6"  stroke="#55C0E8" stroke-width="2" stroke-linecap="round"/>
          <circle cx="12" cy="12" r="2.2" fill="#091220" stroke="#55C0E8" stroke-width="1.5"/>
        </svg>`;
      if (c === 'hail')
        return `<svg viewBox="0 0 24 24" fill="none" width="22" height="22">
          <circle cx="7"  cy="10" r="4" fill="#3A5080"/>
          <circle cx="12" cy="8"  r="5" fill="#3A5080"/>
          <circle cx="17" cy="10" r="3" fill="#3A5080"/>
          <rect x="3" y="10" width="17" height="4" rx="2" fill="#3A5080"/>
          <circle cx="8"  cy="17" r="2"   fill="#A8D8F0"/>
          <circle cx="14" cy="19" r="2"   fill="#A8D8F0"/>
          <circle cx="19" cy="16" r="1.5" fill="#A8D8F0"/>
        </svg>`;
      if (['lightning','lightning-rainy','exceptional'].includes(c))
        return `<svg viewBox="0 0 24 24" fill="none" width="22" height="22">
          <circle cx="6"  cy="10" r="4"   fill="#282E3A"/>
          <circle cx="12" cy="8"  r="5"   fill="#282E3A"/>
          <circle cx="17" cy="10" r="3.5" fill="#282E3A"/>
          <rect x="2" y="10" width="18" height="5" rx="2" fill="#282E3A"/>
          <polygon points="13.5,15 10,21.5 13,21.5 11,27 17.5,19 14,19 16,15" fill="#FFD060"/>
        </svg>`;
      // fallback: cloudy
      return `<svg viewBox="0 0 24 24" fill="none" width="22" height="22">
        <circle cx="7"  cy="13" r="4"   fill="#4A5068"/>
        <circle cx="12" cy="11" r="5"   fill="#4A5068"/>
        <circle cx="17" cy="13" r="3.5" fill="#4A5068"/>
        <rect x="3" y="13" width="17" height="5" rx="2.5" fill="#4A5068"/>
      </svg>`;
    }

    function condLabel(c) {
      return {
        'sunny':'Słonecznie','clear-night':'Pogodnie',
        'partlycloudy':'Częściowo pochmurno','cloudy':'Pochmurno',
        'windy':'Wietrznie','fog':'Mgła',
        'rainy':'Deszcz','pouring':'Ulewa',
        'snowy':'Śnieg','snowy-rainy':'Deszcz ze śniegiem',
        'hail':'Grad','lightning':'Burza',
        'lightning-rainy':'Burza z deszczem','exceptional':'Wyjątkowe',
      }[c] ?? c;
    }

    function windArrow(deg) {
      const rotate = (deg + 180) % 360;
      return `<svg viewBox="0 0 16 16" width="12" height="12"
        style="transform:rotate(${rotate}deg);display:inline-block;vertical-align:middle;flex-shrink:0;">
        <polygon points="8,2 5,12 8,10 11,12" fill="rgba(255,255,255,0.45)"/>
      </svg>`;
    }

    // ── Loading / empty state ─────────────────────────────────
    if (!forecast.length) {
      return `<div style="padding:20px;font-family:-apple-system,system-ui,sans-serif;
        color:rgba(255,255,255,.35);font-size:12px;text-align:center;
        background:linear-gradient(145deg,#0e1a2e 0%,#091220 100%);border-radius:16px;">Ładowanie prognozy…</div>`;
    }

    const n        = Math.min(5, forecast.length);
    const days     = forecast.slice(0, n);
    const today    = new Date();
    const tomorrow = new Date(today.getTime() + 86400000);

    // Global temp range for bar scaling
    const allHi     = days.map(d => isNum(d.temperature) ? d.temperature : 0);
    const allLo     = days.map(d => isNum(d.templow)     ? d.templow     : (isNum(d.temperature) ? d.temperature : 0));
    const globalMin = Math.min(...allLo);
    const globalMax = Math.max(...allHi);
    const gRange    = Math.max(1, globalMax - globalMin);

    const rows = days.map((day, i) => {
      const dt          = new Date(day.datetime);
      const isToday     = dt.toDateString() === today.toDateString();
      const isTomorrow  = dt.toDateString() === tomorrow.toDateString();
      const dayName     = isToday ? 'Dziś' : isTomorrow ? 'Jutro' : DAYS_SHORT[dt.getDay()];
      // Show date only for days beyond tomorrow
      const dateStr     = (!isToday && !isTomorrow)
        ? `${dt.getDate()} ${MONTHS_PL[dt.getMonth()]}`
        : '';

      const hiRaw = fmt(day.temperature);
      const loRaw = fmt(day.templow ?? day.temperature);
      const hi    = hiRaw !== null ? Math.round(day.temperature) : null;
      const lo    = loRaw !== null ? Math.round(day.templow ?? day.temperature) : null;
      const hasBothTemps = hi !== null && lo !== null && lo !== hi;

      const prec = isNum(day.precipitation)             ? day.precipitation            : null;
      const prob = isNum(day.precipitation_probability) ? day.precipitation_probability : null;
      const wSpd = isNum(day.wind_speed)                ? Math.round(day.wind_speed)   : null;
      const wDir = isNum(day.wind_bearing)              ? Math.round(day.wind_bearing) : null;

      // Precipitation label — show both mm and % when meaningful
      let rainStr = '';
      const hasPrec = prec !== null && prec > 0;
      const hasProb = prob !== null && prob > 15;
      if (hasPrec && hasProb)    rainStr = `${Number(prec).toFixed(1)}mm·${Math.round(prob)}%`;
      else if (hasPrec)          rainStr = `${Number(prec).toFixed(1)} mm`;
      else if (hasProb)          rainStr = `${Math.round(prob)}%`;

      // Temp bar — only render when we have distinct lo/hi
      const barLeft = hasBothTemps
        ? (((lo - globalMin) / gRange) * 100).toFixed(1)
        : '0';
      const barWidth = hasBothTemps
        ? Math.max(8, ((hi - lo) / gRange) * 100).toFixed(1)
        : '0';

      // Wind cell
      const windHtml = (wSpd !== null && wSpd > 1)
        ? `<div style="display:flex;align-items:center;gap:3px;flex-shrink:0;
              min-width:52px;justify-content:flex-end;">
            ${wDir !== null ? windArrow(wDir) : ''}
            <span style="font-size:11px;color:rgba(255,255,255,0.38);
              line-height:1;white-space:nowrap;">${wSpd} ${windUnit}</span>
           </div>`
        : `<div style="min-width:52px;"></div>`;

      // Separator — inside the row as border-top, not a sibling div
      const borderTop = i > 0 ? 'border-top:0.5px solid rgba(255,255,255,0.06);' : '';

      return `
        <div style="
          padding:11px 14px;
          display:flex;
          align-items:center;
          gap:10px;
          ${borderTop}
        ">
          <!-- Day + date -->
          <div style="width:40px;flex-shrink:0;">
            <div style="font-size:13px;font-weight:${isToday ? 700 : 600};
              color:${isToday ? '#ffffff' : 'rgba(255,255,255,0.78)'};
              line-height:1;">${dayName}</div>
            <div style="font-size:9.5px;color:rgba(255,255,255,0.26);
              margin-top:2px;min-height:11px;">${dateStr}</div>
          </div>

          <!-- Icon + precip -->
          <div style="width:30px;flex-shrink:0;display:flex;flex-direction:column;
            align-items:center;gap:2px;" title="${condLabel(day.condition)}">
            ${icon(day.condition)}
            <div style="font-size:9px;font-weight:600;line-height:1;
              height:10px;overflow:hidden;white-space:nowrap;
              color:${hasPrec ? '#5AC8FA' : 'rgba(90,200,250,0.45)'};">
              ${rainStr}
            </div>
          </div>

          <!-- Temp min — dimmed colour, no opacity -->
          <div style="font-size:13px;font-weight:500;
            color:${lo !== null ? tempColor(lo, true) : 'rgba(255,255,255,0.2)'};
            width:26px;text-align:right;flex-shrink:0;letter-spacing:-.3px;">
            ${lo !== null ? lo + '°' : '—'}
          </div>

          <!-- Temp bar -->
          <div style="flex:1;position:relative;height:4px;
            border-radius:2px;background:rgba(255,255,255,0.10);">
            ${hasBothTemps ? `<div style="
              position:absolute;
              left:${barLeft}%;
              width:${barWidth}%;
              height:100%;
              border-radius:2px;
              background:linear-gradient(to right,${tempColor(lo)},${tempColor(hi)});
            "></div>` : ''}
          </div>

          <!-- Temp max -->
          <div style="font-size:13px;font-weight:700;
            color:${hi !== null ? tempColor(hi) : 'rgba(255,255,255,0.2)'};
            width:26px;text-align:left;flex-shrink:0;letter-spacing:-.3px;">
            ${hi !== null ? hi + '°' : '—'}
          </div>

          <!-- Wind -->
          ${windHtml}
        </div>`;
    }).join('');

    return `
      <div style="
        font-family:-apple-system,system-ui,sans-serif;
        background:linear-gradient(145deg,#0e1a2e 0%,#091220 100%);
        border:1px solid rgba(255,255,255,0.07);
        border-radius:16px;
        overflow:hidden;
      ">${rows}</div>`;
  ]]]
