type: custom:button-card
entity: climate.salon
show_name: false
show_icon: false
show_state: false
show_label: true
tap_action:
  action: more-info
styles:
  card:
    - padding: "0"
    - background: "#1C1C1E"
    - border-radius: 16px
    - overflow: hidden
    - border: |
        [[[
          const action = entity.attributes.hvac_action || entity.state || 'off';
          const heating = action === 'heating';
          const cooling = action === 'cooling';
          if (heating) return '1px solid rgba(239,159,39,0.35)';
          if (cooling) return '1px solid rgba(133,183,235,0.35)';
          return '0.5px solid rgba(255,255,255,0.08)';
        ]]]
    - animation: |
        [[[
          const action = entity.attributes.hvac_action || entity.state || 'off';
          if (action === 'heating') return 'ac-pulse-heat 2.4s ease-in-out infinite';
          if (action === 'cooling') return 'ac-pulse-cool 2.4s ease-in-out infinite';
          return 'none';
        ]]]
  label:
    - padding: "0"
    - margin: "0"
    - width: 100%
    - white-space: normal
    - line-height: "1"
label: |
  [[[
    // ── entities & state ───────────────────────────────────────────────
    const action = entity.attributes.hvac_action || entity.state || 'off';
    const mode = entity.state || 'off';
    const currentTemp = entity.attributes.current_temperature ?? null;
    const targetTemp = entity.attributes.temperature ?? null;
    const fanMode = entity.attributes.fan_mode || 'auto';
    const swingMode = entity.attributes.swing_mode || 'off';

    const heating = action === 'heating';
    const cooling = action === 'cooling';
    const fan = action === 'fan' || mode === 'fan_only';
    const drying = mode === 'dry';
    const active = heating || cooling || fan || drying;
    const isOff = mode === 'off';

    // ── colors ─────────────────────────────────────────────────────────
    const accentCol = heating ? '#EF9F27'
                    : cooling ? '#85B7EB'
                    : fan ? '#B4B2A9'
                    : drying ? '#C97A50'
                    : '#3D3D3B';
    const tempCol = heating ? '#EF9F27'
                  : cooling ? '#85B7EB'
                  : '#5F5E5A';

    // ── temperature progress ───────────────────────────────────────────
    let progress = 0;
    let progressLabel = '';
    if (currentTemp !== null && targetTemp !== null && (heating || cooling)) {
      const diff = Math.abs(targetTemp - currentTemp);
      if (diff < 0.5) {
        progress = 100;
        progressLabel = 'temperatura osiągnięta';
      } else if (heating) {
        // Przy grzaniu: od current do target (założmy zakres 10°C)
        const range = 10;
        progress = Math.min(100, Math.max(0, ((range - diff) / range) * 100));
        progressLabel = `dogrzewa +${diff.toFixed(1)}°C`;
      } else if (cooling) {
        const range = 10;
        progress = Math.min(100, Math.max(0, ((range - diff) / range) * 100));
        progressLabel = `schładza −${diff.toFixed(1)}°C`;
      }
    } else if (fan) {
      progress = 0;
      progressLabel = 'cyrkulacja powietrza';
    } else if (drying) {
      progress = 0;
      progressLabel = 'osuszanie';
    }

    const pct = Math.round(progress);
    const barGrad = heating ? 'linear-gradient(90deg,#9A5230,#EF9F27)'
                  : cooling ? 'linear-gradient(90deg,#185FA5,#85B7EB)'
                  : 'linear-gradient(90deg,#3D3D3B,#5F5E5A)';

    // ── mode labels ────────────────────────────────────────────────────
    const modeMap = {
      heat: { label: 'grzanie', col: '#EF9F27', bg: 'rgba(239,159,39,0.12)' },
      cool: { label: 'chłodzenie', col: '#85B7EB', bg: 'rgba(133,183,235,0.12)' },
      fan_only: { label: 'wentylator', col: '#B4B2A9', bg: 'rgba(180,178,169,0.12)' },
      dry: { label: 'osuszanie', col: '#C97A50', bg: 'rgba(201,122,80,0.12)' },
      auto: { label: 'auto', col: '#97C459', bg: 'rgba(151,196,89,0.12)' },
      off: { label: 'wyłączone', col: '#5F5E5A', bg: 'rgba(95,94,90,0.12)' },
    };
    const modeInfo = modeMap[mode] ?? modeMap.off;

    // ── fan speed labels ───────────────────────────────────────────────
    const fanMap = {
      auto: { label: 'auto', col: '#97C459', bg: 'rgba(151,196,89,0.10)' },
      low: { label: 'cicho', col: '#7BAED4', bg: 'rgba(123,174,212,0.10)' },
      medium: { label: 'średnio', col: '#85B7EB', bg: 'rgba(133,183,235,0.10)' },
      high: { label: 'mocno', col: '#EF9F27', bg: 'rgba(239,159,39,0.10)' },
    };
    const fanInfo = fanMap[fanMode.toLowerCase()] ?? { label: fanMode, col: '#888780', bg: 'rgba(136,135,128,0.10)' };

    // ── SVG icons ──────────────────────────────────────────────────────
    const svgIdle = `<svg width="20" height="20" viewBox="0 0 20 20" fill="none" style="flex-shrink:0;">
      <circle cx="10" cy="10" r="7" stroke="#3D3D3B" stroke-width="1.4"/>
      <path d="M10 6v4l3 2" stroke="#3D3D3B" stroke-width="1.2" stroke-linecap="round"/>
    </svg>`;

    const svgHeat = `<svg width="20" height="20" viewBox="0 0 20 20" fill="none"
        style="flex-shrink:0;animation:ac-flame 1.5s ease-in-out infinite;">
      <path d="M10 3 Q8 7 8 10 Q8 13 10 16 Q12 13 12 10 Q12 7 10 3Z"
            stroke="#EF9F27" stroke-width="1.3" fill="rgba(239,159,39,0.18)"/>
      <path d="M10 7 Q8.5 9 8.5 11 Q8.5 13 10 14.5 Q11.5 13 11.5 11 Q11.5 9 10 7Z"
            fill="rgba(239,159,39,0.3)"/>
    </svg>`;

    const svgCool = `<svg width="20" height="20" viewBox="0 0 20 20" fill="none"
        style="flex-shrink:0;">
      <g style="animation:ac-snowflake 3s linear infinite;">
        <line x1="10" y1="3" x2="10" y2="17" stroke="#85B7EB" stroke-width="1.2" stroke-linecap="round"/>
        <line x1="3" y1="10" x2="17" y2="10" stroke="#85B7EB" stroke-width="1.2" stroke-linecap="round"/>
        <line x1="5" y1="5" x2="15" y2="15" stroke="#85B7EB" stroke-width="1.2" stroke-linecap="round"/>
        <line x1="15" y1="5" x2="5" y2="15" stroke="#85B7EB" stroke-width="1.2" stroke-linecap="round"/>
      </g>
    </svg>`;

    const svgFan = `<svg width="20" height="20" viewBox="0 0 20 20" fill="none"
        style="flex-shrink:0;animation:ac-spin 2s linear infinite;">
      <circle cx="10" cy="10" r="2" fill="#B4B2A9"/>
      <path d="M10 2 Q8 6 10 8" stroke="#B4B2A9" stroke-width="1.5" stroke-linecap="round"/>
      <path d="M18 10 Q14 8 12 10" stroke="#B4B2A9" stroke-width="1.5" stroke-linecap="round"/>
      <path d="M10 18 Q12 14 10 12" stroke="#B4B2A9" stroke-width="1.5" stroke-linecap="round"/>
      <path d="M2 10 Q6 12 8 10" stroke="#B4B2A9" stroke-width="1.5" stroke-linecap="round"/>
    </svg>`;

    const svgDry = `<svg width="20" height="20" viewBox="0 0 20 20" fill="none"
        style="flex-shrink:0;">
      <path d="M6 12 Q6 8 10 4 Q14 8 14 12 Q14 15 10 15 Q6 15 6 12Z"
            stroke="#C97A50" stroke-width="1.2" fill="none"/>
      <circle cx="10" cy="12" r="2" fill="rgba(201,122,80,0.3)"/>
    </svg>`;

    const svgIcon = heating ? svgHeat
                  : cooling ? svgCool
                  : fan ? svgFan
                  : drying ? svgDry
                  : svgIdle;

    // ── badge ──────────────────────────────────────────────────────────
    const dotBase = `width:5px;height:5px;border-radius:50%;flex-shrink:0;`;
    const badgeLabel = heating ? 'grzeje'
                     : cooling ? 'chłodzi'
                     : fan ? 'wentyluje'
                     : drying ? 'osusza'
                     : isOff ? 'wyłączona' : 'czeka';
    const badgeCol = active ? accentCol : '#5F5E5A';
    const badgeBg = active ? `rgba(${heating?'239,159,39':cooling?'133,183,235':'180,178,169'},0.14)` : 'rgba(95,94,90,0.12)';
    const badge = active
      ? `<span style="display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:99px;
                      font-size:10px;font-weight:600;white-space:nowrap;
                      background:${badgeBg};color:${badgeCol};">
           <span style="${dotBase}background:${badgeCol};animation:ac-dot 1.8s ease-in-out infinite;"></span>${badgeLabel}</span>`
      : `<span style="display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:99px;
                      font-size:10px;font-weight:600;white-space:nowrap;
                      background:${badgeBg};color:${badgeCol};">
           <span style="${dotBase}background:${badgeCol};"></span>${badgeLabel}</span>`;

    // ── render ─────────────────────────────────────────────────────────
    return `
      <style>
        @keyframes ac-pulse-heat {
          0%,100% { box-shadow: 0 0 0 0   rgba(239,159,39,0); }
          50%     { box-shadow: 0 0 0 5px rgba(239,159,39,0.18); }
        }
        @keyframes ac-pulse-cool {
          0%,100% { box-shadow: 0 0 0 0   rgba(133,183,235,0); }
          50%     { box-shadow: 0 0 0 5px rgba(133,183,235,0.18); }
        }
        @keyframes ac-flame {
          0%,100% { transform: scaleY(1) translateY(0);   opacity: 1;   }
          50%     { transform: scaleY(0.95) translateY(-1px); opacity: 0.85; }
        }
        @keyframes ac-spin { to { transform: rotate(360deg); } }
        @keyframes ac-snowflake { to { transform: rotate(360deg); } }
        @keyframes ac-dot {
          0%,100% { opacity: 1;   }
          50%     { opacity: 0.2; }
        }
      </style>

      <div style="display:grid;grid-template-columns:4px 1fr auto;gap:0 14px;
                  align-items:stretch;padding:14px 16px;
                  font-family:-apple-system,system-ui,sans-serif;">

        <div style="width:4px;border-radius:99px;background:${accentCol};align-self:stretch;"></div>

        <div style="display:flex;flex-direction:column;gap:8px;min-width:0;">

          <div style="display:flex;align-items:center;gap:8px;">
            ${svgIcon}
            <span style="font-size:13px;font-weight:500;color:#F1EFE8;flex:1;min-width:0;">${entity.attributes.friendly_name || entity.name || 'klimatyzacja'}</span>
            ${badge}
          </div>

          <div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap;">
            <span style="font-size:11px;font-weight:500;padding:3px 8px;border-radius:6px;
                         background:${modeInfo.bg};color:${modeInfo.col};white-space:nowrap;">${modeInfo.label}</span>
            ${!isOff ? `<span style="font-size:11px;font-weight:500;padding:3px 8px;border-radius:6px;
                         background:${fanInfo.bg};color:${fanInfo.col};white-space:nowrap;">
                         ${fanInfo.label}</span>` : ''}
            ${targetTemp !== null && !isOff ? `<span style="font-size:11px;font-weight:500;padding:3px 8px;border-radius:6px;
                         background:rgba(151,196,89,0.10);color:#97C459;white-space:nowrap;">
                         ▶ ${targetTemp}°C</span>` : ''}
          </div>

          ${active && (heating || cooling) ? `
          <div style="display:flex;flex-direction:column;gap:4px;">
            <div style="height:3px;border-radius:99px;background:rgba(255,255,255,0.07);overflow:hidden;">
              <div style="height:100%;width:${pct}%;border-radius:99px;background:${barGrad};transition:width 1s ease;"></div>
            </div>
            <div style="display:flex;justify-content:space-between;">
              <span style="font-size:10px;color:rgba(255,255,255,0.28);">${progressLabel}</span>
              <span style="font-size:10px;color:rgba(255,255,255,0.28);">${pct}%</span>
            </div>
          </div>
          ` : ''}

        </div>

        <div style="display:flex;flex-direction:column;align-items:flex-end;justify-content:center;gap:2px;min-width:52px;">
          <span style="font-size:20px;font-weight:600;letter-spacing:-0.5px;line-height:1;color:${tempCol};">${currentTemp !== null ? currentTemp.toFixed(1) : '—'}°</span>
          <span style="font-size:10px;color:rgba(255,255,255,0.28);">w pokoju</span>
        </div>

      </div>`;
  ]]]
