    function daysUntil(dateStr){
      const target=new Date(dateStr);target.setHours(0,0,0,0);
      const today=new Date();today.setHours(0,0,0,0);
      return Math.round((target-today)/86400000);
    }

    function eclipseIcon(size,sunColor,moonAlpha){
      const r=size/2,cx=r,cy=r,offset=r*0.68;
      return `<svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle cx="${cx}" cy="${cy}" r="${r*0.62}" fill="${sunColor}" stroke="${sunColor.replace('1)','0.85)')}" stroke-width="${r*0.14}"/>
        <circle cx="${cx+offset}" cy="${cy}" r="${r*0.62}" fill="rgba(6,10,24,${moonAlpha})"/>
      </svg>`;
    }
    function lunarEclipseIcon(size,ac){
      const r=size/2;
      return `<svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle cx="${r}" cy="${r}" r="${r*0.72}" fill="${ac.replace('1)','0.25)')}" stroke="${ac}" stroke-width="${r*0.14}"/>
        <circle cx="${r*0.78}" cy="${r*0.78}" r="${r*0.26}" fill="${ac.replace('1)','0.50)')}"/>
      </svg>`;
    }
    function meteorIcon(size){
      return `<svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}" fill="none" xmlns="http://www.w3.org/2000/svg">
        <line x1="${size*0.75}" y1="${size*0.08}" x2="${size*0.18}" y2="${size*0.65}" stroke="rgba(180,130,255,0.95)" stroke-width="${size*0.10}" stroke-linecap="round"/>
        <line x1="${size*0.50}" y1="${size*0.20}" x2="${size*0.05}" y2="${size*0.75}" stroke="rgba(160,110,255,0.80)" stroke-width="${size*0.09}" stroke-linecap="round"/>
        <line x1="${size*0.88}" y1="${size*0.28}" x2="${size*0.38}" y2="${size*0.88}" stroke="rgba(200,160,255,0.70)" stroke-width="${size*0.08}" stroke-linecap="round"/>
        <circle cx="${size*0.82}" cy="${size*0.16}" r="${size*0.10}" fill="rgba(230,200,255,0.95)"/>
        <circle cx="${size*0.55}" cy="${size*0.26}" r="${size*0.07}" fill="rgba(210,175,255,0.80)"/>
      </svg>`;
    }
    function conjunctionIcon(size,ac){
      const r=size/2;
      return `<svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle cx="${r*0.55}" cy="${r}" r="${r*0.42}" fill="${ac.replace('1)','0.28)')}" stroke="${ac}" stroke-width="${r*0.12}"/>
        <circle cx="${r*1.45}" cy="${r}" r="${r*0.30}" fill="${ac.replace('1)','0.20)')}" stroke="${ac.replace('1)','0.75)')}" stroke-width="${r*0.10}"/>
      </svg>`;
    }
    function moonIcon(size,ac){
      const r=size/2;
      return `<svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle cx="${r}" cy="${r}" r="${r*0.75}" fill="${ac.replace('1)','0.22)')}" stroke="${ac}" stroke-width="${r*0.13}"/>
        <circle cx="${r*0.72}" cy="${r*0.68}" r="${r*0.15}" fill="${ac.replace('1)','0.35)')}"/>
        <circle cx="${r*1.25}" cy="${r*1.20}" r="${r*0.10}" fill="${ac.replace('1)','0.25)')}"/>
      </svg>`;
    }
    function planetIcon(size,ac){
      const r=size/2;
      return `<svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle cx="${r}" cy="${r}" r="${r*0.52}" fill="${ac.replace('1)','0.25)')}" stroke="${ac}" stroke-width="${r*0.12}"/>
        <ellipse cx="${r}" cy="${r}" rx="${r*0.90}" ry="${r*0.22}" fill="none" stroke="${ac.replace('1)','0.60)')}" stroke-width="${r*0.09}"/>
      </svg>`;
    }
    function typeTheme(type){
      switch(type){
        case 'eclipse':       return{r:255,g:190,b:50};
        case 'lunar_eclipse': return{r:255,g:80, b:80};
        case 'meteors':       return{r:160,g:100,b:255};
        case 'conjunction':   return{r:80, g:200,b:255};
        case 'planet':        return{r:60, g:200,b:160};
        case 'moon':          return{r:220,g:200,b:100};
        default:              return{r:160,g:160,b:160};
      }
    }
    function eventIcon(type,size,ac){
      switch(type){
        case 'eclipse':       return eclipseIcon(size,ac.replace('1)','0.30)'),0.90);
        case 'lunar_eclipse': return lunarEclipseIcon(size,ac);
        case 'meteors':       return meteorIcon(size);
        case 'conjunction':   return conjunctionIcon(size,ac);
        case 'planet':        return planetIcon(size,ac);
        case 'moon':          return moonIcon(size,ac);
        default:              return meteorIcon(size);
      }
    }

    function renderBanner(ev,days){
      const isToday=days===0,isTomorrow=days===1,isUrgent=days<=7;
      let acR,acG,acB;
      if(isToday)        {acR=255;acG=70; acB=0;}
      else if(isTomorrow){acR=255;acG=130;acB=0;}
      else if(isUrgent)  {acR=255;acG=180;acB=30;}
      else{const t=typeTheme(ev.type);acR=t.r;acG=t.g;acB=t.b;}
      const ac  =`rgba(${acR},${acG},${acB},1)`;
      const acM =`rgba(${acR},${acG},${acB},0.85)`;
      const acL =`rgba(${acR},${acG},${acB},0.18)`;
      const acB2=`rgba(${acR},${acG},${acB},0.35)`;
      const iconSvg20=eventIcon(ev.type,20,ac);
      const iconSvg18=eventIcon(ev.type,18,ac);
      const iconSvg14=eventIcon(ev.type,14,ac);
      const pillText=isToday?'dziś!':isTomorrow?'jutro':`${days} dni`;
      const pulseAnim=(isToday||isTomorrow)?`animation:sc-breathe ${isToday?'1.2s':'1.8s'} ease-in-out infinite;`:'';
      const sublabel=isToday?ev.sublabelToday:isTomorrow?ev.sublabelTomorrow:ev.sublabel;

      if(isToday){
        const meteorExtra=ev.hasMeteors
          ?`<div style="margin-top:5px;display:flex;align-items:center;gap:6px;">
               <div style="font-size:10px;font-weight:600;color:rgba(180,130,255,0.92);
                 background:rgba(150,90,255,0.15);border:1px solid rgba(150,90,255,0.35);
                 padding:2px 8px;border-radius:8px;">+ Perseidy tej nocy</div>
               <div style="font-size:10px;color:rgba(255,255,255,0.35);">2 zjawiska jednocześnie</div>
             </div>`:'' ;
        return `
          <div style="margin-top:10px;margin-left:-20px;margin-right:-20px;margin-bottom:-16px;
            padding:12px 20px 16px;border-top:2px solid ${acB2};position:relative;overflow:hidden;border-radius:0 0 24px 24px;">
            <div style="position:absolute;inset:0;background:${acL};animation:sc-breathe 1.2s ease-in-out infinite;"></div>
            <div style="position:relative;z-index:1;display:flex;align-items:flex-start;gap:12px;">
              <div style="width:38px;height:38px;border-radius:50%;flex-shrink:0;
                background:rgba(${acR},${acG},${acB},0.20);border:2px solid ${acB2};
                display:flex;align-items:center;justify-content:center;position:relative;">
                ${iconSvg20}
                <div style="position:absolute;inset:-4px;border-radius:50%;
                  border:2px solid rgba(${acR},${acG},${acB},0.40);
                  animation:sc-breathe 1.2s ease-in-out infinite;"></div>
              </div>
              <div style="flex:1;min-width:0;">
                <div style="font-size:12px;font-weight:600;color:${ac};text-transform:uppercase;letter-spacing:.05em;">${ev.label} — dziś!</div>
                <div style="font-size:10px;color:rgba(255,220,150,0.75);margin-top:2px;">${sublabel}</div>
                ${meteorExtra}
              </div>
              <div style="font-size:12px;font-weight:600;color:${ac};
                background:rgba(${acR},${acG},${acB},0.18);border:1.5px solid ${acB2};
                padding:4px 10px;border-radius:10px;white-space:nowrap;flex-shrink:0;${pulseAnim}">${pillText}</div>
            </div>
          </div>`;
      }
      if(isTomorrow){
        return `
          <div style="margin-top:10px;margin-left:-20px;margin-right:-20px;margin-bottom:-16px;
            padding:11px 20px 14px;border-top:2px solid ${acB2};
            background:rgba(${acR},${acG},${acB},0.08);border-radius:0 0 24px 24px;
            display:flex;align-items:center;gap:10px;">
            <div style="width:34px;height:34px;border-radius:50%;flex-shrink:0;
              background:rgba(${acR},${acG},${acB},0.15);border:1.5px solid ${acB2};
              display:flex;align-items:center;justify-content:center;">${iconSvg18}</div>
            <div style="flex:1;min-width:0;">
              <div style="font-size:11px;font-weight:600;color:${ac};text-transform:uppercase;letter-spacing:.05em;">Jutro: ${ev.label}</div>
              <div style="font-size:10px;color:rgba(255,255,255,0.40);margin-top:1px;">${sublabel}</div>
            </div>
            <div style="font-size:13px;font-weight:600;color:${ac};
              background:rgba(${acR},${acG},${acB},0.18);border:1.5px solid ${acB2};
              padding:4px 10px;border-radius:10px;white-space:nowrap;${pulseAnim}">${pillText}</div>
          </div>`;
      }
      if(isUrgent){
        return `
          <div style="margin-top:10px;margin-left:-20px;margin-right:-20px;margin-bottom:-16px;
            padding:10px 20px 13px;border-top:1px solid rgba(${acR},${acG},${acB},0.30);
            background:rgba(${acR},${acG},${acB},0.06);border-radius:0 0 24px 24px;
            display:flex;align-items:center;gap:10px;">
            <div style="width:30px;height:30px;border-radius:50%;flex-shrink:0;
              background:rgba(${acR},${acG},${acB},0.12);border:1px solid rgba(${acR},${acG},${acB},0.35);
              display:flex;align-items:center;justify-content:center;">${iconSvg14}</div>
            <div style="flex:1;min-width:0;">
              <div style="font-size:10px;font-weight:600;color:${acM};text-transform:uppercase;letter-spacing:.06em;">${ev.label} za ${days} dni</div>
              <div style="font-size:10px;color:rgba(255,255,255,0.38);margin-top:1px;
                white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${sublabel}</div>
            </div>
            <div style="font-size:11px;font-weight:600;color:${acM};
              background:rgba(${acR},${acG},${acB},0.14);border:1px solid rgba(${acR},${acG},${acB},0.35);
              padding:3px 9px;border-radius:10px;white-space:nowrap;
              animation:sc-breathe 2s ease-in-out infinite;">${pillText}</div>
          </div>`;
      }
      return `
        <div style="margin-top:11px;border-top:1px solid rgba(255,255,255,0.07);padding-top:10px;
          display:flex;align-items:center;gap:10px;position:relative;z-index:1;">
          <div style="width:28px;height:28px;border-radius:50%;flex-shrink:0;
            background:rgba(${acR},${acG},${acB},0.10);border:1px solid rgba(${acR},${acG},${acB},0.25);
            display:flex;align-items:center;justify-content:center;">${iconSvg14}</div>
          <div style="flex:1;min-width:0;">
            <div style="font-size:10px;font-weight:600;color:rgba(${acR},${acG},${acB},0.85);
              text-transform:uppercase;letter-spacing:.06em;">${ev.label}</div>
            <div style="font-size:10px;color:rgba(255,255,255,0.35);margin-top:1px;
              white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">${sublabel}</div>
          </div>
          <div style="font-size:11px;font-weight:600;color:rgba(${acR},${acG},${acB},0.85);
            background:rgba(${acR},${acG},${acB},0.12);border:1px solid rgba(${acR},${acG},${acB},0.25);
            padding:3px 9px;border-radius:10px;white-space:nowrap;">${pillText}</div>
        </div>`;
    }

    const banners=EVENTS
      .map(ev=>({ev,days:daysUntil(ev.date)}))
      .filter(({days})=>days>=0&&days<=30)
      .sort((a,b)=>a.days-b.days)
      .slice(0,2)
      .map(({ev,days})=>renderBanner(ev,days))
      .join('');

    const hasToday=EVENTS.some(ev=>daysUntil(ev.date)===0);
    const cardExtraStyle=hasToday?'border:2px solid rgba(255,70,0,0.55);':'';

    return `
      <style>
        @keyframes sc-glow-pulse{0%,100%{opacity:.28;transform:scale(1)}50%{opacity:.48;transform:scale(1.12)}}
        @keyframes sc-breathe{0%,100%{opacity:1}50%{opacity:.75}}
        @keyframes sc-shimmer{0%,100%{opacity:.65}50%{opacity:.90}}
        @keyframes sc-bg-shift{0%,100%{filter:hue-rotate(0deg) brightness(1)}50%{filter:hue-rotate(5deg) brightness(1.05)}}
        @keyframes sc-cloud-drift{from{transform:translateX(-50px)}to{transform:translateX(50px)}}
        @keyframes sc-rain-fall{0%{transform:translateY(-10px);opacity:0}10%{opacity:0.5}90%{opacity:0.3}100%{transform:translateY(240px);opacity:0}}
        @keyframes sc-snow-fall{0%{transform:translateY(-10px) translateX(0);opacity:0}10%{opacity:0.7}90%{opacity:0.5}100%{transform:translateY(240px) translateX(var(--drift,10px));opacity:0}}
        .sc{background:${dynamicBg};border-radius:24px;padding:20px 20px 16px;
            position:relative;overflow:hidden;font-family:-apple-system,system-ui,sans-serif;min-height:228px;
            transition:background 10s cubic-bezier(0.4,0,0.2,1);
            animation:sc-bg-shift 30s ease-in-out infinite;${cardExtraStyle}}
        .sc::before{content:'';position:absolute;top:-55px;left:50%;transform:translateX(-50%);
            width:270px;height:210px;
            background:radial-gradient(ellipse,rgba(${TM.gr},0.18) 0%,transparent 72%);
            pointer-events:none;
            animation:sc-glow-pulse ${elev>=0?'3.5s':'5s'} cubic-bezier(0.4,0,0.2,1) infinite;}
        .sc::after{content:'';position:absolute;inset:0;
            background:radial-gradient(ellipse at ${(nowH/24)*100}% 35%,rgba(${TM.gr},0.12) 0%,transparent 65%);
            pointer-events:none;
            animation:sc-shimmer 4s cubic-bezier(0.4,0,0.2,1) infinite;}
        .sc-top{display:flex;justify-content:space-between;align-items:flex-start;position:relative;z-index:1;}
        .sc-dc{display:flex;flex-direction:column;gap:1px;}
        .sc-day{font-size:11px;font-weight:600;color:${TM.acc};text-transform:uppercase;letter-spacing:.12em;}
        .sc-date{font-size:11px;color:${TM.acc}88;letter-spacing:.03em;}
        .sc-badge{font-size:9px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;
            white-space:nowrap;line-height:1.65;color:${TM.acc};
            border:1px solid ${TM.acc}44;padding:2px 8px;border-radius:12px;background:${TM.acc}14;
            animation:sc-breathe 3s ease-in-out infinite;}
        .sc-time{font-size:65px;font-weight:200;letter-spacing:-3px;line-height:1;
            color:${TM.tc};margin:3px 0 0;font-variant-numeric:tabular-nums;position:relative;z-index:1;}
        .sc-sec{font-size:18px;font-weight:300;color:${TM.tc}48;vertical-align:super;margin-left:1px;}
        .sc-chart{margin:10px 0 4px;position:relative;z-index:1;}
        .sc-bot{display:flex;justify-content:space-between;align-items:flex-start;margin-top:7px;position:relative;z-index:1;}
        .sc-stat{display:flex;flex-direction:column;}
        .sc-sv{font-size:14px;font-weight:600;color:rgba(255,255,255,0.82);letter-spacing:-.2px;}
        .sc-sl{font-size:9px;font-weight:500;color:rgba(255,255,255,0.28);text-transform:uppercase;letter-spacing:.07em;margin-top:1px;}
      </style>
      <div class="sc">
        <div style="position:absolute;inset:0;overflow:hidden;pointer-events:none;z-index:0;opacity:${elev>=0?'0.15':'0.08'};">
          <div style="position:absolute;top:15%;left:-10%;width:180px;height:60px;border-radius:50%;
            background:radial-gradient(ellipse,rgba(255,255,255,0.08) 0%,transparent 70%);
            filter:blur(25px);animation:sc-cloud-drift 45s linear infinite;"></div>
          <div style="position:absolute;top:40%;left:20%;width:220px;height:70px;border-radius:50%;
            background:radial-gradient(ellipse,rgba(255,255,255,0.06) 0%,transparent 70%);
            filter:blur(30px);animation:sc-cloud-drift 60s -10s linear infinite;"></div>
          <div style="position:absolute;top:65%;left:-5%;width:160px;height:55px;border-radius:50%;
            background:radial-gradient(ellipse,rgba(255,255,255,0.07) 0%,transparent 70%);
            filter:blur(28px);animation:sc-cloud-drift 52s -25s linear infinite;"></div>
        </div>
        ${temp!==null&&temp>=30&&elev>10?`
        <div style="position:absolute;inset:0;pointer-events:none;z-index:0;
          background:radial-gradient(ellipse at 60% 20%,rgba(255,160,60,0.06) 0%,transparent 60%);
          animation:sc-shimmer 2.5s ease-in-out infinite;"></div>`:''}
        ${elev>15&&elev<50&&(weatherState==='sunny'||weatherState==='clear-night')?`
        <div style="position:absolute;inset:0;overflow:hidden;pointer-events:none;z-index:0;">
          <div style="position:absolute;top:20%;left:30%;width:2px;height:2px;border-radius:50%;background:rgba(255,240,200,0.35);animation:sc-breathe 4s 0s ease-in-out infinite;"></div>
          <div style="position:absolute;top:45%;left:65%;width:2px;height:2px;border-radius:50%;background:rgba(255,240,200,0.30);animation:sc-breathe 3.5s 1s ease-in-out infinite;"></div>
          <div style="position:absolute;top:70%;left:20%;width:2px;height:2px;border-radius:50%;background:rgba(255,240,200,0.25);animation:sc-breathe 4.2s 0.5s ease-in-out infinite;"></div>
          <div style="position:absolute;top:35%;left:80%;width:2px;height:2px;border-radius:50%;background:rgba(255,240,200,0.28);animation:sc-breathe 3.8s 1.5s ease-in-out infinite;"></div>
        </div>`:''}
        ${['rainy','pouring','lightning','lightning-rainy'].includes(weatherState)?`
        <div style="position:absolute;inset:0;overflow:hidden;pointer-events:none;z-index:0;">
          ${[...Array(12)].map((_,i)=>{
            const left=(Math.random()*100).toFixed(1);
            const delay=(Math.random()*2).toFixed(2);
            const duration=(0.8+Math.random()*0.6).toFixed(2);
            return `<div style="position:absolute;left:${left}%;top:-10px;width:1.5px;height:14px;
              background:linear-gradient(to bottom,rgba(120,180,255,0.4),rgba(120,180,255,0));
              animation:sc-rain-fall ${duration}s ${delay}s linear infinite;"></div>`;
          }).join('')}
        </div>`:''}
        ${['snowy','snowy-rainy'].includes(weatherState)||(temp!==null&&temp<0)?`
        <div style="position:absolute;inset:0;overflow:hidden;pointer-events:none;z-index:0;">
          ${[...Array(10)].map((_,i)=>{
            const left=(Math.random()*100).toFixed(1);
            const delay=(Math.random()*3).toFixed(2);
            const duration=(2+Math.random()*2).toFixed(2);
            const size=(2+Math.random()*2).toFixed(1);
            const drift=(Math.random()*20-10).toFixed(0);
            return `<div style="position:absolute;left:${left}%;top:-10px;width:${size}px;height:${size}px;
              border-radius:50%;background:rgba(220,235,255,0.6);--drift:${drift}px;
              animation:sc-snow-fall ${duration}s ${delay}s ease-in-out infinite;"></div>`;
          }).join('')}
        </div>`:''}
        <div class="sc-top">
          <div class="sc-dc">
            <span class="sc-day">${DAYS[now.getDay()]}</span>
            <span class="sc-date">${now.getDate()} ${MONTHS[now.getMonth()]} ${now.getFullYear()}</span>
          </div>
          <div style="display:flex;flex-direction:column;align-items:flex-end;gap:5px;">
            <span class="sc-badge">${phaseName}</span>
            ${planetsHtml}
          </div>
        </div>
        <div class="sc-time">${pad(now.getHours())}:${pad(now.getMinutes())}<span class="sc-sec">${pad(now.getSeconds())}</span></div>
        <div class="sc-chart">${svgChart}</div>
        <div class="sc-bot">
          <div class="sc-stat">
            <span class="sc-sv">${riseStr}</span>
            <span class="sc-sl">Wschód ☀︎</span>
          </div>
          <div class="sc-stat" style="text-align:center">
            <span class="sc-sv" style="color:${TM.acc}">${elevStr}</span>
            <span class="sc-sl">Wysokość</span>
          </div>
          <div class="sc-stat" style="text-align:right">
            <span class="sc-sv">${setStr}</span>
            <span class="sc-sl">Zachód ☀︎</span>
          </div>
        </div>
        ${banners}
      </div>`;
  ]]]