    platform: rest
    resource: "https://api.callmebot.com/whatsapp.php"
    method: GET
    params:
      phone: "48791570737"
      apikey: "7549131"
      text: "{{ message }}"

sensor:                                                                                                                                                                                                                                                                    
  - platform: rest                                                                                                                                                                                                                                                         
    name: upcoming_launches
    resource: https://ll.thespacedevs.com/2.2.0/launch/upcoming/?limit=10&format=json
    value_template: "{{ value_json.count | default(0) }}"                                                                                                                                                                                                                                  
    json_attributes:
      - results                                                                                                                                                                                                                                                            
    scan_interval: 3600
  - platform: worxlandroid
    host: 192.168.33.44
    pin: 0000

rest_command:
  blynk_open_gate:
    url: "https://blynk.cloud/external/api/update?token=fnHUjeRsWteFRqJtdc0ERY6s86NW4jN4&V0=1"
    method: get

  szambo_google_sheets:
    url: "https://script.google.com/macros/s/AKfycbwcAKteuWy2g15fT_Azz4-C6-o7Wi8RE1UJd94b7-BDn7IO-pWEWfNOeEqFNK25tlBBUA/exec"
    method: POST
    headers:
      Content-Type: application/json
    payload: >
      {"dom1_m3": "{{ dom1_m3 }}", "dom1_zl": "{{ dom1_zl }}", "dom2_m3": "{{ dom2_m3 }}", "dom2_zl": "{{ dom2_zl }}", "lacznie_m3": "{{ lacznie_m3 }}", "koszt": "320"}
      
