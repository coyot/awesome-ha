# Loads default set of integrations. Do not remove.
default_config:

# Load frontend themes from the themes folder
frontend:
  themes: !include_dir_merge_named themes

automation: !include automations.yaml
script: !include scripts.yaml
scene: !include scenes.yaml

lovelace:
  resources:
    - url: /hacsfiles/button-card/button-card.js
      type: module

logger:
  default: info
  logs:
    homeassistant.components.roborock: debug
    roborock: debug

template:
  - sensor:
      - name: "Szambo dom 1 zużycie"
        unique_id: szambo_dom1_zuzycie
        unit_of_measurement: "m³"
        device_class: water
        state: >
          {{ [states('sensor.water_1_total_2') | float(0) -
          states('input_number.szambo_wywoz_dom_1') | float(0) -
          (states('input_number.ogrod_1') | float(0) -
          states('input_number.szambo_wywoz_ogrod_1') | float(0)), 0] | max | round(3) }}

      - name: "Szambo dom 2 zużycie"
        unique_id: szambo_dom2_zuzycie
        unit_of_measurement: "m³"
        device_class: water
        state: >
          {{ [states('sensor.water_2_total') | float(0) -
          states('input_number.szambo_wywoz_dom_2') | float(0) -
          (states('input_number.ogrod_2') | float(0) -
          states('input_number.szambo_wywoz_ogrod_2') | float(0)), 0] | max | round(3) }}

      - name: "Szambo zużycie"
        unique_id: szambo_zuzycie
        unit_of_measurement: "m³"
        device_class: water
        state_class: total
        state: >
          {{ [states('sensor.szambo_dom_1_zuzycie') | float(0) +
          states('sensor.szambo_dom_2_zuzycie') | float(0), 0] | max | round(3) }}

      - name: "Szambo dom 1 do zapłaty"
        unique_id: szambo_dom1_zaplata
        unit_of_measurement: "zł"
        state: >
          {% set d1 = states('sensor.szambo_dom_1_zuzycie') | float(0) %}
          {% set d2 = states('sensor.szambo_dom_2_zuzycie') | float(0) %}
          {% set total = d1 + d2 %}
          {{ ((d1 / total * 320) if total > 0 else 0) | round(2) }}

      - name: "Szambo dom 2 do zapłaty"
        unique_id: szambo_dom2_zaplata
        unit_of_measurement: "zł"
        state: >
          {% set d1 = states('sensor.szambo_dom_1_zuzycie') | float(0) %}
          {% set d2 = states('sensor.szambo_dom_2_zuzycie') | float(0) %}
          {% set total = d1 + d2 %}
          {{ ((d2 / total * 320) if total > 0 else 0) | round(2) }}

      - name: "Ogród 1 zużycie"
        unique_id: ogrod1_zuzycie
        unit_of_measurement: "m³"
        device_class: water
        state: >
          {{ [states('input_number.ogrod_1') | float(0) -
          states('input_number.szambo_wywoz_ogrod_1') | float(0), 0] | max | round(3) }}

      - name: "Ogród 2 zużycie"
        unique_id: ogrod2_zuzycie
        unit_of_measurement: "m³"
        device_class: water
        state: >
          {{ [states('input_number.ogrod_2') | float(0) -
          states('input_number.szambo_wywoz_ogrod_2') | float(0), 0] | max | round(3) }}

      - name: "Szambo godziny od wywozu"
        unique_id: szambo_godziny_od_wywozu
        state: >
          {{ ((now().timestamp() - as_timestamp(states('input_datetime.ostatni_wywoz_szamba'))) / 3600) | round(0) | int }}
        unit_of_measurement: "h"

      - name: "Szambo poziom procent"
        unique_id: szambo_procent
        unit_of_measurement: "%"
        state: >
          {{ ((states('sensor.szambo_zuzycie') | float(0) / 10) * 100) | round(0) }}

      - name: "Szambo przyrost dzienny"
        unique_id: szambo_przyrost_dzienny
        unit_of_measurement: "m³/d"
        state: >
          {% set current = states('sensor.szambo_zuzycie') | float(0) %}
          {% set hours = states('sensor.szambo_godziny_od_wywozu') | float(0) %}
          {% set days = hours / 24 %}
          {% if days > 0 %}
            {{ (current / days) | round(4) }}
          {% else %}
            0
          {% endif %}

      - name: "Szambo dni do pełna"
        unique_id: szambo_dni_do_pelna
        unit_of_measurement: "dni"
        state: >
          {% set current = states('sensor.szambo_zuzycie') | float(0) %}
          {% set rate = states('sensor.szambo_przyrost_dzienny') | float(0) %}
          {% if rate > 0 %}
            {{ ((10 - current) / rate) | round(1) }}
          {% else %}
            unknown
          {% endif %}

      - name: "Szambo prognoza"
        unique_id: szambo_prognoza
        unit_of_measurement: "m³"
        state: >
          {% set rate = states('sensor.szambo_przyrost_dzienny') | float(0) %}
          {% set hours = states('sensor.szambo_godziny_od_wywozu') | float(0) %}
          {% set days = hours / 24 %}
          {{ (rate * days) | round(2) }}

      - name: Wjazd 1
        state: >
          {% set s = states('input_text.wjazd_1') %}
          {% if '|' in s %}
            {% set kto = s.split('|')[0] %}
            {% set ts = as_timestamp(s.split('|')[1]) %}
            {% set diff = (now().timestamp() - ts) / 60 %}
            {% set name = 'Tomek' if kto == 'person.tk' else 'Monika' if kto == 'person.mk' else '' %}
            {% set today = now().date() %}
            {% set entry_date = (ts | timestamp_local | as_datetime).date() %}
            {% if diff < 1 %}
              {{ name }} @ teraz
            {% elif diff < 60 %}
              {{ name }} @ {{ diff | int }} min temu
            {% elif entry_date == today %}
              {{ name }} @ dziś {{ ts | timestamp_custom('%H:%M') }}
            {% elif (today - entry_date).days == 1 %}
              {{ name }} @ wczoraj {{ ts | timestamp_custom('%H:%M') }}
            {% else %}
              {{ name }} @ {{ ts | timestamp_custom('%d.%m %H:%M') }}
            {% endif %}
          {% else %}
            -
          {% endif %}
        attributes:
          entity_picture: >
            {% set s = states('input_text.wjazd_1') %}
            {% if 'person.tk' in s %}
              {{ state_attr('person.tk','entity_picture') }}
            {% elif 'person.mk' in s %}
              {{ state_attr('person.mk','entity_picture') }}
            {% endif %}

      - name: Wjazd 2
        state: >
          {% set s = states('input_text.wjazd_2') %}
          {% if '|' in s %}
            {% set kto = s.split('|')[0] %}
            {% set ts = as_timestamp(s.split('|')[1]) %}
            {% set diff = (now().timestamp() - ts) / 60 %}
            {% set name = 'Tomek' if kto == 'person.tk' else 'Monika' if kto == 'person.mk' else '' %}
            {% set today = now().date() %}
            {% set entry_date = (ts | timestamp_local | as_datetime).date() %}
            {% if diff < 1 %}
              {{ name }} @ teraz
            {% elif diff < 60 %}
              {{ name }} @ {{ diff | int }} min temu
            {% elif entry_date == today %}
              {{ name }} @ dziś {{ ts | timestamp_custom('%H:%M') }}
            {% elif (today - entry_date).days == 1 %}
              {{ name }} @ wczoraj {{ ts | timestamp_custom('%H:%M') }}
            {% else %}
              {{ name }} @ {{ ts | timestamp_custom('%d.%m %H:%M') }}
            {% endif %}
          {% else %}
            -
          {% endif %}
        attributes:
          entity_picture: >
            {% set s = states('input_text.wjazd_2') %}
            {% if 'person.tk' in s %}
              {{ state_attr('person.tk','entity_picture') }}
            {% elif 'person.mk' in s %}
              {{ state_attr('person.mk','entity_picture') }}
            {% endif %}

      - name: Wjazd 3
        state: >
          {% set s = states('input_text.wjazd_3') %}
          {% if '|' in s %}
            {% set kto = s.split('|')[0] %}
            {% set ts = as_timestamp(s.split('|')[1]) %}
            {% set diff = (now().timestamp() - ts) / 60 %}
            {% set name = 'Tomek' if kto == 'person.tk' else 'Monika' if kto == 'person.mk' else '' %}
            {% set today = now().date() %}
            {% set entry_date = (ts | timestamp_local | as_datetime).date() %}
            {% if diff < 1 %}
              {{ name }} @ teraz
            {% elif diff < 60 %}
              {{ name }} @ {{ diff | int }} min temu
            {% elif entry_date == today %}
              {{ name }} @ dziś {{ ts | timestamp_custom('%H:%M') }}
            {% elif (today - entry_date).days == 1 %}
              {{ name }} @ wczoraj {{ ts | timestamp_custom('%H:%M') }}
            {% else %}
              {{ name }} @ {{ ts | timestamp_custom('%d.%m %H:%M') }}
            {% endif %}
          {% else %}
            -
          {% endif %}
        attributes:
          entity_picture: >
            {% set s = states('input_text.wjazd_3') %}
            {% if 'person.tk' in s %}
              {{ state_attr('person.tk','entity_picture') }}
            {% elif 'person.mk' in s %}
              {{ state_attr('person.mk','entity_picture') }}
            {% endif %}

  - binary_sensor:
      - name: "Ogród 1 dane nieaktualne"
        unique_id: ogrod_1_dane_nieaktualne
        state: >
          {{ (now().timestamp() - as_timestamp(states('input_datetime.ogrod_1_ostatnia_aktualizacja'))) > 259200 }}
        icon: >
          {{ 'mdi:alert-circle' if (now().timestamp() - as_timestamp(states('input_datetime.ogrod_1_ostatnia_aktualizacja'))) > 259200 else 'mdi:check-circle' }}

      - name: "Ogród 2 dane nieaktualne"
        unique_id: ogrod_2_dane_nieaktualne
        state: >
          {{ (now().timestamp() - as_timestamp(states('input_datetime.ogrod_2_ostatnia_aktualizacja'))) > 259200 }}
        icon: >
          {{ 'mdi:alert-circle' if (now().timestamp() - as_timestamp(states('input_datetime.ogrod_2_ostatnia_aktualizacja'))) > 259200 else 'mdi:check-circle' }}

  - trigger:
      - platform: time_pattern
        hours: "/1"
      - platform: homeassistant
        event: start
    action:
      - service: weather.get_forecasts
        data:
          type: daily
        target:
          entity_id: weather.forecast_home
        response_variable: daily_forecast
    sensor:
      - name: "Prognoza pogody 5 dni"
        unique_id: weather_forecast_5day_data
        state: "{{ now().strftime('%Y-%m-%d %H:%M') }}"
        attributes:
          forecast: >
            {{ daily_forecast['weather.forecast_home'].forecast[:5] }}
        icon: mdi:weather-cloudy-clock
  - trigger:
      - platform: time_pattern
        hours: "/1"
      - platform: homeassistant
        event: start
    action:
      - service: weather.get_forecasts
        data:
          type: hourly
        target:
          entity_id: weather.forecast_home
        response_variable: fc
    sensor:
      - name: "Forecast Hourly JSON"
        unique_id: forecast_hourly_json
        state: "{{ now().isoformat() }}"
        attributes:
          forecast: "{{ fc['weather.forecast_home'].forecast }}"

waste_collection_schedule:
  sources:
    - name: ecoharmonogram_pl
      args:
        town: "Suchy Las"
        street: "Mokra"
        house_number: "49"
        district: "Suchy Las"
  sensors:
    - name: "Harmonogram BIO"
      details_format: "upcoming"
      value_template: '{{ value.daysTo }}'
      types:
        - BIO
    - name: "Harmonogram Segregowane"
      details_format: "upcoming"
      value_template: '{{ value.daysTo }}'
      types:
        - ODPADY SEGREGOWANE
    - name: "Harmonogram Zmieszane"
      details_format: "upcoming"
      value_template: '{{ value.daysTo }}'
      types:
        - ODPADY ZMIESZANE
    - name: "Harmonogram Gabaryty"
      details_format: "upcoming"
      value_template: '{{ value.daysTo }}'
      types:
        - WIELKOGABARYTY
    - name: "Harmonogram Płatność"
      details_format: "upcoming"
      value_template: '{{ value.date.strftime("%d.%m.%Y") }}'
      types:
        - TERMIN PŁATNOŚCI

