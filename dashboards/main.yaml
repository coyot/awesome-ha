  - type: sections
    max_columns: 4
    icon: mdi:emoticon-poop
    path: ""
    sections:
      - type: grid
        cards:
          - type: heading
            heading: Statystyki
            heading_style: title
            icon: mdi:chart-arc
          - type: custom:aha-action-apple-card
            entity: input_button.wywoz_szamba
