                  if (r < 0.5)  return { txt:'Mżawka',        col:'#7DD8FF', glow:'#3A7AAA' };
                  if (r < 2.5)  return { txt:'Lekki deszcz',  col:'#5AC8FA', glow:'#2A6A9A' };
                  if (r < 7.5)  return { txt:'Umiarkowany',   col:'#3AAEF0', glow:'#1A5A8A' };
                  if (r < 50)   return { txt:'Silny deszcz',  col:'#2090E0', glow:'#0A4070' };
                  return               { txt:'Ulewa',          col:'#1070C0', glow:'#082848' };
                }

                const ri = rateClass(rate);

                // ── Kolor dużej liczby (dziś) ─────────────────────────────
                function dayColor(d) {
                  if (d === null || d === 0) return 'rgba(255,255,255,0.18)';
                  if (d < 1)   return '#C8EEFF';
                  if (d < 5)   return '#9AD8FF';
                  if (d < 15)  return '#5AC8FA';
                  if (d < 30)  return '#3AAEF0';
                  return               '#2090E0';
