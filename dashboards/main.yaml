                      + (on ? "<rect x=\"4\" y=\"9\" width=\"16\" height=\"4.5\" rx=\"2.2\" fill=\"" + col2 + "\"/>" : "")
                      + "</svg>";
                    var iconWrapBg = on ? col : "#2c2c2e";
                    var iconWrapSh = on ? ("0 0 14px " + col5) : "none";
                    var pill = (on && colorName)
                      ? "<span style=\"font-size:9px;font-weight:700;padding:2px 8px;border-radius:20px;"
                        + "letter-spacing:0.04em;text-transform:uppercase;"
                        + "background:" + col1 + ";color:" + col + ";border:0.5px solid " + col3 + ";\">"
                        + colorName + "</span>"
                      : "";
                    var chipAlpha = on ? "0.07" : "0.04";
                    var chipTxt   = on ? "0.50" : "0.25";
                    var chipBd    = on ? "0.12" : "0.07";
                    function chip(t){
                      return "<span style=\"font-size:9px;font-weight:500;padding:2px 7px;border-radius:10px;"
                        + "background:rgba(255,255,255," + chipAlpha + ");"
                        + "color:rgba(255,255,255," + chipTxt + ");"
                        + "border:0.5px solid rgba(255,255,255," + chipBd + ");\">" + t + "</span>";
                    }
                    var chips = [model, room, "Govee"].filter(Boolean).map(chip).join("");
                    var briBar = on
                      ? "<div style=\"height:3px;border-radius:2px;background:rgba(255,255,255,0.1);margin-top:9px;overflow:hidden;\">"
                        + "<div style=\"height:100%;width:" + briPct + "%;background:" + col + ";border-radius:2px;\"></div></div>"
                      : "";
                    var nameCol  = on ? "#ffffff" : "rgba(255,255,255,0.28)";
                    var stateCol = on ? col : "#3a3a3c";
                    var stateTxt = on ? ("Wlaczona · " + briPct + "%") : "Wylaczona";
                    var dotStyle = on
                      ? "background:" + col + ";box-shadow:0 0 5px " + col5 + ";animation:lp-dot 2.2s ease-in-out infinite;"
                      : "background:#3a3a3c;";
                    return "<style>" + glowAnim + dotAnim + "</style>"
                      + "<div style=\"background:" + bgCard + ";border:" + borderCard + ";"
                      + "border-radius:20px;padding:15px 14px 13px;display:flex;flex-direction:column;"
                      + "justify-content:space-between;min-height:148px;font-family:-apple-system,sans-serif;"
                      + (on ? "animation:lp-pulse 3s ease-in-out infinite;" : "") + "\">"
                      + "<div style=\"display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:10px;\">"
                      + "<div style=\"width:38px;height:38px;border-radius:12px;display:flex;"
                      + "align-items:center;justify-content:center;flex-shrink:0;"
                      + "background:" + iconWrapBg + ";box-shadow:" + iconWrapSh + ";\">"
                      + iconCeil + "</div>"
                      + pill + "</div>"
                      + "<div style=\"display:flex;flex-direction:column;gap:3px;\">"
                      + "<span style=\"font-size:13px;font-weight:600;color:" + nameCol + ";letter-spacing:-0.02em;\">" + name + "</span>"
                      + "<div style=\"display:flex;align-items:center;gap:5px;margin-top:1px;\">"
                      + "<span style=\"width:5px;height:5px;border-radius:50%;flex-shrink:0;display:inline-block;" + dotStyle + "\"></span>"
                      + "<span style=\"font-size:10px;font-weight:600;letter-spacing:0.05em;color:" + stateCol + ";\">" + stateTxt + "</span>"
                      + "</div>"
                      + "<div style=\"display:flex;gap:5px;flex-wrap:wrap;margin-top:6px;\">" + chips + "</div>"
                      + "</div>"
                      + briBar
                      + "</div>";
                  ]]]
