              - type: custom:aha-szambo-apple-card
                capacity: 10
                warn_observe: 7
                warn_plan: 9
                dom1_name: Dom 49/1
                dom2_name: Dom 49/2
                entity_total: sensor.szambo_zuzycie
                entity_dom1_szambo: sensor.szambo_dom_1_zuzycie
                entity_dom1_ogrod: sensor.ogrod_1_zuzycie
                entity_dom2_szambo: sensor.szambo_dom_2_zuzycie
                entity_dom2_ogrod: sensor.ogrod_2_zuzycie
                entity_stale: binary_sensor.ogrod_dane_nieaktualne
          - type: custom:button-card
            entity: input_text.szambo_h1
            show_name: false
            show_icon: false
            show_state: false
            tap_action:
              action: none
            styles:
              card:
                - padding: 14px 16px
                - background: var(--card-background-color)
                - border-radius: 12px
                - cursor: default
              grid:
                - grid-template-areas: "\"main\""
                - grid-template-columns: 1fr
            custom_fields:
              main: |
                [[[
                  const raw = [];
                  for (let i = 1; i <= 10; i++) {
                    const st = states['input_text.szambo_h' + i];
                    if (st && st.state && st.state.startsWith('{')) {
                      try { raw.push(JSON.parse(st.state)); } catch(e) {}
                    }
                  }
                  if (!raw.length) return '<div style="color:var(--secondary-text-color)">brak danych</div>';

                  raw.sort((a,b) => new Date(a.d) - new Date(b.d));

                  const THRESHOLD = 10;
                  const fmt = v => Number(v).toFixed(2);
                  const today = new Date(); today.setHours(0,0,0,0);

                  function daysDiff(ds) {
                    const d = new Date(ds); d.setHours(0,0,0,0);
                    return Math.round((today - d) / 86400000);
                  }
                  function formatDate(ds) {
                    const d = new Date(ds);
                    const m = ['stycznia','lutego','marca','kwietnia','maja','czerwca',
                               'lipca','sierpnia','września','października','listopada','grudnia'];
                    return d.getDate() + ' ' + m[d.getMonth()] + ' ' + d.getFullYear();
                  }
                  function formatShort(ds) {
                    const d = new Date(ds);
                    const m = ['sty','lut','mar','kwi','maj','cze','lip','sie','wrz','paź','lis','gru'];
                    return m[d.getMonth()] + ' ' + String(d.getDate()).padStart(2,'0');
                  }

                  const last = raw[raw.length - 1];
                  const ago = daysDiff(last.d);
                  const intervals = raw.filter(r => r.dni > 0).map(r => r.dni);
                  const avgInterval = intervals.length
                    ? Math.round(intervals.reduce((a,b)=>a+b,0)/intervals.length) : 0;
                  const daysUntilNext = avgInterval - ago;

                  const badgeSoon   = daysUntilNext <= 0;
                  const badgeBg     = badgeSoon ? '#f8d7da' : '#fff3cd';
                  const badgeColor  = badgeSoon ? '#842029' : '#856404';
                  const badgeBorder = badgeSoon ? '#f5c2c7' : '#ffc107';
                  const badgeText   = badgeSoon ? 'czas na wywóz!' : 'następny za ~' + daysUntilNext + ' dni';

                  const tot = last.d1z + last.d2z;
                  const d1pct = tot > 0 ? Math.round(last.d1z / tot * 100) : 50;
                  const d2pct = tot > 0 ? Math.round(last.d2z / tot * 100) : 50;

                  // ── TIMELINE (3 newest) ──────────────────────────────────────────
                  const top3 = raw.slice().reverse().slice(0, 3);
                  let tlHtml = '';
                  top3.forEach((d, i) => {
                    const isFirst = i === 0;
                    const dot = `<div style="width:8px;height:8px;border-radius:50%;background:${isFirst?'#f5a623':'var(--divider-color)'};margin-top:3px;flex-shrink:0"></div>`;
                    const line = i < 2
                      ? `<div style="width:1px;flex:1;background:var(--divider-color);margin:3px 0;min-height:10px"></div>`
                      : '';
                    const m3bg  = d.lm > THRESHOLD ? '#f8d7da' : 'var(--secondary-background-color)';
                    const m3col = d.lm > THRESHOLD ? '#842029' : 'var(--secondary-text-color)';
                    const m3br  = d.lm > THRESHOLD ? '#f5c2c7' : 'var(--divider-color)';
                    tlHtml += `
                      <div style="display:flex;align-items:stretch">
                        <div style="display:flex;flex-direction:column;align-items:center;width:24px;flex-shrink:0">
                          ${dot}${line}
                        </div>
                        <div style="flex:1;padding-bottom:${i===2?'0':'10px'}">
                          <div style="font-size:12px;font-weight:500;color:var(--primary-text-color)">
                            ${formatDate(d.d)}
                            ${d.dni ? `<span style="font-size:10px;color:#f5a623;margin-left:4px">· po ${d.dni} dniach</span>` : ''}
                          </div>
                          <div style="display:flex;gap:5px;margin-top:3px;flex-wrap:wrap">
                            <span style="font-size:10px;padding:1px 6px;border-radius:20px;border:.5px solid;background:${m3bg};color:${m3col};border-color:${m3br}">${d.lm} m³</span>
                            <span style="font-size:10px;padding:1px 6px;border-radius:20px;border:.5px solid;background:#e6f1fb;color:#185fa5;border-color:#b5d4f4">Dom 1: ${fmt(d.d1z)} zł · ${d.d1m} m³</span>
                            <span style="font-size:10px;padding:1px 6px;border-radius:20px;border:.5px solid;background:#faeeda;color:#854f0b;border-color:#fac775">Dom 2: ${fmt(d.d2z)} zł · ${d.d2m} m³</span>
                          </div>
                        </div>
                      </div>`;
                  });

                  // ── CHART ────────────────────────────────────────────────────────
                  const W = 320, H = 72, n = raw.length, gap = 3;
                  const barW = Math.floor((W - gap * (n-1)) / n);
                  const maxVal = 12;
                  const selIdx = raw.length - 1;
                  const COL_D1 = '#185fa5', COL_D1_DIM = '#378add';
                  const COL_D2 = '#ba7517', COL_D2_DIM = '#ef9f27';
                  const COL_RED = '#e24b4a';
                  const thY = Math.round(H - (THRESHOLD / maxVal) * H);

                  let bars = '';
                  bars += `<line x1="0" x2="${W}" y1="${thY}" y2="${thY}" stroke="${COL_RED}" stroke-width="0.5" stroke-dasharray="3 3" opacity="0.5"/>`;
                  bars += `<text x="${W-2}" y="${thY-2}" text-anchor="end" font-size="8" fill="${COL_RED}" opacity="0.7">10 m³</text>`;

                  raw.forEach((d, i) => {
                    const x = i * (barW + gap);
                    const isSel = i === selIdx;
                    const op = isSel ? '1' : '0.45';
                    if (isSel) bars += `<rect x="${x-2}" y="0" width="${barW+4}" height="${H}" rx="3" fill="#888" opacity="0.15"/>`;
                    const h1 = Math.round((d.d1m / maxVal) * H);
                    bars += `<rect x="${x}" y="${H-h1}" width="${barW}" height="${h1}" rx="2" fill="${isSel?COL_D1:COL_D1_DIM}" opacity="${op}"/>`;
                    const h2 = Math.round((d.d2m / maxVal) * H);
                    bars += `<rect x="${x}" y="${H-h2-h1}" width="${barW}" height="${h2}" rx="2" fill="${isSel?COL_D2:COL_D2_DIM}" opacity="${op}"/>`;
                    if (d.lm > THRESHOLD) {
                      bars += `<circle cx="${x+barW/2}" cy="${H-h1-h2-4}" r="2.5" fill="${COL_RED}" opacity="${op}"/>`;
                    }
                  });

                  let xLabels = '';
                  raw.forEach((d, i) => {
                    const bold = i === selIdx ? ';color:var(--primary-text-color);font-weight:500' : '';
                    xLabels += `<span style="flex:1;text-align:center;font-size:9px;color:var(--secondary-text-color)${bold}">${i%2===0?formatShort(d.d):''}</span>`;
                  });

                  // ── RENDER ────────────────────────────────────────────────────────
                  return `
                    <div style="font-family:-apple-system,'SF Pro Text','Helvetica Neue',Arial,sans-serif;padding:2px 0">

                      <span style="display:inline-block;font-size:11px;padding:2px 8px;border-radius:20px;
                        background:${badgeBg};color:${badgeColor};border:0.5px solid ${badgeBorder};margin-bottom:10px">
                        ${badgeText}
                      </span>

                      <div style="font-size:10px;font-weight:500;color:var(--secondary-text-color);
                        text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px">
                        Ostatni wywóz · ${formatDate(last.d)}${last.dni ? ' · po ' + last.dni + ' dniach' : ''}
                      </div>

                      <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:8px">
                        <div style="background:var(--secondary-background-color);border-radius:8px;padding:8px 10px">
                          <div style="font-size:17px;font-weight:500;line-height:1.1;color:var(--primary-text-color)">${ago}</div>
                          <div style="font-size:10px;color:var(--secondary-text-color);margin-top:2px">dni temu</div>
                        </div>
                        <div style="background:var(--secondary-background-color);border-radius:8px;padding:8px 10px">
                          <div style="font-size:17px;font-weight:500;line-height:1.1;color:${last.lm>THRESHOLD?'#e24b4a':'var(--primary-text-color)'}">${last.lm} m³</div>
                          <div style="font-size:10px;color:var(--secondary-text-color);margin-top:2px">wywieziono</div>
                        </div>
                        <div style="background:var(--secondary-background-color);border-radius:8px;padding:8px 10px">
                          <div style="font-size:17px;font-weight:500;line-height:1.1;color:#185fa5">${fmt(last.d1z)} zł</div>
                          <div style="font-size:10px;color:var(--secondary-text-color);margin-top:2px">Dom 1 · ${last.d1m} m³</div>
                        </div>
                        <div style="background:var(--secondary-background-color);border-radius:8px;padding:8px 10px">
                          <div style="font-size:17px;font-weight:500;line-height:1.1;color:#854f0b">${fmt(last.d2z)} zł</div>
                          <div style="font-size:10px;color:var(--secondary-text-color);margin-top:2px">Dom 2 · ${last.d2m} m³</div>
                        </div>
                      </div>

                      <div style="margin-bottom:14px">
                        <div style="display:flex;align-items:center;gap:8px;margin-bottom:5px">
                          <div style="font-size:11px;color:var(--secondary-text-color);width:44px;flex-shrink:0">Dom 1</div>
                          <div style="flex:1;height:5px;background:var(--divider-color);border-radius:3px;overflow:hidden">
                            <div style="width:${d1pct}%;height:100%;border-radius:3px;background:#185fa5"></div>
                          </div>
                          <div style="font-size:11px;width:90px;text-align:right;flex-shrink:0;color:#185fa5">${fmt(last.d1z)} zł · ${last.d1m} m³</div>
                        </div>
                        <div style="display:flex;align-items:center;gap:8px">
                          <div style="font-size:11px;color:var(--secondary-text-color);width:44px;flex-shrink:0">Dom 2</div>
                          <div style="flex:1;height:5px;background:var(--divider-color);border-radius:3px;overflow:hidden">
                            <div style="width:${d2pct}%;height:100%;border-radius:3px;background:#ba7517"></div>
                          </div>
                          <div style="font-size:11px;width:90px;text-align:right;flex-shrink:0;color:#854f0b">${fmt(last.d2z)} zł · ${last.d2m} m³</div>
                        </div>
                      </div>

                      <div style="height:.5px;background:var(--divider-color);margin:0 0 12px"></div>

                      ${tlHtml}

                      <div style="height:.5px;background:var(--divider-color);margin:12px 0"></div>

                      <div style="font-size:10px;color:var(--secondary-text-color);margin-bottom:6px;display:flex;justify-content:space-between">
                        <span>Wywiezione m³</span>
                        <span>
                          <span style="width:8px;height:8px;border-radius:2px;background:#185fa5;display:inline-block;margin-right:3px;vertical-align:middle"></span>Dom 1
                          <span style="width:8px;height:8px;border-radius:2px;background:#ba7517;display:inline-block;margin-right:3px;vertical-align:middle;margin-left:8px"></span>Dom 2
                        </span>
                      </div>
                      <svg viewBox="0 0 ${W} ${H}" style="width:100%;height:${H}px">${bars}</svg>
                      <div style="display:flex;margin-top:3px">${xLabels}</div>

                    </div>`;
                ]]]
      - type: grid
        cards:
          - type: custom:aha-szambo-finance-card
            cost: 320
            dom1_name: Dom 49/1
            dom2_name: Dom 49/2
            entity_dom1_zaplata: sensor.szambo_dom_1_do_zaplaty
            entity_dom2_zaplata: sensor.szambo_dom_2_do_zaplaty
            entity_dom1_zuzycie: sensor.szambo_dom_1_zuzycie
            entity_dom2_zuzycie: sensor.szambo_dom_2_zuzycie
          - type: custom:mini-graph-card
            name: 🪣 Historia szamba
            hours_to_show: 90
            points_per_hour: 1
            line_width: 3
            animate: true
            show:
              legend: true
              extrema: true
              average: false
            entities:
              - entity: sensor.szambo_zuzycie
                name: Szambo łącznie 💧
                color: "#2196F3"
              - entity: sensor.szambo_dom_1_zuzycie
                name: Dom 49/1 🏠
                color: "#4CAF50"
              - entity: sensor.szambo_dom_2_zuzycie
                name: Dom 49/2 🏠
                color: "#FF9800"
              - entity: sensor.ogrod_1_zuzycie
                name: Ogród 49/1 🌱
                color: "#9C27B0"
              - entity: sensor.ogrod_2_zuzycie
                name: Ogród 49/2 🌱
                color: "#E91E63"
          - type: custom:apexcharts-card
            chart_type: pie
            header:
              show: true
              title: 🪣 Podział zużycia szamba
              show_states: true
              colorize_states: true
            apex_config:
              dataLabels:
                enabled: true
                formatter: |
                  EVAL:function(val) { return val.toFixed(1) + '%' }
            series:
              - entity: sensor.szambo_dom_1_zuzycie
                name: Dom 49/1 🏠
                color: "#2196F3"
                float_precision: 3
                unit: " m³"
                data_generator: |
                  return [[Date.now(), parseFloat(entity.state)]];
              - entity: sensor.szambo_dom_2_zuzycie
                name: Dom 49/2 🏠
                color: "#FF9800"
                float_precision: 3
                unit: " m³"
                data_generator: |
                  return [[Date.now(), parseFloat(entity.state)]];
          - type: custom:apexcharts-card
            update_interval: 1min
            graph_span: 4d
            header:
              show: true
              title: 🪣 Szambo – od ostatniego wywozu
              show_states: true
              colorize_states: true
            apex_config:
              chart:
                height: 350
              yaxis:
                min: 0
                max: 10
              xaxis:
                min: >
                  {{
                  (as_timestamp(states('input_datetime.ostatni_wywoz_szamba')) *
                  1000) | int }}
                max: |
                  {{ (now().timestamp() * 1000) | int }}
              annotations:
                yaxis:
                  - "y": 7
                    borderColor: "#FFD54F"
                    label:
                      text: 7m³ ostrzeżenie
                  - "y": 8
                    borderColor: "#FF9800"
                    label:
                      text: 8m³ przypomnienie
                  - "y": 9
                    borderColor: "#F44336"
                    label:
                      text: 9m³ pilne
                  - "y": 10
                    borderColor: "#000000"
                    label:
                      text: 10m³ pełne
            series:
              - entity: sensor.szambo_zuzycie
                name: Szambo łącznie 💧
                stroke_width: 4
                color: "#2196F3"
              - entity: sensor.szambo_prognoza
                name: Prognoza 📈
                stroke_width: 3
                color: "#000000"
                opacity: 0.6
                curve: smooth
              - entity: sensor.szambo_dom_1_zuzycie
                name: Dom 49/1 🏠
                stroke_width: 2
                opacity: 0.6
                color: "#4CAF50"
              - entity: sensor.szambo_dom_2_zuzycie
                name: Dom 49/2 🏠
                stroke_width: 2
                opacity: 0.6
                color: "#FF9800"
              - entity: sensor.ogrod_1_zuzycie
                name: Ogród 49/1 🌱
                stroke_width: 2
                opacity: 0.5
                color: "#9C27B0"
              - entity: sensor.ogrod_2_zuzycie
                name: Ogród 49/2 🌱
                stroke_width: 2
                opacity: 0.5
                color: "#E91E63"
    header:
      card:
        type: markdown
        text_only: true
        content: "# Szambo 💩"
