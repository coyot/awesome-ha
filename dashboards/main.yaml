                    frosty: dim ? '#3060C0' : '#4DA6FF',
                    freeze: dim ? '#8040B8' : '#BF5AF2',
                  };
                  if (t >= 35) return colors.hot;
                  if (t >= 28) return colors.warm2;
                  if (t >= 22) return colors.warm1;
                  if (t >= 15) return colors.mild;
                  if (t >=  8) return colors.cool;
                  if (t >=  0) return colors.cold;
                  if (t >= -8) return colors.frosty;
                  return colors.freeze;
