                label: |
                  [[[
                    var on  = entity.state === "on";
                    var rgb = entity.attributes.rgb_color;
                    var bri = entity.attributes.brightness;
                    var r = (rgb && on) ? rgb[0] : 80;
                    var g = (rgb && on) ? rgb[1] : 80;
                    var b = (rgb && on) ? rgb[2] : 80;
                    var col  = "rgb(" + r + "," + g + "," + b + ")";
                    var col0 = "rgba(" + r + "," + g + "," + b + ",0)";
                    var col1 = "rgba(" + r + "," + g + "," + b + ",0.10)";
                    var col2 = "rgba(" + r + "," + g + "," + b + ",0.18)";
                    var col3 = "rgba(" + r + "," + g + "," + b + ",0.25)";
                    var col5 = "rgba(" + r + "," + g + "," + b + ",0.50)";
                    var lum  = (0.299*r + 0.587*g + 0.114*b) / 255;
                    var iconS = on ? (lum > 0.6 ? "#3a2200" : "rgba(255,255,255,0.92)") : "#3a3a3c";
                    var briPct = bri ? Math.round(bri / 255 * 100) : 0;
                    var name  = variables.card_name  || entity.attributes.friendly_name;
                    var model = variables.card_model || "";
                    var room  = variables.card_room  || "";
                    var COLORS = [
                      {pl:"czerwony",    r:255,g:0,  b:0  },
                      {pl:"zielony",     r:0,  g:255,b:0  },
                      {pl:"niebieski",   r:0,  g:0,  b:255},
                      {pl:"zolty",       r:255,g:255,b:0  },
                      {pl:"cyjan",       r:0,  g:255,b:255},
                      {pl:"magenta",     r:255,g:0,  b:255},
                      {pl:"pomaranczowy",r:255,g:165,b:0  },
                      {pl:"fioletowy",   r:128,g:0,  b:128},
                      {pl:"rozowy",      r:255,g:105,b:180},
                      {pl:"bialy",       r:255,g:255,b:255},
                      {pl:"ciepły bialy",r:255,g:220,b:150}
                    ];
                    function dist(c){ return Math.sqrt(Math.pow(r-c.r,2)+Math.pow(g-c.g,2)+Math.pow(b-c.b,2)); }
                    var best = COLORS.reduce(function(a,c){ return dist(c)<dist(a)?c:a; });
                    var colorName = (on && dist(best) < 65) ? best.pl : null;
                    var bgCard = on ? "linear-gradient(145deg," + col2 + " 0%,#1c1c1e 55%)" : "#1c1c1e";
                    var borderCard = on ? "1px solid " + col3 : "0.5px solid rgba(255,255,255,0.08)";
                    var glowAnim = on ? "@keyframes lp-pulse{0%,100%{box-shadow:0 0 0 0 " + col0 + ";}50%{box-shadow:0 0 0 6px " + col1 + ";}}" : "";
                    var dotAnim = on ? "@keyframes lp-dot{0%,100%{opacity:1;}50%{opacity:0.2;}}" : "";
                    var iconCeil = "<svg width=\"22\" height=\"22\" viewBox=\"0 0 24 24\" fill=\"none\">"
