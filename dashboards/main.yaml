                - box-shadow: none
                - border: none
              label:
                - padding: "0"
                - width: 100%
                - white-space: normal
                - line-height: "1"
            label: |
              [[[
                const forecast = states['weather.forecast_home'].attributes?.forecast ?? [];

                const DAYS_PL = ['Niedz','Pon','Wt','Śr','Czw','Pt','Sob'];
                const MONTHS_PL = ['sty','lut','mar','kwi','maj','cze','lip','sie','wrz','paź','lis','gru'];

                function tempColor(t) {
                  if (t >= 35) return '#FF3B30';
                  if (t >= 28) return '#FF6B00';
                  if (t >= 22) return '#FF9F0A';
                  if (t >= 15) return '#F5C842';
                  if (t >=  8) return '#30D158';
                  if (t >=  0) return '#5AC8FA';
                  if (t >= -8) return '#4DA6FF';
                  return '#BF5AF2';
                }

                function weatherIcon(condition) {
                  const c = condition ?? '';
                  if (['sunny','clear-night'].includes(c))
                    return `<svg viewBox="0 0 24 24" fill="none" width="20" height="20">
                      <circle cx="12" cy="12" r="5" fill="#F5A623"/>
                      <line x1="12" y1="2"  x2="12" y2="5"  stroke="#F5A623" stroke-width="2" stroke-linecap="round"/>
                      <line x1="12" y1="19" x2="12" y2="22" stroke="#F5A623" stroke-width="2" stroke-linecap="round"/>
                      <line x1="2"  y1="12" x2="5"  y2="12" stroke="#F5A623" stroke-width="2" stroke-linecap="round"/>
                      <line x1="19" y1="12" x2="22" y2="12" stroke="#F5A623" stroke-width="2" stroke-linecap="round"/>
                      <line x1="4.9" y1="4.9" x2="7.1" y2="7.1" stroke="#F5A623" stroke-width="1.5" stroke-linecap="round"/>
                      <line x1="16.9" y1="16.9" x2="19.1" y2="19.1" stroke="#F5A623" stroke-width="1.5" stroke-linecap="round"/>
                      <line x1="19.1" y1="4.9" x2="16.9" y2="7.1" stroke="#F5A623" stroke-width="1.5" stroke-linecap="round"/>
                      <line x1="7.1" y1="16.9" x2="4.9" y2="19.1" stroke="#F5A623" stroke-width="1.5" stroke-linecap="round"/>
                    </svg>`;
                  if (['partlycloudy'].includes(c))
                    return `<svg viewBox="0 0 24 24" fill="none" width="20" height="20">
                      <circle cx="16" cy="8" r="4" fill="#F5C842" opacity=".85"/>
                      <line x1="16" y1="2" x2="16" y2="4" stroke="#F5C842" stroke-width="1.5" stroke-linecap="round"/>
                      <line x1="20.2" y1="3.8" x2="18.8" y2="5.2" stroke="#F5C842" stroke-width="1.5" stroke-linecap="round"/>
                      <line x1="22" y1="8" x2="20" y2="8" stroke="#F5C842" stroke-width="1.5" stroke-linecap="round"/>
                      <circle cx="7" cy="14" r="4" fill="#6B7A99"/>
                      <circle cx="12" cy="12" r="5" fill="#6B7A99"/>
                      <circle cx="17" cy="14" r="3.5" fill="#6B7A99"/>
                      <rect x="3" y="14" width="17" height="5" rx="2" fill="#6B7A99"/>
                    </svg>`;
                  if (['cloudy','windy','fog'].includes(c))
                    return `<svg viewBox="0 0 24 24" fill="none" width="20" height="20">
                      <circle cx="7" cy="13" r="4" fill="#6B7A99"/>
                      <circle cx="12" cy="11" r="5" fill="#6B7A99"/>
                      <circle cx="17" cy="13" r="3.5" fill="#6B7A99"/>
                      <rect x="3" y="13" width="17" height="5" rx="2" fill="#6B7A99"/>
                    </svg>`;
                  if (['rainy','pouring'].includes(c))
                    return `<svg viewBox="0 0 24 24" fill="none" width="20" height="20">
                      <circle cx="7" cy="11" r="4" fill="#3A7EC4"/>
                      <circle cx="12" cy="9"  r="5" fill="#3A7EC4"/>
                      <circle cx="17" cy="11" r="3" fill="#3A7EC4"/>
                      <rect x="3" y="11" width="17" height="4" rx="2" fill="#3A7EC4"/>
                      <line x1="7"  y1="17" x2="6"  y2="21" stroke="#5AC8FA" stroke-width="1.8" stroke-linecap="round"/>
                      <line x1="12" y1="17" x2="11" y2="21" stroke="#5AC8FA" stroke-width="1.8" stroke-linecap="round"/>
                      <line x1="17" y1="17" x2="16" y2="21" stroke="#5AC8FA" stroke-width="1.8" stroke-linecap="round"/>
                    </svg>`;
                  if (['snowy','snowy-rainy','hail'].includes(c))
                    return `<svg viewBox="0 0 24 24" fill="none" width="20" height="20">
                      <line x1="12" y1="2"  x2="12" y2="22" stroke="#55C0E8" stroke-width="2" stroke-linecap="round"/>
                      <line x1="2"  y1="12" x2="22" y2="12" stroke="#55C0E8" stroke-width="2" stroke-linecap="round"/>
                      <line x1="5"  y1="5"  x2="19" y2="19" stroke="#55C0E8" stroke-width="2" stroke-linecap="round"/>
                      <line x1="19" y1="5"  x2="5"  y2="19" stroke="#55C0E8" stroke-width="2" stroke-linecap="round"/>
                      <circle cx="12" cy="12" r="2" fill="#0E2030" stroke="#55C0E8" stroke-width="1.5"/>
                    </svg>`;
                  if (['lightning','lightning-rainy','exceptional'].includes(c))
                    return `<svg viewBox="0 0 24 24" fill="none" width="20" height="20">
                      <circle cx="6"  cy="10" r="4" fill="#282E3A"/>
                      <circle cx="12" cy="8"  r="5" fill="#282E3A"/>
                      <circle cx="17" cy="10" r="3.5" fill="#282E3A"/>
                      <rect x="2" y="10" width="18" height="5" rx="2" fill="#282E3A"/>
                      <polygon points="13,15 10,21 13,21 11,27 17,19 14,19 16,15" fill="#FFD060"/>
                    </svg>`;
                  return `<svg viewBox="0 0 24 24" fill="none" width="20" height="20">
                    <circle cx="7"  cy="13" r="4" fill="#6B7A99"/>
                    <circle cx="12" cy="11" r="5" fill="#6B7A99"/>
                    <circle cx="17" cy="13" r="3.5" fill="#6B7A99"/>
                    <rect x="3" y="13" width="17" height="5" rx="2" fill="#6B7A99"/>
                  </svg>`;
                }

                function condLabel(c) {
                  const map = {
                    'sunny':          'Słonecznie',
                    'clear-night':    'Pogodna noc',
                    'partlycloudy':   'Zmiennie',
                    'cloudy':         'Pochmurno',
                    'windy':          'Wietrznie',
                    'fog':            'Mgła',
                    'rainy':          'Deszcz',
                    'pouring':        'Ulewa',
                    'snowy':          'Śnieg',
                    'snowy-rainy':    'Deszcz ze śniegiem',
                    'hail':           'Grad',
                    'lightning':      'Burza',
                    'lightning-rainy':'Burza z deszczem',
                    'exceptional':    'Wyjątkowe',
                  };
                  return map[c] ?? c;
                }

                const today = new Date();

                const rows = forecast.slice(0, 5).map((day, i) => {
                  const dt   = new Date(day.datetime);
                  const isToday = dt.toDateString() === today.toDateString();
                  const dayName = isToday ? 'Dziś' : DAYS_PL[dt.getDay()];
                  const dateStr = `${dt.getDate()} ${MONTHS_PL[dt.getMonth()]}`;
                  const lo   = Math.round(day.templow   ?? day.temperature ?? 0);
                  const hi   = Math.round(day.temperature ?? 0);
                  const rain = day.precipitation ? `${day.precipitation.toFixed(1)} mm` : '';
                  const prob = day.precipitation_probability ? `${Math.round(day.precipitation_probability)}%` : '';
                  const rainInfo = rain || prob
                    ? `<span style="font-size:10px;color:#5AC8FA;margin-left:6px;flex-shrink:0;">${prob ? prob : rain}</span>`
                    : '';
                  const isLast = i === Math.min(4, forecast.length - 1);
                  const br = isLast ? '0 0 16px 16px' : '0';

                  return `<div style="
                    background:#1C1C1E;
                    display:flex;
                    align-items:center;
                    padding:10px 14px;
                    gap:10px;
                    border-radius:${br};
                    ${i === 0 ? 'border-radius:16px 16px 0 0;' : ''}
