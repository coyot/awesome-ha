              [[[
                // ── Bezpieczne odczytanie encji ───────────────────────────
                const hRaw   = states['sensor.stacja_pogodowa_humidity']?.state;
                const dRaw   = states['sensor.stacja_pogodowa_dewpoint']?.state;
                const vRaw   = states['sensor.stacja_pogodowa_vapour_pressure_deficit']?.state;

                const hum  = parseFloat(hRaw);
                const dewp = parseFloat(dRaw);
                const vpd  = parseFloat(vRaw);

                const hOk = !isNaN(hum);
                const dOk = !isNaN(dewp);
                const vOk = !isNaN(vpd);

                const hStr = hOk ? Math.round(hum) + '%'    : '—';
                const dStr = dOk ? dewp.toFixed(1) + '°C'   : '—';
                const vStr = vOk ? vpd.toFixed(2) + ' hPa'  : '—';

                // ── Jeden punkt prawdy dla statusu wilgotności ────────────
                // Zewnętrzna: <40 sucho, 40-60 optymalna, 60-80 podwyższona, >80 bardzo wysoka
                function humidityStatus(h) {
                  if (!hOk)  return { color: 'rgba(255,255,255,0.3)', label: 'Brak danych' };
                  if (h > 80) return { color: '#FF453A', label: 'Bardzo wysoka' };
                  if (h > 60) return { color: '#5AC8FA', label: 'Podwyższona'   };
                  if (h > 40) return { color: '#30D158', label: 'Optymalna'     };
                              return { color: '#FF9F0A', label: 'Niska'         };
                }

                const status = humidityStatus(hum);

                // ── Punkt rosy — ten sam pasek co indoor ─────────────────
                const DEW_MIN = 2, DEW_MAX = 22;
                const dewPct  = dOk
                  ? Math.max(0, Math.min(100, ((dewp - DEW_MIN) / (DEW_MAX - DEW_MIN)) * 100)).toFixed(1)
                  : 0;
                const dewColor = !dOk        ? 'rgba(255,255,255,0.2)'
                               : dewp < 8   ? '#5AC8FA'
                               : dewp <= 16 ? '#30D158'
                               : dewp <= 20 ? '#FF9F0A'
                               :              '#FF453A';
                const dewLabel = !dOk        ? ''
                               : dewp < 8   ? 'sucho'
                               : dewp <= 16 ? 'komfort'
                               : dewp <= 20 ? 'duszno'
                               :              'dyskomfort';

                // ── Ikona SVG wilgotności ─────────────────────────────────
                const humIcon = `<svg viewBox="0 0 24 24" width="14" height="14" fill="none"
                    style="display:inline-block;vertical-align:middle;margin-right:5px;margin-top:-1px;">
                  <path d="M12 3 C12 3 6 10 6 14.5 a6 6 0 0 0 12 0 C18 10 12 3 12 3z"
                        fill="none" stroke="rgba(255,255,255,0.35)" stroke-width="1.5"
                        stroke-linejoin="round"/>
                  <path d="M12 5.5 C12 5.5 7.5 11 7.5 14.5 a4.5 4.5 0 0 0 9 0 C16.5 11 12 5.5 12 5.5z"
                        fill="${status.color}" opacity="0.25"/>
                </svg>`;

                return `
                  <div style="
                    padding:16px 18px 18px;
                    font-family:-apple-system,system-ui,sans-serif;
                    position:relative;
                    overflow:hidden;
                  ">

                    <!-- Glow accent -->
                    <div style="
                      position:absolute;top:-50px;right:-30px;
                      width:160px;height:160px;border-radius:50%;
                      background:radial-gradient(circle,${status.color}18 0%,transparent 65%);
                      pointer-events:none;
                    "></div>

                    <!-- Nagłówek -->
                    <div style="
                      display:flex;justify-content:space-between;align-items:center;
                      margin-bottom:14px;position:relative;
                    ">
                      <div style="
                        font-size:10px;font-weight:600;text-transform:uppercase;
                        letter-spacing:.08em;color:rgba(255,255,255,0.28);
                        display:flex;align-items:center;
                      ">${humIcon}Wilgotność zewnętrzna</div>

                      <!-- Badge statusu -->
                      <div style="
                        font-size:10px;font-weight:600;letter-spacing:.04em;
                        color:${status.color};
                        background:${status.color}1A;
                        border:1px solid ${status.color}40;
                        padding:3px 9px;border-radius:20px;
                        white-space:nowrap;
                      ">${status.label}</div>
                    </div>

                    <!-- Główna wartość + VPD -->
                    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px;">

                      <!-- Wilgotność -->
                      <div style="
                        background:rgba(255,255,255,0.04);
                        border-radius:12px;padding:12px 12px 10px;
                      ">
                        <div style="
                          font-size:30px;font-weight:300;letter-spacing:-1.5px;line-height:1;
                          color:${hOk ? '#ffffff' : 'rgba(255,255,255,0.3)'};
                          font-variant-numeric:tabular-nums;
                        ">${hStr}</div>
                        <div style="
                          font-size:9.5px;color:rgba(255,255,255,0.28);
                          margin-top:5px;text-transform:uppercase;letter-spacing:.06em;
                        ">wilgotność</div>
                      </div>

                      <!-- VPD -->
                      <div style="
                        background:rgba(255,255,255,0.04);
                        border-radius:12px;padding:12px 12px 10px;
                      ">
                        <div style="
                          font-size:30px;font-weight:300;letter-spacing:-1.5px;line-height:1;
                          color:${vOk ? '#ffffff' : 'rgba(255,255,255,0.3)'};
                          font-variant-numeric:tabular-nums;
                        ">${vOk ? vpd.toFixed(2) : '—'}</div>
                        <div style="
                          font-size:9.5px;color:rgba(255,255,255,0.28);
                          margin-top:5px;text-transform:uppercase;letter-spacing:.06em;
                        ">vpd · hPa</div>
                      </div>

                    </div>

                    <!-- Punkt rosy — pasek z kontekstem (identyczny z indoor) -->
                    <div style="position:relative;">
                      <div style="
                        display:flex;justify-content:space-between;align-items:baseline;
                        margin-bottom:5px;
                      ">
                        <div style="font-size:9.5px;color:rgba(255,255,255,0.28);
                          text-transform:uppercase;letter-spacing:.06em;">punkt rosy</div>
                        <div style="display:flex;align-items:baseline;gap:5px;">
                          <span style="
                            font-size:12px;font-weight:500;
                            color:${dOk ? dewColor : 'rgba(255,255,255,0.2)'};
                            letter-spacing:-.3px;
                          ">${dStr}</span>
                          ${dOk ? `<span style="
                            font-size:9px;color:${dewColor};opacity:0.7;
                          ">${dewLabel}</span>` : ''}
                        </div>
                      </div>

                      <!-- Track -->
                      <div style="
                        height:3px;border-radius:2px;
                        background:rgba(255,255,255,0.08);
                        position:relative;overflow:hidden;
                      ">
                        <!-- Strefa komfortowa 8–16°C -->
                        <div style="
                          position:absolute;
                          left:${((8  - DEW_MIN) / (DEW_MAX - DEW_MIN) * 100).toFixed(1)}%;
                          width:${((16 - 8)      / (DEW_MAX - DEW_MIN) * 100).toFixed(1)}%;
                          height:100%;background:rgba(48,209,88,0.25);
                        "></div>
                        <!-- Wskaźnik -->
                        ${dOk ? `<div style="
                          position:absolute;left:0;width:${dewPct}%;
                          height:100%;border-radius:2px;
                          background:${dewColor};opacity:0.75;
                        "></div>` : ''}
                      </div>

                      <!-- Etykiety skali -->
                      <div style="display:flex;justify-content:space-between;margin-top:3px;">
                        <span style="font-size:8px;color:rgba(255,255,255,0.15);">${DEW_MIN}°</span>
                        <span style="font-size:8px;color:rgba(48,209,88,0.4);">8–16° komfort</span>
                        <span style="font-size:8px;color:rgba(255,255,255,0.15);">${DEW_MAX}°</span>
                      </div>
                    </div>

                  </div>`;
              ]]]
      - type: grid
        cards:
          - type: custom:aha-solar-clock-card
          - type: custom:aha-astronomical-events-card
            page_size: 4
          - type: custom:button-card
            entity: sensor.stacja_pogodowa_wind_direction
            show_name: false
            show_icon: false
            show_state: false
            show_label: true
            tap_action:
              action: more-info
            styles:
              card:
                - padding: "0"
                - background: "linear-gradient(145deg, #0e1a2e 0%, #091220 100%)"
                - border-radius: 18px
                - box-shadow: none
                - border: 1px solid rgba(255,255,255,0.07)
                - overflow: hidden
              label:
                - padding: "0"
                - width: 100%
                - white-space: normal
                - line-height: "1"
            label: |
              [[[
                const _f = id => { const v = parseFloat(states[id]?.state); return isNaN(v) ? null : v; };
                const deg   = _f('sensor.stacja_pogodowa_wind_direction');
                const deg10 = _f('sensor.stacja_pogodowa_wind_direction_10m_avg');
                const spd   = _f('sensor.stacja_pogodowa_wind_speed');
                const gust  = _f('sensor.stacja_pogodowa_wind_gust');
                const gMax  = _f('sensor.stacja_pogodowa_max_daily_gust');

                const fmt = (v, d=1) => v !== null ? Number(v.toFixed(d)).toString() : '—';
                const DIRS   = ['N','NE','E','SE','S','SW','W','NW'];
                const DNAMES = {N:'Północny',NE:'Płn-wschodni',E:'Wschodni',SE:'Płd-wschodni',S:'Południowy',SW:'Płd-zachodni',W:'Zachodni',NW:'Płn-zachodni'};
                const CR = 70;

                const dk  = deg !== null ? DIRS[Math.round(deg/45)%8] : null;
                const d10 = deg10 !== null ? DIRS[Math.round(deg10/45)%8] : '—';

                function bft(s) {
                  if (s === null) return { b: null, d: '—' };
                  const n = s<1?0:s<6?1:s<12?2:s<20?3:s<29?4:s<39?5:s<50?6:s<62?7:s<75?8:s<89?9:s<103?10:s<118?11:12;
                  return { b: n, d: ['Cisza','Powiew','Lekki','Słaby','Umiarkowany','Dość silny','Silny','Bardzo silny','Gwałtowny','Sztorm','Silny sztorm','B. silny sztorm','Huragan'][n] };
                }
                const bf = bft(spd);

                function col(s) {
                  if (s === null || s < 1) return '#5AC8FA';
                  if (s < 20) return '#5AC8FA';
                  if (s < 39) return '#FF9F0A';
                  if (s < 62) return '#FF6820';
                  return '#FF453A';
                }
                const c = col(spd);

                const uid = 'w' + Math.random().toString(36).slice(2,6);

                const ticks = [0,45,90,135,180,225,270,315].map(a => {
                  const r = (a-90)*Math.PI/180;
                  const r1=50, r2=50+(a%90===0?7:3.5);
                  return `<line x1="${(70+r1*Math.cos(r)).toFixed(2)}" y1="${(70+r1*Math.sin(r)).toFixed(2)}"
                    x2="${(70+r2*Math.cos(r)).toFixed(2)}" y2="${(70+r2*Math.sin(r)).toFixed(2)}"
                    stroke="rgba(255,255,255,${a%90===0?'0.45':'0.14'})"
                    stroke-width="${a%90===0?1.5:0.8}" stroke-linecap="round"/>`;
                }).join('');

                const labels = [
                  {a:0,t:'N',op:.95,sz:11,fw:700},
                  {a:90,t:'E',op:.22,sz:10,fw:500},
                  {a:180,t:'S',op:.22,sz:10,fw:500},
                  {a:270,t:'W',op:.22,sz:10,fw:500}
                ].map(({a,t,op,sz,fw}) => {
                  const r=(a-90)*Math.PI/180, lr=63;
                  const lx=(70+lr*Math.cos(r)).toFixed(2), ly=(70+lr*Math.sin(r)).toFixed(2);
                  return `<text x="${lx}" y="${ly}" text-anchor="middle" dominant-baseline="central"
                    font-size="${sz}" font-weight="${fw}"
                    font-family="-apple-system,system-ui,sans-serif"
                    fill="#fff" opacity="${op}"
                    transform="rotate(${-CR},${lx},${ly})">${t}</text>`;
                }).join('');

                const needle = deg !== null ? `
                  <g transform="rotate(${(deg-CR).toFixed(1)},70,70)">
                    <polygon points="70,18 65,70 75,70" fill="${c}"/>
                    <polygon points="70,122 65,70 75,70" fill="rgba(255,255,255,0.09)"/>
                    <circle cx="70" cy="18" r="3.5" fill="${c}" opacity="0.14"/>
                  </g>` : '';

                return `
                <div style="padding:16px 18px 18px;font-family:-apple-system,system-ui,sans-serif;">

                  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;">
                    <div style="font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.10em;color:rgba(255,255,255,0.25);">Wiatr</div>
                    <div style="font-size:10px;font-weight:600;letter-spacing:.04em;color:${c};background:${c}15;border:1px solid ${c}35;padding:3px 10px;border-radius:20px;white-space:nowrap;">
                      ${bf.b !== null ? 'Bft '+bf.b+' · '+bf.d : '—'}
                    </div>
                  </div>

                  <div style="display:flex;align-items:flex-start;gap:14px;margin-bottom:16px;">

                    <div style="flex-shrink:0;display:flex;flex-direction:column;align-items:center;">
                      <svg viewBox="0 0 140 140" width="148" height="148" style="display:block;overflow:visible;">
                        <defs>
                          <radialGradient id="${uid}" cx="50%" cy="50%" r="50%">
                            <stop offset="0%" stop-color="#1A2A3E"/>
                            <stop offset="100%" stop-color="#091220"/>
                          </radialGradient>
                        </defs>
                        <g transform="rotate(${CR},70,70)">
                          <circle cx="70" cy="70" r="68" fill="url(#${uid})"/>
                          <circle cx="70" cy="70" r="68" fill="none" stroke="rgba(255,255,255,0.07)" stroke-width="0.8"/>
                          <circle cx="70" cy="70" r="50" fill="none" stroke="rgba(255,255,255,0.04)" stroke-width="10"/>
                          ${ticks}
                          ${labels}
                          <g transform="rotate(-${CR},70,70)">
                            <rect x="38" y="61" width="64" height="18" rx="2.5"
                              fill="${c}18" stroke="${c}" stroke-width="1.4" stroke-opacity="0.68"/>
                            <line x1="70" y1="61" x2="70" y2="79"
                              stroke="${c}" stroke-width="0.8" stroke-opacity="0.26"/>
                          </g>
                          ${needle}
                          <circle cx="70" cy="70" r="5.5" fill="#091220" stroke="${c}" stroke-width="1.5" opacity="0.9"/>
                          <circle cx="70" cy="70" r="2"   fill="${c}" opacity="0.80"/>
                        </g>
                      </svg>

                      <div style="display:flex;flex-direction:column;align-items:center;margin-top:10px;gap:1px;">
                        <span style="font-size:26px;font-weight:200;letter-spacing:-1.5px;line-height:1;color:${spd!==null?'#fff':'rgba(255,255,255,0.22)'};font-variant-numeric:tabular-nums;">${fmt(spd)}</span>
                        <span style="font-size:8.5px;font-weight:500;color:rgba(255,255,255,0.25);text-transform:uppercase;letter-spacing:.10em;">km/h</span>
                      </div>
                    </div>

                    <div style="flex:1;display:flex;flex-direction:column;padding-top:4px;">
                      <div style="margin-bottom:14px;">
                        <div style="font-size:36px;font-weight:200;letter-spacing:-2px;line-height:1;color:${dk?'#fff':'rgba(255,255,255,0.22)'};">${dk||'—'}</div>
                        <div style="font-size:10px;color:rgba(255,255,255,0.28);margin-top:4px;">${dk?DNAMES[dk]:'—'}</div>
                        <div style="font-size:10px;color:rgba(255,255,255,0.15);margin-top:2px;font-variant-numeric:tabular-nums;">${deg!==null?Math.round(deg)+'°':''}</div>
                      </div>

                      <div style="height:0.5px;background:rgba(255,255,255,0.06);margin-bottom:12px;"></div>

                      <div style="display:grid;grid-template-columns:1fr 1fr;gap:6px;">
                        <div style="background:rgba(255,255,255,0.04);border-radius:11px;padding:10px 10px 9px;">
                          <div style="font-size:18px;font-weight:300;letter-spacing:-.5px;line-height:1;color:${gust!==null?c:'rgba(255,255,255,0.20)'};font-variant-numeric:tabular-nums;">${fmt(gust)}</div>
                          <div style="font-size:8px;color:rgba(255,255,255,0.22);text-transform:uppercase;letter-spacing:.07em;margin-top:5px;">poryw</div>
                        </div>
                        <div style="background:rgba(255,255,255,0.04);border-radius:11px;padding:10px 10px 9px;">
                          <div style="font-size:18px;font-weight:300;letter-spacing:-.5px;line-height:1;color:rgba(255,255,255,0.45);font-variant-numeric:tabular-nums;">${fmt(gMax)}</div>
                          <div style="font-size:8px;color:rgba(255,255,255,0.22);text-transform:uppercase;letter-spacing:.07em;margin-top:5px;">maks. dziś</div>
                        </div>
                      </div>
                    </div>
                  </div>

                  <div style="height:0.5px;background:rgba(255,255,255,0.06);margin-bottom:11px;"></div>
                  <div style="display:flex;justify-content:space-between;align-items:center;">
                    <span style="font-size:9px;color:rgba(255,255,255,0.18);text-transform:uppercase;letter-spacing:.10em;">Średnia 10 min</span>
                    <span style="font-size:12px;color:rgba(255,255,255,0.32);font-variant-numeric:tabular-nums;">${d10}${deg10!==null?' · '+Math.round(deg10)+'°':''}</span>
                  </div>

                </div>`;
              ]]]
          - type: custom:button-card
            show_name: false
            show_icon: false
            show_label: true
