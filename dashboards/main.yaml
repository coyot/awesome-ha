                const BAR_W = 240, BAR_H = 6;
                const fillW  = Math.min(BAR_W, (mPct / 100) * BAR_W);
                // Marker normy zawsze na 50% szerokości (bo skala 0–200%)
                const normX  = BAR_W / 2;
                const barCol = mPct > 110 ? '#5AC8FA' : mPct < 50 ? 'rgba(255,255,255,0.28)' : 'rgba(90,200,250,0.60)';

                const barSvg = `<svg viewBox="0 0 ${BAR_W} ${BAR_H}" width="100%" height="${BAR_H}"
                    style="display:block;border-radius:3px;overflow:visible;">
                  <rect x="0" y="0" width="${BAR_W}" height="${BAR_H}" rx="3" fill="rgba(255,255,255,0.07)"/>
                  <rect x="0" y="0" width="${fillW.toFixed(1)}" height="${BAR_H}" rx="3" fill="${barCol}"/>
                  <rect x="${normX.toFixed(1)}" y="-1" width="1.5" height="${BAR_H+2}" rx="0.5"
                        fill="rgba(255,255,255,0.40)"/>
