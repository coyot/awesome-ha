                  <line x1="12" y1="18" x2="11" y2="22" stroke="${ri.col}" stroke-width="1.5" stroke-linecap="round"/>
                  <line x1="16" y1="18" x2="15" y2="22" stroke="${ri.col}" stroke-width="1.5" stroke-linecap="round"/>
