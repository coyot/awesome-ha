          - type: custom:button-card
            entity: sensor.stacja_pogodowa_relative_pressure
            show_name: false
            show_icon: false
            show_state: false
            show_label: true
            tap_action:
              action: more-info
            styles:
              card:
                - padding: "0"
                - background: "linear-gradient(145deg, #0e1a2e 0%, #091220 100%)"
