                    var name  = variables.card_name  || entity.attributes.friendly_name;
                    var model = variables.card_model || "";
                    var room  = variables.card_room  || "";
                    var COLORS = [
                      {pl:"czerwony",    r:255,g:0,  b:0  },
                      {pl:"zielony",     r:0,  g:255,b:0  },
                      {pl:"niebieski",   r:0,  g:0,  b:255},
