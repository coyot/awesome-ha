                    <div style="display:flex;align-items:baseline;gap:4px;flex-shrink:0;">
                      <span style="font-size:12px;font-weight:600;color:${tempColor(lo)};">${lo}°</span>
                      <span style="font-size:10px;color:rgba(255,255,255,.2);">/</span>
                      <span style="font-size:13px;font-weight:700;color:${tempColor(hi)};">${hi}°</span>
                    </div>
                    ${rainInfo}
                  </div>
                  <div style="height:1px;background:rgba(255,255,255,.04);${isLast ? 'display:none' : ''}"></div>`;
                }).join('');

                return `<div style="
                  font-family:-apple-system,system-ui,sans-serif;
                  border-radius:16px;
                  overflow:hidden;
                ">${rows}</div>`;
              ]]]
