                  return `<div style="padding:20px;font-family:-apple-system,system-ui,sans-serif;
                    color:rgba(255,255,255,.35);font-size:12px;text-align:center;
                    background:linear-gradient(145deg,#0e1a2e 0%,#091220 100%);border-radius:16px;">Ładowanie prognozy…</div>`;
                }

                const n        = Math.min(5, forecast.length);
                const days     = forecast.slice(0, n);
                const today    = new Date();
                const tomorrow = new Date(today.getTime() + 86400000);

                // Global temp range for bar scaling
                const allHi     = days.map(d => isNum(d.temperature) ? d.temperature : 0);
                const allLo     = days.map(d => isNum(d.templow)     ? d.templow     : (isNum(d.temperature) ? d.temperature : 0));
                const globalMin = Math.min(...allLo);
                const globalMax = Math.max(...allHi);
                const gRange    = Math.max(1, globalMax - globalMin);

                const rows = days.map((day, i) => {
                  const dt          = new Date(day.datetime);
                  const isToday     = dt.toDateString() === today.toDateString();
                  const isTomorrow  = dt.toDateString() === tomorrow.toDateString();
                  const dayName     = isToday ? 'Dziś' : isTomorrow ? 'Jutro' : DAYS_SHORT[dt.getDay()];
                  // Show date only for days beyond tomorrow
                  const dateStr     = (!isToday && !isTomorrow)
                    ? `${dt.getDate()} ${MONTHS_PL[dt.getMonth()]}`
                    : '';

                  const hiRaw = fmt(day.temperature);
                  const loRaw = fmt(day.templow ?? day.temperature);
                  const hi    = hiRaw !== null ? Math.round(day.temperature) : null;
                  const lo    = loRaw !== null ? Math.round(day.templow ?? day.temperature) : null;
                  const hasBothTemps = hi !== null && lo !== null && lo !== hi;

                  const prec = isNum(day.precipitation)             ? day.precipitation            : null;
                  const prob = isNum(day.precipitation_probability) ? day.precipitation_probability : null;
                  const wSpd = isNum(day.wind_speed)                ? Math.round(day.wind_speed)   : null;
                  const wDir = isNum(day.wind_bearing)              ? Math.round(day.wind_bearing) : null;

                  // Precipitation label — show both mm and % when meaningful
                  let rainStr = '';
                  const hasPrec = prec !== null && prec > 0;
                  const hasProb = prob !== null && prob > 15;
                  if (hasPrec && hasProb)    rainStr = `${Number(prec).toFixed(1)}mm·${Math.round(prob)}%`;
                  else if (hasPrec)          rainStr = `${Number(prec).toFixed(1)} mm`;
                  else if (hasProb)          rainStr = `${Math.round(prob)}%`;

                  // Temp bar — only render when we have distinct lo/hi
                  const barLeft = hasBothTemps
                    ? (((lo - globalMin) / gRange) * 100).toFixed(1)
                    : '0';
                  const barWidth = hasBothTemps
                    ? Math.max(8, ((hi - lo) / gRange) * 100).toFixed(1)
                    : '0';

                  // Wind cell
                  const windHtml = (wSpd !== null && wSpd > 1)
                    ? `<div style="display:flex;align-items:center;gap:3px;flex-shrink:0;
                          min-width:52px;justify-content:flex-end;">
                        ${wDir !== null ? windArrow(wDir) : ''}
                        <span style="font-size:11px;color:rgba(255,255,255,0.38);
                          line-height:1;white-space:nowrap;">${wSpd} ${windUnit}</span>
                       </div>`
                    : `<div style="min-width:52px;"></div>`;

                  // Separator — inside the row as border-top, not a sibling div
                  const borderTop = i > 0 ? 'border-top:0.5px solid rgba(255,255,255,0.06);' : '';

                  return `
                    <div style="
                      padding:11px 14px;
                      display:flex;
                      align-items:center;
                      gap:10px;
                      ${borderTop}
                    ">
                      <!-- Day + date -->
                      <div style="width:40px;flex-shrink:0;">
                        <div style="font-size:13px;font-weight:${isToday ? 700 : 600};
                          color:${isToday ? '#ffffff' : 'rgba(255,255,255,0.78)'};
                          line-height:1;">${dayName}</div>
                        <div style="font-size:9.5px;color:rgba(255,255,255,0.26);
                          margin-top:2px;min-height:11px;">${dateStr}</div>
                      </div>

                      <!-- Icon + precip -->
                      <div style="width:30px;flex-shrink:0;display:flex;flex-direction:column;
                        align-items:center;gap:2px;" title="${condLabel(day.condition)}">
                        ${icon(day.condition)}
                        <div style="font-size:9px;font-weight:600;line-height:1;
                          height:10px;overflow:hidden;white-space:nowrap;
                          color:${hasPrec ? '#5AC8FA' : 'rgba(90,200,250,0.45)'};">
                          ${rainStr}
                        </div>
                      </div>

                      <!-- Temp min — dimmed colour, no opacity -->
                      <div style="font-size:13px;font-weight:500;
                        color:${lo !== null ? tempColor(lo, true) : 'rgba(255,255,255,0.2)'};
                        width:26px;text-align:right;flex-shrink:0;letter-spacing:-.3px;">
                        ${lo !== null ? lo + '°' : '—'}
                      </div>

                      <!-- Temp bar -->
                      <div style="flex:1;position:relative;height:4px;
                        border-radius:2px;background:rgba(255,255,255,0.10);">
                        ${hasBothTemps ? `<div style="
                          position:absolute;
                          left:${barLeft}%;
                          width:${barWidth}%;
                          height:100%;
                          border-radius:2px;
                          background:linear-gradient(to right,${tempColor(lo)},${tempColor(hi)});
                        "></div>` : ''}
                      </div>

                      <!-- Temp max -->
                      <div style="font-size:13px;font-weight:700;
                        color:${hi !== null ? tempColor(hi) : 'rgba(255,255,255,0.2)'};
                        width:26px;text-align:left;flex-shrink:0;letter-spacing:-.3px;">
                        ${hi !== null ? hi + '°' : '—'}
                      </div>

                      <!-- Wind -->
                      ${windHtml}
                    </div>`;
                }).join('');

                return `
                  <div style="
                    font-family:-apple-system,system-ui,sans-serif;
                    background:linear-gradient(145deg,#0e1a2e 0%,#091220 100%);
                    border:1px solid rgba(255,255,255,0.07);
                    border-radius:16px;
                    overflow:hidden;
                  ">${rows}</div>`;
              ]]]
          - type: custom:button-card
            entity: sensor.stacja_pogodowa_indoor_temperature
            show_name: false
            show_icon: false
            show_state: false
            show_label: true
            tap_action:
              action: more-info
            styles:
              card:
                - padding: "0"
                - background: "linear-gradient(145deg, #0e1a2e 0%, #091220 100%)"
                - border-radius: 18px
                - box-shadow: none
                - border: 1px solid rgba(255,255,255,0.07)
                - overflow: hidden
              label:
                - padding: "0"
                - width: 100%
                - white-space: normal
                - line-height: "1"
            label: |
              [[[
                const BG1 = '#0e1a2e';
                const BG2 = '#091220';

                // ── Bezpieczne odczytanie encji ───────────────────────────
                const tRaw = states['sensor.stacja_pogodowa_indoor_temperature']?.state;
                const hRaw = states['sensor.stacja_pogodowa_indoor_humidity']?.state;
                const dRaw = states['sensor.stacja_pogodowa_indoor_dewpoint']?.state;

                const tIn = parseFloat(tRaw);
                const hIn = parseFloat(hRaw);
                const dIn = parseFloat(dRaw);

                const tOk = !isNaN(tIn);
                const hOk = !isNaN(hIn);
                const dOk = !isNaN(dIn);

                const tStr = tOk ? tIn.toFixed(1) + '°C' : '—';
                const hStr = hOk ? Math.round(hIn) + '%'  : '—';

                // ── Jeden punkt prawdy dla statusu komfortu ───────────────
                function comfortStatus(t, h) {
                  if (!tOk || !hOk) return { color: 'rgba(255,255,255,0.3)', label: 'Brak danych' };
                  if (t >= 20 && t <= 24 && h >= 40 && h <= 60) return { color: '#30D158', label: 'Komfortowo' };
                  if (t < 18)  return { color: '#5AC8FA', label: 'Za chłodno' };
                  if (t > 25)  return { color: '#FF453A', label: 'Za ciepło'  };
                  if (h < 35)  return { color: '#FF9F0A', label: 'Za sucho'   };
                  if (h > 65)  return { color: '#5AC8FA', label: 'Za wilgotno'};
                  return             { color: '#F5C842',  label: 'W porządku' };
                }

                const status = comfortStatus(tIn, hIn);

                // ── Punkt rosy — pasek kontekstowy ────────────────────────
                // Zakres komfortowy punktu rosy: 8–16°C
                // Poniżej 8° = sucho, powyżej 16° = duszno, powyżej 20° = dyskomfort
                const DEW_MIN = 2, DEW_MAX = 22;
                const dewPct  = dOk
                  ? Math.max(0, Math.min(100, ((dIn - DEW_MIN) / (DEW_MAX - DEW_MIN)) * 100)).toFixed(1)
                  : 0;
                const dewColor = !dOk                ? 'rgba(255,255,255,0.2)'
                               : dIn < 8             ? '#5AC8FA'
                               : dIn <= 16           ? '#30D158'
                               : dIn <= 20           ? '#FF9F0A'
                               :                       '#FF453A';
                const dewLabel = !dOk  ? ''
                               : dIn < 8   ? 'sucho'
                               : dIn <= 16 ? 'komfort'
                               : dIn <= 20 ? 'duszno'
                               :             'dyskomfort';

                // ── Ikona SVG termometru ──────────────────────────────────
                const thermIcon = `<svg viewBox="0 0 24 24" width="14" height="14" fill="none"
                    style="display:inline-block;vertical-align:middle;margin-right:5px;margin-top:-1px;">
                  <rect x="10" y="4" width="4" height="11" rx="2"
                        fill="none" stroke="rgba(255,255,255,0.35)" stroke-width="1.5"/>
                  <circle cx="12" cy="17" r="3"
                          fill="${status.color}" opacity="0.9"/>
                  <rect x="10.75" y="10" width="2.5" height="6" rx="1"
                        fill="${status.color}" opacity="0.7"/>
                </svg>`;

                return `
                  <div style="
                    padding:16px 18px 18px;
                    font-family:-apple-system,system-ui,sans-serif;
                    position:relative;
                    overflow:hidden;
                  ">

                    <!-- Glow accent -->
                    <div style="
                      position:absolute;top:-50px;right:-30px;
                      width:160px;height:160px;border-radius:50%;
                      background:radial-gradient(circle,${status.color}18 0%,transparent 65%);
                      pointer-events:none;
                    "></div>

                    <!-- Nagłówek -->
                    <div style="
                      display:flex;justify-content:space-between;align-items:center;
                      margin-bottom:14px;position:relative;
                    ">
                      <div style="
                        font-size:10px;font-weight:600;text-transform:uppercase;
                        letter-spacing:.08em;color:rgba(255,255,255,0.28);
                        display:flex;align-items:center;
                      ">${thermIcon}Wnętrze</div>

                      <!-- Badge statusu -->
                      <div style="
                        font-size:10px;font-weight:600;letter-spacing:.04em;
                        color:${status.color};
                        background:${status.color}1A;
                        border:1px solid ${status.color}40;
                        padding:3px 9px;border-radius:20px;
                        white-space:nowrap;
                      ">${status.label}</div>
                    </div>

                    <!-- Główne wartości -->
                    <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px;">

                      <!-- Temperatura -->
                      <div style="
                        background:rgba(255,255,255,0.04);
                        border-radius:12px;padding:12px 12px 10px;
                      ">
                        <div style="
                          font-size:30px;font-weight:300;letter-spacing:-1.5px;line-height:1;
                          color:${tOk ? '#ffffff' : 'rgba(255,255,255,0.3)'};
                          font-variant-numeric:tabular-nums;
                        ">${tStr}</div>
                        <div style="
                          font-size:9.5px;color:rgba(255,255,255,0.28);
                          margin-top:5px;text-transform:uppercase;letter-spacing:.06em;
                        ">temperatura</div>
                      </div>

                      <!-- Wilgotność -->
                      <div style="
                        background:rgba(255,255,255,0.04);
                        border-radius:12px;padding:12px 12px 10px;
                      ">
                        <div style="
                          font-size:30px;font-weight:300;letter-spacing:-1.5px;line-height:1;
                          color:${hOk ? '#ffffff' : 'rgba(255,255,255,0.3)'};
                          font-variant-numeric:tabular-nums;
                        ">${hStr}</div>
                        <div style="
                          font-size:9.5px;color:rgba(255,255,255,0.28);
                          margin-top:5px;text-transform:uppercase;letter-spacing:.06em;
                        ">wilgotność</div>
                      </div>

                    </div>

                    <!-- Punkt rosy — pasek z kontekstem -->
                    <div style="position:relative;">
                      <div style="
                        display:flex;justify-content:space-between;align-items:baseline;
                        margin-bottom:5px;
                      ">
                        <div style="font-size:9.5px;color:rgba(255,255,255,0.28);
                          text-transform:uppercase;letter-spacing:.06em;">punkt rosy</div>
                        <div style="display:flex;align-items:baseline;gap:5px;">
                          <span style="
                            font-size:12px;font-weight:500;
                            color:${dOk ? dewColor : 'rgba(255,255,255,0.2)'};
                            letter-spacing:-.3px;
                          ">${dOk ? dIn.toFixed(1) + '°C' : '—'}</span>
                          ${dOk ? `<span style="
                            font-size:9px;color:${dewColor};opacity:0.7;
                          ">${dewLabel}</span>` : ''}
                        </div>
                      </div>

                      <!-- Track -->
                      <div style="
                        height:3px;border-radius:2px;
                        background:rgba(255,255,255,0.08);
                        position:relative;overflow:hidden;
                      ">
                        <!-- Strefa komfortowa 8-16°C zaznaczona jako jaśniejszy track -->
                        <div style="
                          position:absolute;
                          left:${((8 - DEW_MIN) / (DEW_MAX - DEW_MIN) * 100).toFixed(1)}%;
                          width:${((16 - 8)     / (DEW_MAX - DEW_MIN) * 100).toFixed(1)}%;
                          height:100%;background:rgba(48,209,88,0.25);
                        "></div>
                        <!-- Wskaźnik -->
                        ${dOk ? `<div style="
                          position:absolute;left:0;width:${dewPct}%;
                          height:100%;border-radius:2px;
                          background:${dewColor};opacity:0.75;
                        "></div>` : ''}
                      </div>

                      <!-- Etykiety skali -->
                      <div style="
                        display:flex;justify-content:space-between;
                        margin-top:3px;
                      ">
                        <span style="font-size:8px;color:rgba(255,255,255,0.15);">${DEW_MIN}°</span>
                        <span style="font-size:8px;color:rgba(48,209,88,0.4);">8–16° komfort</span>
                        <span style="font-size:8px;color:rgba(255,255,255,0.15);">${DEW_MAX}°</span>
                      </div>
                    </div>

                  </div>`;
              ]]]
      - type: grid
        cards:
          - type: custom:stack-in-card
            mode: vertical
            card_mod:
              style: |
                ha-card {
                  background: #1c1c1e;
                  border-radius: 20px;
                  border: 1px solid rgba(255,255,255,0.06);
                  overflow: hidden;
                }
            cards:
              - type: custom:weather-radar-card
                data_source: RainViewer
                center:
                  latitude: 52.5283
                  longitude: 16.8717
                zoom_level: 8
                frame_count: 12
                frame_delay: 500
                map_style: Dark
                show_marker: true
                show_range: false
                show_zoom: false
                show_recenter: false
                show_playback: true
                card_mod:
                  style: |
                    ha-card {
                      background: transparent;
                      border: none;
                      box-shadow: none;
                      border-radius: 20px;
                      overflow: hidden;
                    }
          - type: custom:button-card
            entity: sun.sun
            show_name: false
            show_icon: false
            show_state: false
            show_label: true
            tap_action:
              action: none
            styles:
              card:
                - padding: "0"
                - background: transparent
                - border-radius: 26px
                - box-shadow: none
                - overflow: hidden
              label:
                - padding: "0"
                - margin: "0"
                - width: 100%
                - white-space: normal
                - line-height: "1"
            label: |
              [[[
                const SYNODIC   = 29.53058867;
                const KNOWN_NEW = new Date('2000-01-06T18:14:00Z').getTime();

                const now     = new Date();
                const elapsed = (now.getTime() - KNOWN_NEW) / 86400000;
                const phase   = ((elapsed % SYNODIC) + SYNODIC) % SYNODIC / SYNODIC;

                const illum  = Math.round((1 - Math.cos(phase * 2 * Math.PI)) / 2 * 100);
                const age    = (phase * SYNODIC).toFixed(1);
                const toFull = phase <= 0.5 ? (0.5 - phase) * SYNODIC : (1.5 - phase) * SYNODIC;
                const toNew  = phase < 0.5  ? phase * SYNODIC          : (1 - phase)   * SYNODIC;
                const showFull = toFull <= toNew;
                const nextVal  = Math.round((showFull ? toFull : toNew) * 10) / 10;
                const nextLbl  = showFull ? 'Do pełni' : 'Do nowiu';

                let namePL, nameEN;
                if      (phase < 0.03 || phase > 0.97) { namePL = 'Nów';             nameEN = 'New Moon'; }
                else if (phase < 0.22)                  { namePL = 'Sierp rosnący';   nameEN = 'Waxing Crescent'; }
                else if (phase < 0.28)                  { namePL = 'Pierwsza kwadra'; nameEN = 'First Quarter'; }
                else if (phase < 0.47)                  { namePL = 'Garb rosnący';    nameEN = 'Waxing Gibbous'; }
                else if (phase < 0.53)                  { namePL = 'Pełnia';          nameEN = 'Full Moon'; }
                else if (phase < 0.72)                  { namePL = 'Garb malejący';   nameEN = 'Waning Gibbous'; }
                else if (phase < 0.78)                  { namePL = 'Ostatnia kwadra'; nameEN = 'Last Quarter'; }
                else                                    { namePL = 'Sierp malejący';  nameEN = 'Waning Crescent'; }

                const dateStr = now.toLocaleDateString('pl-PL', { day: 'numeric', month: 'long', year: 'numeric' });

                const cx = 110, cy = 110, R = 88;
                const D = '#0E1625', L = '#CCD8EE';
                const isNew  = phase < 0.015 || phase > 0.985;
                const isFull = Math.abs(phase - 0.5) < 0.015;
                const waxing = phase < 0.5;
                const sw     = waxing ? 1 : 0;
                const k      = Math.cos(phase * 2 * Math.PI);
                const ex     = Math.abs(k) * R;

                const halfPath    = `M${cx} ${cy-R} A${R} ${R} 0 0 ${sw} ${cx} ${cy+R} L${cx} ${cy}Z`;
                const gibbousPath = `M${cx} ${cy-R} A${ex} ${R} 0 0 ${waxing?0:1} ${cx} ${cy+R} L${cx} ${cy}Z`;

                // ── MASKA dla jasnych kraterów/marii ───────────────────────
                // biały = pokaż, czarny = ukryj
                let maskContent = '';
                if (!isNew && !isFull) {
                  if (k > 0) {
                    // SIERP: biały halfPath, czarna elipsa wycina środek
                    maskContent = `
                      <path d="${halfPath}" fill="white"/>
                      <ellipse cx="${cx}" cy="${cy}" rx="${ex}" ry="${R}" fill="black"/>`;
                  } else {
                    // GARB: biały halfPath + biały gibbousPath po drugiej stronie
                    maskContent = `
                      <path d="${halfPath}" fill="white"/>
                      <path d="${gibbousPath}" fill="white"/>`;
                  }
                } else if (isFull) {
                  maskContent = `<circle cx="${cx}" cy="${cy}" r="${R}" fill="white"/>`;
                }

                const maskTag = `<mask id="mc-lm">
                  <rect width="220" height="220" fill="black"/>
                  ${maskContent}
                </mask>`;

                // ── Maria i kratery ────────────────────────────────────────
                const maria = [
                  [cx-18, cy-32, 22, 14],
                  [cx+20, cy- 8, 18, 11],
                  [cx- 8, cy+22, 24, 16],
                  [cx+28, cy+30, 14,  9],
                  [cx-32, cy+ 8, 16, 10],
                ];
                const craters = [
                  [cx+38, cy-42,  7],
                  [cx-42, cy-28,  5],
                  [cx+22, cy+48,  8],
                  [cx-20, cy+50,  6],
                  [cx+52, cy+14,  4],
                  [cx-50, cy+32,  5],
                  [cx- 5, cy-70,  6],
                  [cx+60, cy-22,  3],
                ];

                const mariaDark  = maria.map(([x,y,rx,ry]) =>
                  `<ellipse cx="${x}" cy="${y}" rx="${rx}" ry="${ry}" fill="#060B16" opacity="0.55" transform="rotate(-15,${x},${y})"/>`
                ).join('');
                const mariaLight = maria.map(([x,y,rx,ry]) =>
                  `<ellipse cx="${x}" cy="${y}" rx="${rx}" ry="${ry}" fill="#9CB4D8" opacity="0.28" transform="rotate(-15,${x},${y})"/>`
                ).join('');
                const craterDark  = craters.map(([x,y,r]) =>
                  `<circle cx="${x}" cy="${y}" r="${r}" fill="#06090F" opacity="0.6"/>` +
                  `<circle cx="${x-r*.3}" cy="${y-r*.3}" r="${r*.5}" fill="#1A2640" opacity="0.4"/>`
                ).join('');
                const craterLight = craters.map(([x,y,r]) =>
                  `<circle cx="${x}" cy="${y}" r="${r}" fill="#A0B8D8" opacity="0.22"/>` +
                  `<circle cx="${x+r*.3}" cy="${y+r*.3}" r="${r*.45}" fill="#7898C0" opacity="0.3"/>`
                ).join('');

                // ── Blask pełni ────────────────────────────────────────────
                const isNearFull    = Math.abs(phase - 0.5) < 0.055;
                const fullIntensity = isNearFull ? 1 - Math.abs(phase - 0.5) / 0.055 : 0;
                const glowSVG = isNearFull
                  ? [14,10,6].map((gex,i) =>
                      `<circle cx="${cx}" cy="${cy}" r="${R+gex}" fill="#7A9FC8" opacity="${((0.18-i*0.05)*fullIntensity).toFixed(3)}"/>`
                    ).join('')
                  : '';

                // ── Lit layers (wizualna strona oświetlona) ────────────────
                let litLayers = '';
                if (!isNew) {
                  if (isFull) {
                    litLayers = `<circle cx="${cx}" cy="${cy}" r="${R}" fill="${L}"/>`;
                  } else {
                    litLayers = `<path d="${halfPath}" fill="${L}"/>`;
                    if (k > 0) litLayers += `<ellipse cx="${cx}" cy="${cy}" rx="${ex}" ry="${R}" fill="${D}"/>`;
                    else       litLayers += `<path d="${gibbousPath}" fill="${L}"/>`;
                  }
                }

                const moonSVG = `
                  <svg viewBox="0 0 220 220" width="160" height="160">
                    <defs>
                      <clipPath id="mc-cc"><circle cx="${cx}" cy="${cy}" r="${R}"/></clipPath>
                      ${maskTag}
                    </defs>
                    ${glowSVG}
                    <circle cx="${cx}" cy="${cy}" r="${R}" fill="${D}"/>
                    <g clip-path="url(#mc-cc)">${mariaDark}${craterDark}</g>
                    <g clip-path="url(#mc-cc)">${litLayers}</g>
                    <g mask="url(#mc-lm)">${mariaLight}${craterLight}</g>
                    <circle cx="${cx}" cy="${cy}" r="${R}" fill="none" stroke="rgba(160,195,240,0.12)" stroke-width="1.5"/>
                  </svg>`;

                const pct = (phase * 100).toFixed(1);

                let stars = '';
                for (let i = 0; i < 38; i++) {
                  const xr = ((i * 137.508 + 43) % 97 + 2).toFixed(1);
                  const yr = ((i * 97.312  + 17) % 91 + 3).toFixed(1);
                  const sr = (0.7 + (i % 14) * 0.1).toFixed(1);
                  const op = (0.07 + (i % 5) * 0.04).toFixed(2);
                  stars += `<div style="position:absolute;left:${xr}%;top:${yr}%;width:${sr}px;height:${sr}px;border-radius:50%;background:#C8D8F0;opacity:${op};pointer-events:none;"></div>`;
                }

                const stats = [
                  [illum + '%', 'Oświetlenie'],
                  [age + ' d',  'Wiek'],
                  [nextVal + ' d', nextLbl],
                ];
                const statsHTML = stats.map(([v,l]) =>
                  `<div style="flex:1;background:rgba(255,255,255,.06);border-radius:13px;padding:11px 6px;text-align:center;">
                    <div style="font-size:16px;font-weight:700;color:#B0C8F0;letter-spacing:-.3px;">${v}</div>
                    <div style="font-size:9px;color:rgba(255,255,255,.3);text-transform:uppercase;letter-spacing:.06em;margin-top:3px;">${l}</div>
                  </div>`
                ).join('');

                function miniMoonSVG(p) {
                  const r=11, mcx=14, mcy=14, sz=28;
                  const mD='#0E1625', mL='#C8DCEE';
                  const uid = 'mm'+Math.floor(p*1000);
                  const isN = p < 0.015 || p > 0.985;
                  const isF = Math.abs(p - 0.5) < 0.015;
                  let g = `<circle cx="${mcx}" cy="${mcy}" r="${r}" fill="${mD}"/>`;
                  if (!isN) {
                    if (isF) {
                      g = `<circle cx="${mcx}" cy="${mcy}" r="${r}" fill="${mL}"/>`;
                    } else {
                      const k2  = Math.cos(p * 2 * Math.PI);
                      const ex2 = Math.abs(k2) * r;
                      const sw2 = p < 0.5 ? 1 : 0;
                      g += `<path d="M${mcx} ${mcy-r} A${r} ${r} 0 0 ${sw2} ${mcx} ${mcy+r} L${mcx} ${mcy}Z" fill="${mL}"/>`;
                      if (k2 > 0) g += `<ellipse cx="${mcx}" cy="${mcy}" rx="${ex2}" ry="${r}" fill="${mD}"/>`;
                      else        g += `<path d="M${mcx} ${mcy-r} A${ex2} ${r} 0 0 ${p<0.5?0:1} ${mcx} ${mcy+r} L${mcx} ${mcy}Z" fill="${mL}"/>`;
                    }
                  }
                  return `<svg viewBox="0 0 ${sz} ${sz}" width="${sz}" height="${sz}">
                    <defs><clipPath id="${uid}"><circle cx="${mcx}" cy="${mcy}" r="${r}"/></clipPath></defs>
                    <g clip-path="url(#${uid})">${g}</g>
                    <circle cx="${mcx}" cy="${mcy}" r="${r}" fill="none" stroke="rgba(150,185,230,0.15)" stroke-width="0.8"/>
                  </svg>`;
                }

                const STRIP = [
                  {p:0.000, lbl:'Nów'},      {p:0.125, lbl:'Sierp r.'},
                  {p:0.250, lbl:'I Kw.'},    {p:0.375, lbl:'Garb r.'},
                  {p:0.500, lbl:'Pełnia'},   {p:0.625, lbl:'Garb m.'},
                  {p:0.750, lbl:'II Kw.'},   {p:0.875, lbl:'Sierp m.'},
                ];
                const stripHTML = STRIP.map(({p, lbl}) => {
                  const active = Math.abs(p - phase) < 0.065 || (p===0 && (phase<0.04||phase>0.96));
                  const bg   = active ? 'background:rgba(180,210,255,.1);' : '';
                  const lblC = active ? 'rgba(255,255,255,.5)' : 'rgba(255,255,255,.22)';
                  return `<div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;padding:5px 2px;border-radius:8px;${bg}">
                    ${miniMoonSVG(p)}
                    <span style="font-size:7px;color:${lblC};text-align:center;line-height:1.2;">${lbl}</span>
                  </div>`;
                }).join('');

                return `
                  <div style="background:#080D1A;border-radius:26px;padding:22px 18px 18px;position:relative;overflow:hidden;font-family:-apple-system,system-ui,sans-serif;color:#fff;">
                    <div style="position:absolute;inset:0;pointer-events:none;z-index:0;">${stars}</div>
                    <div style="position:relative;z-index:1;display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:16px;">
                      <span style="font-size:13px;font-weight:600;color:rgba(255,255,255,.38);">Faza Księżyca</span>
                      <span style="font-size:12px;color:rgba(255,255,255,.22);">${dateStr}</span>
                    </div>
                    <div style="position:relative;z-index:1;display:flex;justify-content:center;align-items:center;margin:6px 0 14px;">
                      ${moonSVG}
                    </div>
                    <div style="position:relative;z-index:1;font-size:22px;font-weight:700;letter-spacing:-.5px;text-align:center;color:#DCE8FF;margin-bottom:2px;">${namePL}</div>
                    <div style="position:relative;z-index:1;font-size:12px;color:rgba(255,255,255,.28);text-align:center;margin-bottom:18px;">${nameEN}</div>
                    <div style="position:relative;z-index:1;display:flex;gap:8px;margin-bottom:18px;">${statsHTML}</div>
                    <div style="position:relative;z-index:1;font-size:10px;color:rgba(255,255,255,.25);text-transform:uppercase;letter-spacing:.07em;margin-bottom:8px;">Cykl księżycowy</div>
                    <div style="position:relative;z-index:1;display:flex;margin-bottom:10px;">${stripHTML}</div>
                    <div style="position:relative;z-index:1;height:16px;display:flex;align-items:center;margin-bottom:4px;">
                      <div style="position:absolute;left:0;right:0;height:2px;background:rgba(255,255,255,.08);border-radius:2px;">
                        <div style="width:${pct}%;height:100%;border-radius:2px;background:rgba(180,210,240,.55);"></div>
                      </div>
                      <div style="position:absolute;left:${pct}%;width:12px;height:12px;background:#C8D8F2;border-radius:50%;transform:translateX(-50%);box-shadow:0 0 8px 2px rgba(180,210,240,.4);"></div>
                    </div>
                  </div>`;
              ]]]
          - type: custom:button-card
            show_name: false
            show_icon: false
            show_label: true
            styles:
              card:
                - padding: 8px 4px 4px
                - background: transparent
                - box-shadow: none
                - border: none
                - border-radius: "0"
              label:
                - padding: "0"
                - width: 100%
                - text-align: left
            label: |
              [[[
                return `<div style="display:inline-flex;align-items:center;gap:6px;background:#1a401f;border-radius:20px;padding:4px 12px 4px 8px;font-family:-apple-system,system-ui,sans-serif;">
                  <div style="width:6px;height:6px;border-radius:50%;background:#5afa5a;flex-shrink:0;"></div>
                  <span style="font-size:10px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;color:#5afa5a;">czujniki - na żywo</span>
                </div>`;
              ]]]
          - type: custom:button-card
            entity: sensor.stacja_pogodowa_uv_index
            show_name: false
