                const windUnit = states['sensor.prognoza_pogody_5_dni']?.attributes?.wind_speed_unit ?? 'km/h';

                // ── Temp colour (direct rgba, no opacity hack) ────────────
                function tempColor(t, dim=false) {
                  const colors = {
                    hot:    dim ? '#C42A22' : '#FF3B30',
                    warm2:  dim ? '#C45200' : '#FF6B00',
                    warm1:  dim ? '#C47B00' : '#FF9F0A',
