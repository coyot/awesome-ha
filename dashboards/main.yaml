          - type: custom:aha-garden-meters-card
            entity_ogrod1: input_number.ogrod_1
            entity_ogrod2: input_number.ogrod_2
            entity_confirm1: input_button.ogrod_1_potwierdz
            entity_confirm2: input_button.ogrod_2_potwierdz
