                - box-shadow: none
                - border: 1px solid rgba(255,255,255,0.07)
                - overflow: hidden
              label:
                - padding: "0"
                - margin: "0"
                - width: 100%
                - white-space: normal
                - line-height: "1"
            label: |
              [[[
                // ── Bezpieczne odczytanie encji ───────────────────────────
                const relRaw = states['sensor.stacja_pogodowa_relative_pressure']?.state;
                const absRaw = states['sensor.stacja_pogodowa_absolute_pressure']?.state;

                const rel = parseFloat(relRaw);
                const abs = parseFloat(absRaw);

                const relOk = !isNaN(rel);
                const absOk = !isNaN(abs);

                const diff = relOk ? rel - 1013.25 : null;

                // ── Jeden punkt prawdy dla statusu ciśnienia ──────────────
                function pressStatus(r, d) {
                  if (!relOk) return {
                    accent:  'rgba(255,255,255,0.3)',
                    numCol:  'rgba(255,255,255,0.3)',
                    bgBlend: '#091220',
                    arrow:   '—',
                    trend:   'Brak danych',
                    badge:   'Brak danych',
                    forecast:'Sprawdź encję ciśnienia',
                  };
                  // Accent + numCol
                  const accent  = r < 985  ? '#4DA6FF'
                                : r < 1005 ? '#5AC8FA'
                                : r < 1020 ? '#E8E8E8'
                                : r < 1030 ? '#FF9F0A'
                                :            '#FF6820';
                  const numCol  = r < 985  ? '#A8D4FF'
                                : r < 1005 ? '#C8E8FF'
                                : r < 1020 ? '#FFFFFF'
                                : r < 1030 ? '#FFD4A0'
                                :            '#FFBF80';
                  // Subtle bg tint blended over navy
                  const bgBlend = r < 985  ? '#0A0E28'
                                : r < 1005 ? '#091220'
                                : r < 1020 ? '#0e1a2e'
                                : r < 1030 ? '#141610'
                                :            '#180E08';
                  // Trend arrow + label
                  const arrow  = d >  8   ? '↑↑'
                               : d >  3   ? '↑'
                               : d >  0.8 ? '↗'
                               : d > -0.8 ? '→'
                               : d > -3   ? '↘'
                               : d > -8   ? '↓'
                               :            '↓↓';
                  const trend  = d >  8   ? 'Bardzo wysokie'
                               : d >  3   ? 'Wysokie'
                               : d >  0.8 ? 'Powyżej normy'
                               : d > -0.8 ? 'Normalne'
                               : d > -3   ? 'Poniżej normy'
                               : d > -8   ? 'Niskie'
                               :            'Bardzo niskie';
                  const badge = trend;
                  // Forecast
                  const forecast = r < 980              ? 'Możliwa burza lub silny wiatr'
                                 : r < 995 && d < -1    ? 'Pogoda może się pogarszać'
                                 : r < 995              ? 'Zmienna, możliwy deszcz'
                                 : r < 1010 && d < 0    ? 'Lekkie zachmurzenie możliwe'
                                 : r < 1010             ? 'Pogoda umiarkowana'
                                 : r < 1025             ? 'Dobra, stabilna pogoda'
                                 : r < 1035             ? 'Pogodnie, małe opady'
                                 :                        'Bardzo stabilny wyż';
                  return { accent, numCol, bgBlend, arrow, trend, badge, forecast };
                }

                const st = pressStatus(rel, diff);

                // Diff string
                const diffStr = diff !== null
                  ? (diff >= 0 ? '+' : '') + diff.toFixed(1) + ' hPa od normy'
                  : '—';

                // Pasek 960–1050 hPa
                const pct = relOk
                  ? Math.max(0, Math.min(100, ((rel - 960) / 90) * 100)).toFixed(1)
                  : '0';

                // ── Unikalne ID (brak globalnych klas CSS) ────────────────
                const uid = 'pc_' + Math.random().toString(36).slice(2, 7);

                // ── SVG barometr ──────────────────────────────────────────
                const baroIcon = `<svg viewBox="0 0 24 24" width="14" height="14" fill="none"
                    style="display:inline-block;vertical-align:middle;margin-right:5px;margin-top:-1px;">
                  <circle cx="12" cy="12" r="8"
                          stroke="rgba(255,255,255,0.30)" stroke-width="1.5" fill="none"/>
                  <circle cx="12" cy="12" r="1.8" fill="${st.accent}" opacity="0.9"/>
                  <line x1="12" y1="12" x2="${(12 + 5 * Math.cos((rel - 985) / 65 * Math.PI - Math.PI * 0.85 || -Math.PI * 0.85)).toFixed(2)}"
                        y2="${(12 - 5 * Math.sin((rel - 985) / 65 * Math.PI - Math.PI * 0.85 || -Math.PI * 0.85)).toFixed(2)}"
                        stroke="${st.accent}" stroke-width="1.5" stroke-linecap="round"/>
                </svg>`;

                return `
                  <div id="${uid}" style="
                    background: linear-gradient(145deg, ${st.bgBlend} 0%, #091220 100%);
                    border-radius: 18px;
                    padding: 16px 18px 0;
                    position: relative;
                    overflow: hidden;
                    font-family: -apple-system, system-ui, sans-serif;
                  ">

                    <!-- Glow -->
                    <div style="
                      position:absolute;top:-50px;right:-30px;
                      width:180px;height:180px;border-radius:50%;
                      background:radial-gradient(circle,${st.accent}18 0%,transparent 65%);
                      pointer-events:none;
                    "></div>

                    <!-- Nagłówek -->
                    <div style="
                      display:flex;justify-content:space-between;align-items:center;
                      margin-bottom:12px;position:relative;
                    ">
                      <div style="
                        font-size:10px;font-weight:600;text-transform:uppercase;
                        letter-spacing:.08em;color:rgba(255,255,255,0.28);
                        display:flex;align-items:center;
                      ">${baroIcon}Ciśnienie atmosferyczne</div>

                      <!-- Badge -->
                      <div style="
                        font-size:10px;font-weight:600;letter-spacing:.04em;
                        color:${st.accent};
                        background:${st.accent}1A;
                        border:1px solid ${st.accent}40;
                        padding:3px 9px;border-radius:20px;
                        white-space:nowrap;
                      ">${st.arrow} ${st.badge}</div>
                    </div>

                    <!-- GŁÓWNA WARTOŚĆ — dominująca -->
                    <div style="
                      display:flex;align-items:baseline;gap:8px;
                      margin-bottom:4px;position:relative;
                    ">
                      <span style="
                        font-size:72px;font-weight:200;letter-spacing:-4px;line-height:1;
                        color:${st.numCol};font-variant-numeric:tabular-nums;
                      ">${relOk ? rel.toFixed(0) : '—'}</span>
                      <span style="
                        font-size:18px;font-weight:400;
                        color:rgba(255,255,255,0.35);
                        padding-bottom:6px;
                      ">hPa</span>
                    </div>

                    <!-- Prognoza + diff od normy -->
                    <div style="
                      display:flex;justify-content:space-between;align-items:flex-end;
                      margin-bottom:14px;
                    ">
                      <span style="
                        font-size:11px;font-weight:500;
                        color:rgba(255,255,255,0.42);
                        line-height:1.35;max-width:60%;
                      ">${st.forecast}</span>
                      <span style="
                        font-size:10px;font-weight:500;
                        color:${st.accent};opacity:0.7;
                        text-align:right;line-height:1.35;
                      ">${diffStr}</span>
                    </div>

                    <!-- Ciśnienie absolutne — mniejszy tile, wyraźnie podrzędne -->
                    <div style="
                      background:rgba(255,255,255,0.04);
                      border-radius:10px;
                      padding:9px 12px;
                      margin-bottom:14px;
                      display:flex;justify-content:space-between;align-items:center;
                    ">
                      <span style="
                        font-size:9.5px;color:rgba(255,255,255,0.25);
                        text-transform:uppercase;letter-spacing:.06em;
                      ">ciśnienie absolutne</span>
                      <span style="
                        font-size:14px;font-weight:500;letter-spacing:-.4px;
                        color:${absOk ? 'rgba(255,255,255,0.45)' : 'rgba(255,255,255,0.2)'};
                        font-variant-numeric:tabular-nums;
                      ">${absOk ? abs.toFixed(0) + ' hPa' : '—'}</span>
                    </div>

                    <!-- Pasek poziomu ciśnienia -->
                    <div style="
                      position:relative;
                      margin:0 -18px;
                    ">
                      <div style="height:3px;background:rgba(255,255,255,0.06);">
                        <div style="
                          height:100%;width:${pct}%;
                          background:linear-gradient(to right,#4DA6FF 0%,#E8E8E8 45%,#FF9F0A 80%,#FF6820 100%);
                          border-radius:0 2px 0 0;opacity:0.55;
                        "></div>
                      </div>
                      <!-- Marker normy (1013.25 hPa = ~59% skali) -->
                      <div style="
                        position:absolute;top:0;
                        left:${((1013.25 - 960) / 90 * 100).toFixed(1)}%;
                        width:1px;height:3px;
                        background:rgba(255,255,255,0.35);
                      "></div>
                    </div>

                    <!-- Etykiety skali -->
                    <div style="
                      display:flex;justify-content:space-between;
                      padding:3px 18px 12px;
                    ">
                      <span style="font-size:8px;color:rgba(255,255,255,0.15);">960</span>
                      <span style="font-size:8px;color:rgba(255,255,255,0.20);">norma 1013</span>
                      <span style="font-size:8px;color:rgba(255,255,255,0.15);">1050</span>
                    </div>

                  </div>`;
              ]]]
          - type: custom:button-card
