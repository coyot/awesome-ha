# ============================================================
# AHA Briefing Card — gotowa konfiguracja
#
# Wklej do dashboardu jako:
#   type: custom:aha-briefing-card
#   ... (cała reszta poniżej)
#
# Wymagane: awesome-ha.js załadowany w Lovelace resources
# ============================================================

type: custom:aha-briefing-card

# ── Pogoda & stacja ─────────────────────────────────────────
weather_entity: weather.forecast_home
temp_entity:    sensor.stacja_pogodowa_outdoor_temperature
feels_entity:   sensor.stacja_pogodowa_feels_like_temperature
wind_entity:    sensor.stacja_pogodowa_wind_speed
forecast_entity: sensor.forecast_hourly_json
rain_entity:    sensor.stacja_pogodowa_daily_rain_piezo

# ── Obecność domowników ─────────────────────────────────────
# battery_entity jest opcjonalne — odkomentuj jeśli masz sensor baterii telefonu w HA
# (np. z integracji iOS Companion App: sensor.iphone_tk_battery_level)
people:
  - name: Tomek
    entity: device_tracker.iphone_tk
    # battery_entity: sensor.iphone_tk_battery_level

  - name: Monika
    entity: device_tracker.iphone_monika
    # battery_entity: sensor.iphone_monika_battery_level

# ── Nawożenia ────────────────────────────────────────────────
# Stan "wykonane" jest współdzielony z aha-weather-card przez localStorage —
# jeśli masz tę samą listę w obu kartach, odhaczenie w jednej działa w drugiej.
#
# Uzupełnij datami na cały sezon. Wykonane wpisy wygasają automatycznie
# (znikają gdy oznaczysz jako done w aha-weather-card lub po dacie).
fertilizations:
  - date: '2026-04-16'
    name: YaraMila Complex
    description: >
      Trawnik — YaraMila Complex, ok. 25-30 g/m².
      Nawóz wieloskładnikowy NPK na start sezonu.

  - date: '2026-05-13'
    name: Saletra amonowa + superfosfat
    description: >
      Trawnik — saletra amonowa ok. 15-20 g/m² +
      superfosfat wzbogacony ok. 20-30 g/m².
      Mocne nawożenie azotowo-fosforowe po wiosennym starcie.

  - date: '2026-05-26'
    name: Oprysk regeneracyjny
    description: >
      Oprysk dolistny:
      Optysil 50 ml / 10 l wody +
      siarczan magnezu 100-150 g / 10 l +
      siarczan żelaza 20-30 g / 10 l.
      Oprysk wieczorem, bez upału.

  - date: '2026-06-15'
    name: Nawóz letni azotowo-potasowy
    description: >
      Trawnik — nawóz NPK ok. 18-6-12 lub 20-5-10,
      dawka 25-30 g/m².
      Cel: zagęszczenie, intensywna zieleń, regeneracja po użytkowaniu.

  - date: '2026-06-22'
    name: Optysil + magnez
    description: >
      Oprysk dolistny:
      Optysil 50 ml / 10 l +
      siarczan magnezu 100-150 g / 10 l.
      Poprawa odporności na suszę i deptanie.

  - date: '2026-07-10'
    name: Potas + lekki azot
    description: >
      Trawnik — siarczan potasu 10-15 g/m² +
      lekki nawóz azotowy ok. 5-10 g N/m².
      Wzmocnienie odporności mechanicznej i odporności na suszę.

  - date: '2026-07-18'
    name: Żelazo + Optysil
    description: >
      Oprysk dolistny:
      Optysil 50 ml / 10 l +
      siarczan żelaza 20-30 g / 10 l.
      Efekt ciemnozielonego trawnika i poprawa kondycji.

  - date: '2026-08-05'
    name: Nawóz długo działający
    description: >
      Trawnik — nawóz długo działający NPK ok. 15-5-15
      lub 16-5-12 + Fe + Mg,
      dawka 25 g/m².
      Kluczowe nawożenie pod gęstość i regenerację.

  - date: '2026-08-16'
    name: Optysil sierpniowy
    description: >
      Oprysk dolistny:
      Optysil 50 ml / 10 l +
      siarczan magnezu 100 g / 10 l.
      Przygotowanie trawnika do końcówki lata.

  - date: '2026-09-01'
    name: Nawóz jesienny
    description: >
      Trawnik — nawóz jesienny z wysokim potasem,
      NPK ok. 6-10-20 lub 0-8-20,
      dawka 25-30 g/m².
      Bez mocnego azotu.

  - date: '2026-09-15'
    name: Żelazo jesienne
    description: >
      Lekki oprysk:
      siarczan żelaza 20 g / 10 l +
      siarczan magnezu 100 g / 10 l.
      Poprawa koloru i ograniczenie mchu.

  - date: '2026-10-05'
    name: Ostatnie nawożenie jesienne
    description: >
      Trawnik — nawóz jesienny potasowy,
      dawka 15-20 g/m².
      Ostatnie nawożenie przed zimą.

shopping_list:
  - name: Nawóz letni NPK 18-6-12 lub 20-5-10
    purpose: Zagęszczenie i wzrost letni

  - name: Nawóz długo działający do trawnika
    purpose: Stabilny wzrost i odporność latem

  - name: Nawóz jesienny do trawnika
    purpose: Potas i przygotowanie do zimy

  - name: Siarczan potasu
    purpose: Odporność na deptanie i suszę

  - name: Siarczan magnezu
    purpose: Intensywna zieleń i regeneracja

  - name: Siarczan żelaza
    purpose: Ciemnozielony kolor i ograniczenie mchu

  - name: Optysil
    purpose: Wzmocnienie źdźbeł i odporność stresowa

  - name: Zwilżacz do trawnika (opcjonalnie)
    purpose: Lepsze nawodnienie podczas upałów

  - name: Opryskiwacz ciśnieniowy
    purpose: Regularne opryski dolistne

  - name: Tester pH gleby (opcjonalnie)
    purpose: Kontrola odczynu i optymalizacja nawożenia

# ── Wywóz śmieci ─────────────────────────────────────────────
# Karta czyta datę następnego odbioru z atrybutów/stanu encji.
# Obsługiwane formaty stanu encji:
#   - Liczba całkowita (dni do odbioru): "1", "3", "0"
#   - Data ISO: "2026-05-14"
#   - Atrybuty: next_date, next_pickup, next_collection, date
#
# Kolory sugestywne — możesz zmienić wg własnego kodowania kolorów gminy.
waste:
  - entity: sensor.harmonogram_bio
    name: Bio
    color: '#4CAF50'      # zielony

  - entity: sensor.harmonogram_segregowane
    name: Segregowane
    color: '#FF9800'      # pomarańczowy (papier/plastik/szkło razem)

  - entity: sensor.harmonogram_zmieszane
    name: Zmieszane
    color: '#78909C'      # szary

  - entity: sensor.harmonogram_gabaryty
    name: Gabaryty
    color: '#9C27B0'      # fioletowy

# ── Szambo ───────────────────────────────────────────────────
# Pokaż przypomnienie gdy zbiornik zapełniony w ≥ warn_pct %
# capacity: pojemność w m³ (sprawdź w integracji szambo)
szambo:
  entity: sensor.szambo_zuzycie
  capacity: 10
  warn_pct: 75

# ── Progi widoczności przypomnień ────────────────────────────
# Nawożenia: pokaż jeśli za mniej niż N dni (i nie wykonane)
days_fertilization: 14

# Śmieci: pokaż jeśli odbiór za mniej niż N dni
# 3 = pokaż dziś + jutro + pojutrze
days_waste: 3
